# Homelab Application Configuration
#
# This file declares all applications in the homelab.
# Most apps are automatically deployed using GenericHelmApp.
# Only apps with complex custom resources need custom Python code.
#
# Schema:
#   version: Config version (v1)
#   cluster: Default cluster (oci, local)
#
#   apps[]:
#     name: App identifier
#     category: public | protected | internal | database
#     tier: critical | standard | ephemeral
#     namespace: Kubernetes namespace
#     port: Service port
#     hostname: Public hostname (if exposed)
#     mode: public | protected | internal
#     clusters: [oci, local] - which clusters to deploy to
#     dependencies: List of namespaces this app can communicate with
#
#     helm:
#       chart: Helm chart name
#       repo: Helm repository URL
#       version: Chart version
#       values: Optional Helm values (merged with defaults)
#
#     storage[]:
#       name: Volume name
#       size: Size (e.g., 10Gi)
#       mount_path: Mount path in container
#       existing_claim: Use existing PVC (optional)
#
#     secrets[]:
#       - name: Secret name
#         keys: [key1, key2]
#
#     test:
#       routing: Test HTTP endpoints
#       secrets: Test secret sync
#       health: Test pod health
#       network_policy: Test network isolation
#       expected_endpoints: [urls to test]
#       network_isolation: [namespaces that should be unreachable]

version: v1
cluster: oci
domain: smadja.dev
hcloud_storage_box_id: 537179

# S3-compatible bucket definitions
buckets:
  - name: velero-backups
    provider: oci
    purpose: backup
    tier: InfrequentAccess
    export_as: velero_backup_bucket
    access_key_secret: OCI_S3_ACCESS_KEY
    secret_key_secret: OCI_S3_SECRET_KEY
    protect: true

  - name: homelab-db-backups
    provider: oci
    purpose: backup
    tier: InfrequentAccess
    export_as: db_backup_bucket
    access_key_secret: OCI_S3_ACCESS_KEY
    secret_key_secret: OCI_S3_SECRET_KEY
    protect: true

identities:
  users:
    - name: "paul"
      display_name: "Paul Smadja"
      email: "paul@smadja.dev"
      groups: ["admins", "users"]
  groups:
    - name: "admins"
      is_superuser: true
    - name: "users"
101:

apps:
  # =============================================================================
  # PUBLIC APPLICATIONS - Exposed via Cloudflare Tunnel
  # =============================================================================

  - name: homarr
    category: public
    tier: standard
    namespace: homelab
    port: 3000
    hostname: home.smadja.dev
    mode: public
    clusters: [oci, local]
    dependencies: [external-secrets, cloudflared, kube-system]
    helm:
      chart: homarr
      repo: oci://ghcr.io/homarr-labs/charts
      version: 2.0.0
      values:
        image:
          tag: v1.0.0
        service:
          ports:
            app:
              port: 3000
        livenessProbe:
          httpGet:
            port: 3000
        readinessProbe:
          httpGet:
            port: 3000
        persistence:
          config:
            enabled: true
            name: homarr-data
            mountPath: /data
        envSecrets:
          db-secret:
            SECRET_ENCRYPTION_KEY: db-encryption-key
        env:
          AUTH_LOGOUT_REDIRECT_URL: "https://home.smadja.dev"
        podSecurityContext:
          fsGroup: 1000
    storage:
      - name: data
        size: 1Gi
        mount_path: /data
      - name: database
        size: 1Gi
        mount_path: /database
        storage_class: local-path
    auto_secrets:
      db-secret:
        db-encryption-key: 64
    extra_env:
      DB_URL: /database/db.sqlite
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    test:
      routing: true
      expected_endpoints: [https://home.smadja.dev]
      network_isolation: []

  - name: navidrome
    category: protected
    tier: standard
    namespace: music
    port: 4533
    hostname: music.smadja.dev
    mode: protected
    auth: true
    clusters: [oci, local]
    dependencies: [external-secrets, cloudflared, kube-system, authentik]
    helm:
      chart: app-template
      repo: https://bjw-s-labs.github.io/helm-charts
      version: 3.2.1
      values:
        controllers:
          main:
            containers:
              main:
                image:
                  repository: ghcr.io/navidrome/navidrome
                  tag: latest
                env:
                  - name: ND_DATAFOLDER
                    value: /data
                  - name: ND_MUSICFOLDER
                    value: /music
                  - name: ND_TIMEZONE
                    value: Europe/Paris
                  - name: ND_LOG_LEVEL
                    value: info
        podSecurityContext:
          fsGroup: 1000
        service:
          main:
            controller: main
            ports:
              http:
                port: 4533
    storage:
      - name: music
        size: 1Ti
        mount_path: /music
        storage_class: hetzner-smb
        access: shared
      - name: navidrome-data
        size: 2Gi
        mount_path: /data
        storage_class: local-path
        access: private
    secrets:
      - name: hetzner-storage-creds
        keys:
          username: HETZNER_STORAGE_BOX_1_USER
          password: HETZNER_STORAGE_BOX_1_PASS
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
    test:
      routing: true
      expected_endpoints: [https://music.smadja.dev]
      network_isolation: []

  - name: slskd
    category: public
    tier: ephemeral
    namespace: music
    port: 5030
    hostname: soulseek.smadja.dev
    mode: public
    clusters: [oci, local]
    dependencies: [external-secrets, cloudflared, kube-system]
    helm:
      chart: app-template
      repo: https://bjw-s-labs.github.io/helm-charts
      version: 3.2.1
      values:
        controllers:
          main:
            containers:
              main:
                image:
                  repository: ghcr.io/slskd/slskd
                  tag: latest
        podSecurityContext:
          fsGroup: 1000
        service:
          main:
            controller: main
            ports:
              http:
                port: 5030
    storage:
      - name: config
        size: 1Gi
        mount_path: /app/config
        storage_class: local-path
        access: private
      - name: music
        size: 1Ti
        mount_path: /music
        existing_claim: navidrome-music
        access: shared
    test:
      routing: true
      expected_endpoints: [https://soulseek.smadja.dev]
      network_isolation: [cnpg-system]

  - name: authentik
    category: public
    tier: critical
    namespace: authentik
    port: 80
    hostname: auth.smadja.dev
    mode: public
    clusters: [oci, local]
    dependencies: [cnpg-system, redis, external-secrets, cloudflared, kube-system]
    helm:
      chart: authentik
      name: authentik-release
      repo: https://charts.goauthentik.io
      version: 2026.2.1
      values:
        authentik:
          existingSecret:
            secretName: authentik-vars
        podSecurityContext:
          fsGroup: 1000
        redis:
          image:
            registry: docker.io
            repository: library/redis
            tag: 7.2
          master:
            persistence:
              storageClass: oci-bv
            podSecurityContext:
              fsGroup: 1000
          shmSize: 256Mi
          global:
            security:
              allowInsecureImages: true
    storage:
      - name: data
        size: 10Gi
        mount_path: /data
    database_backup:
      enabled: true
      endpoint_url: "https://axnvxxurxefp.compat.objectstorage.eu-paris-1.oraclecloud.com"
      bucket: "velero-backups"
      access_key_id: "s3-backup-creds"
      secret_access_key: "s3-backup-creds"
    database:
      local: true
      size: 5Gi
    secrets:
      - name: authentik-vars
        keys:
          AUTHENTIK_SECRET_KEY: AUTHENTIK_SECRET_KEY
          AUTHENTIK_REDIS_PASSWORD: AUTHENTIK_REDIS_PASSWORD
      - name: s3-backup-creds
        keys:
          access_key_id: OCI_S3_ACCESS_KEY
          secret_access_key: OCI_S3_SECRET_KEY
    test:
      routing: true
      expected_endpoints: [https://auth.smadja.dev]

  # =============================================================================
  # PROTECTED APPLICATIONS - Exposed via Cloudflare Tunnel + Authentik
  # =============================================================================

  - name: vaultwarden
    category: protected
    tier: critical
    namespace: vaultwarden
    port: 8080
    hostname: vault.smadja.dev
    mode: protected
    auth: true
    clusters: [oci]
    dependencies: [cnpg-system, external-secrets, cloudflared, authentik, kube-system]
    helm:
      chart: vaultwarden
      repo: https://charts.gabe565.com
      version: 0.11.1
      values:
        image:
          repository: docker.io/vaultwarden/server
          tag: 1.33.2
        podSecurityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
        domain: vaultwarden.smadja.dev
    storage:
      - name: data
        size: 1Gi
        mount_path: /data
    secrets:
      - name: vaultwarden-vars
        keys:
          ADMIN_TOKEN: VAULTWARDEN_ADMIN_TOKEN
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    test:
      routing: true
      expected_endpoints: [https://vault.smadja.dev]

  # =============================================================================
  # INTERNAL APPLICATIONS - No external exposure
  # =============================================================================

  # (None current)

  # =============================================================================
  # INFRASTRUCTURE COMPONENTS
  # =============================================================================

  - name: cnpg-system
    category: database
    tier: critical
    namespace: cnpg-system
    port: 443
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system]
    disable_auto_route: true
    helm:
      chart: cloudnative-pg
      repo: https://cloudnative-pg.github.io/charts
      version: 0.22.1

  - name: redis
    category: database
    tier: critical
    namespace: storage
    port: 6379
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system]
    disable_auto_route: true
    helm:
      chart: redis-ha
      repo: https://dandydeveloper.github.io/charts
      version: 4.33.4
      values:
        image:
          repository: docker.io/library/redis
          tag: 7.2.7-alpine
        auth: false
        replicas: 1
        sentinel:
          enabled: false

  - name: external-secrets
    category: internal
    tier: critical
    namespace: external-secrets
    port: 443
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system]
    disable_auto_route: true
    skip_crds: true
    helm:
      chart: external-secrets
      repo: https://charts.external-secrets.io
      version: 0.14.3
      values:
        installCRDs: false
        serviceAccount:
          create: true
    test:
      expected_resources:
        - kind: ServiceAccount
          name: external-secrets

  - name: cert-manager
    category: internal
    tier: critical
    namespace: cert-manager
    port: 443
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system]
    disable_auto_route: true
    skip_crds: true
    inject_secrets: false
    helm:
      chart: cert-manager
      repo: https://charts.jetstack.io
      version: v1.16.2
      values:
        crds:
          enabled: false
        serviceAccount:
          create: true
    secrets:
      - name: cloudflare-api-token
        keys:
          api_token: CLOUDFLARE_API_TOKEN

  - name: envoy-gateway
    category: internal
    tier: critical
    namespace: envoy-gateway
    port: 443
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system]
    disable_auto_route: true
    inject_secrets: false
    helm:
      chart: gateway-helm
      repo: oci://docker.io/envoyproxy
      version: v1.2.1
      values:
        serviceAccount:
          create: true
          name: envoy-gateway
    test:
      expected_resources:
        - kind: ServiceAccount
          name: envoy-gateway

  - name: cloudflared
    category: internal
    tier: critical
    namespace: cloudflared
    port: 443
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system, external-secrets]
    disable_auto_route: true
    inject_secrets: true
    allow_external: true
    helm:
      chart: cloudflare-tunnel-remote
      repo: https://cloudflare.github.io/helm-charts
      version: 0.1.2
      values:
        fullnameOverride: cloudflared-tunnel
        image:
          repository: docker.io/cloudflare/cloudflared
          tag: 2024.8.3
        cloudflare:
          tunnel_token: ""
    secrets:
      - name: cloudflared-tunnel-doppler
        keys:
          tunnelToken: CLOUDFLARE_TUNNEL_TOKEN

  - name: external-dns
    category: internal
    tier: critical
    namespace: external-dns
    port: 7979
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system, external-secrets]
    disable_auto_route: true
    allow_external: true
    helm:
      chart: external-dns
      repo: https://kubernetes-sigs.github.io/external-dns/
      version: 1.15.0
      values:
        provider: cloudflare
        serviceAccount:
          create: true
        sources:
          - service
          - ingress
          - gateway-httproute
        cloudflare:
          apiToken: ""
          proxied: true
        env:
          - name: CF_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: cloudflare-api-token
                key: api_token
    secrets:
      - name: cloudflare-api-token
        keys:
          api_token: CLOUDFLARE_API_TOKEN
      - name: hetzner-cloud-api-token
        keys:
          token: HETZNER_CLOUD_API_TOKEN

  - name: local-path-provisioner
    category: internal
    tier: critical
    namespace: kube-system
    port: 80
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system]
    disable_auto_route: true
    helm:
      chart: local-path-provisioner
      repo: https://charts.containeroo.ch/
      version: 0.0.30
      values:
        image:
          repository: docker.io/rancher/local-path-provisioner
          tag: v0.0.34

  - name: csi-driver-smb
    category: internal
    tier: critical
    namespace: kube-system
    port: 443
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system]
    disable_auto_route: true
    helm:
      chart: csi-driver-smb
      repo: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-smb/master/charts
      version: v1.16.0
      values:
        feature:
          enableSMBSecurity: true
        serviceAccount:
          create: true
        controller:
          serviceAccount:
            create: true
        node:
          serviceAccount:
            create: true
