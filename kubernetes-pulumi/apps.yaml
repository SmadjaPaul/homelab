      - name: metadata
        size: 10Gi
        mount_path: /metadata
        type: persistentVolumeClaim
        storage_class: local-path
      - name: audiobooks
        size: 1Ti
        mount_path: /audiobooks
        type: persistentVolumeClaim
        existing_claim: navidrome-music
    test:
