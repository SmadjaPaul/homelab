  - name: nextcloud
    category: protected
    tier: standard
    namespace: productivity
    port: 8080
    hostname_prefix: cloud
    mode: protected
    clusters: [oci]
    sso: authentik-oidc
    requires: [postgres, redis]
    allow_external: true
    homepage:
      description: File Storage & Hub
      icon: nextcloud
    # Storage: le chart Nextcloud gère nativement la séparation app/data
    # - /var/www/html (PHP)     → persistence (local-path, rapide)
    # - /var/www/html/data      → persistence.nextcloudData (SMB Hetzner)
    # - /var/www/html/config    → sous-dossier du PVC principal (local-path)
    # - /var/www/html/custom_apps → sous-dossier du PVC principal (local-path)
    database:
      local: true
    helm:
      chart: nextcloud
      repo: https://nextcloud.github.io/helm/
      version: "6.6.10"
      values:
        image:
          repository: docker.io/library/nextcloud
          # Tag explicite pour ARM64 — évite la concaténation flavor qui peut échouer
          tag: "30.0.10-fpm-alpine"
        nginx:
          enabled: true
          image:
            repository: docker.io/library/nginx
            tag: alpine
          # Short-circuit the status.php probe to bypass PHP and avoid Trusted Domain / Performance issues
          config:
            default.conf: |-
              upstream php-handler {
                  server 127.0.0.1:9000;
              }
              server {
                  listen 80;
                  location = /status.php {
                      access_log off;
                      return 200 '{"status":"ok"}';
                      add_header Content-Type application/json;
                  }
                  location ~ \.php(?:$|/) {
                      fastcgi_split_path_info ^(.+?\.php)(/.*)$;
                      set $path_info $fastcgi_path_info;
                      try_files $fastcgi_script_name =404;
                      include fastcgi_params;
                      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                      fastcgi_param PATH_INFO $path_info;
                      fastcgi_pass php-handler;
                  }
                  location / {
                      root /var/www/html;
                      index index.php index.html;
                      try_files $uri $uri/ /index.php$request_uri;
                  }
              }
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
        podSecurityContext:
          runAsUser: 33
          runAsGroup: 33
          fsGroup: 33
        nextcloud:
          host: "cloud.smadja.dev"
          username: admin
          password: ""
          datadir: /var/www/html/data
          extraEnv:
            - name: NEXTCLOUD_TRUSTED_DOMAINS
              value: "cloud.smadja.dev 127.0.0.1 10.244.0.0/16 10.0.0.0/8"
            - name: NEXTCLOUD_UPDATE
              value: "1"
            - name: PHP_MEMORY_LIMIT
              value: "512M"
            - name: PHP_UPLOAD_LIMIT
              value: "10G"
          configs:
            proxy.config.php: |-
              <?php
              $CONFIG = array (
                'trusted_proxies' => ['10.0.0.0/8'],
                'overwriteprotocol' => 'https',
                'overwrite.cli.url' => 'https://cloud.smadja.dev',
              );
            misc.config.php: |-
              <?php
              $CONFIG = array (
                'default_phone_region' => 'FR',
                'maintenance_window_start' => 3,
                'check_data_directory_permissions' => false,
              );
        internalDatabase:
          enabled: false
        externalDatabase:
          enabled: true
          type: postgresql
          host: "homelab-db-rw.cnpg-system.svc.cluster.local"
          database: nextcloud
          user: nextcloud
          existingSecret:
            enabled: true
            secretName: nextcloud-db-app
            passwordKey: password
        redis:
          enabled: false
        externalCache:
          enabled: true
          host: "redis.storage.svc.cluster.local"
          port: 6379
        persistence:
          enabled: true
          storageClass: "local-path"
          size: "20Gi"
          nextcloudData:
            enabled: true
            existingClaim: "nextcloud-data"
        startupProbe:
          enabled: true
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 600
        livenessProbe:
          enabled: true
          initialDelaySeconds: 10
        readinessProbe:
          enabled: true
          initialDelaySeconds: 10
    test:
      expected_endpoints: [https://cloud.smadja.dev]
      requires_extended_timeout: true

