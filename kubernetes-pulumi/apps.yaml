      expected_endpoints: [https://audiobooks.smadja.dev]

  - name: authentik
    category: public
    tier: critical
    namespace: authentik
    service_name: authentik-server
    port: 80
    hostname_prefix: auth
    mode: public
    homepage:
      description: Identity Provider
    clusters: [oci, local]
    dependencies: [cnpg-system, redis, external-secrets]
    extra_env:
      AUTHENTIK_COOKIE_DOMAIN: ".smadja.dev"
      AUTHENTIK_EMAIL__USE_TLS: "true"
    helm:
      chart: authentik
      name: authentik-release
      repo: https://charts.goauthentik.io
      version: 2026.2.1
      values:
        authentik:
          existingSecret:
            secretName: authentik-vars
        podSecurityContext:
          fsGroup: 1000
        redis:
          image:
            registry: docker.io
            repository: library/redis
            tag: 7.2
          master:
            persistence:
              enabled: false
            podSecurityContext:
              fsGroup: 1000
          shmSize: 256Mi
          global:
            security:
              allowInsecureImages: true
    storage:
      - name: data
        mount_path: /data
        existing_claim: authentik-data
        access: shared
    database_backup:
      enabled: true
      endpoint_url: "https://axnvxxurxefp.compat.objectstorage.eu-paris-1.oraclecloud.com"
      bucket: "velero-backups"
      access_key_id: "s3-backup-creds"
      secret_access_key: "s3-backup-creds"
    database:
      local: true
      size: "20Gi"
      storage_class: "oci-bv"
    secrets:
      - name: authentik-vars
        keys:
          AUTHENTIK_SECRET_KEY: AUTHENTIK_SECRET_KEY
          AUTHENTIK_REDIS_PASSWORD: AUTHENTIK_REDIS_PASSWORD
          AUTHENTIK_BOOTSTRAP_PASSWORD: AUTHENTIK_BOOTSTRAP_PASSWORD
          AUTHENTIK_BOOTSTRAP_TOKEN: AUTHENTIK_BOOTSTRAP_TOKEN
          AUTHENTIK_EMAIL__HOST: AUTHENTIK_SMTP_HOST
          AUTHENTIK_EMAIL__PORT: AUTHENTIK_SMTP_PORT
          AUTHENTIK_EMAIL__USERNAME: AUTHENTIK_SMTP_USERNAME
          AUTHENTIK_EMAIL__PASSWORD: AUTHENTIK_SMTP_PASSWORD
          AUTHENTIK_EMAIL__FROM: AUTHENTIK_SMTP_FROM
      - name: s3-backup-creds
        keys:
          access_key_id: OCI_S3_ACCESS_KEY
          secret_access_key: OCI_S3_SECRET_KEY
    test:
      routing: true
      requires_extended_timeout: true
      expected_endpoints: [https://auth.smadja.dev]

  # =============================================================================
  # PROTECTED APPLICATIONS - Exposed via Cloudflare Tunnel + Authentik
  # =============================================================================

  - name: vaultwarden
    category: public
    tier: critical
    namespace: vaultwarden
    port: 8080
    hostname_prefix: vault
    mode: public
    env_style: map
    homepage:
      description: Password Manager
    clusters: [oci]
    sso: authentik-oidc
    extra_env:
      ROCKET_PORT: "8080"
      DOMAIN: "https://vault.smadja.dev"
      SSO_ONLY: "false"                      # Keep password login as fallback
      SSO_SIGNUPS_MATCH_EMAIL: "true"        # Link SSO to existing accounts by email
    dependencies: [cnpg-system]
    requires: [postgres]
    database:
      size: "5Gi"
      storage_class: "oci-bv"
    helm:
      chart: vaultwarden
      repo: https://charts.gabe565.com
      version: 0.11.1
      values:
        image:
          repository: docker.io/vaultwarden/server
          tag: 1.33.2
        podSecurityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
        domain: vault.smadja.dev
        service:
          main:
            enabled: true
            ports:
              http:
                port: 8080
        extraEnv:
          - name: SSO_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: vaultwarden-oidc
                key: SSO_CLIENT_SECRET
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: vaultwarden-db-app
                key: uri
    storage:
      - name: data
        mount_path: /data
        existing_claim: vaultwarden-data
        type: pvc
        access: shared
    secrets:
      - name: vaultwarden-vars
        keys:
          ADMIN_TOKEN: VAULTWARDEN_ADMIN_TOKEN
      - name: vaultwarden-oidc
        keys:
          SSO_CLIENT_SECRET: VAULTWARDEN_OIDC_CLIENT_SECRET
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    test:
      routing: true
      requires_extended_timeout: true
      expected_endpoints: [https://vault.smadja.dev]

  # =============================================================================
  # INTERNAL APPLICATIONS - No external exposure
  # =============================================================================

  - name: kube-prometheus-stack
    category: internal
    tier: critical
    namespace: observability
    port: 9090
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system, external-secrets]
    disable_auto_route: true
    helm:
      chart: kube-prometheus-stack
      repo: https://prometheus-community.github.io/helm-charts
      version: 61.3.1
      values:
        crds:
          enabled: true
        grafana:
          enabled: false
        alertmanager:
          enabled: false
        prometheus:
          prometheusSpec:
            externalLabels:
              cluster: homelab-oci
            remoteWrite:
              - url: "${GRAFANA_CLOUD_PROM_URL}"
                basicAuth:
                  username:
                    name: observability-grafana-cloud
                    key: GRAFANA_CLOUD_PROM_USERNAME
                  password:
                    name: observability-grafana-cloud
                    key: GRAFANA_CLOUD_API_KEY
    secrets:
      - name: observability-grafana-cloud
        keys:
          GRAFANA_CLOUD_PROM_URL: GRAFANA_CLOUD_PROM_URL
          GRAFANA_CLOUD_PROM_USERNAME: GRAFANA_CLOUD_PROM_USERNAME
          GRAFANA_CLOUD_API_KEY: GRAFANA_CLOUD_API_KEY
    resources:
      requests:
        cpu: 200m
        memory: 512Mi

  - name: promtail
    category: internal
    tier: critical
    namespace: observability
    port: 3101
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system, external-secrets]
    disable_auto_route: true
    helm:
      chart: promtail
      repo: https://grafana.github.io/helm-charts
      version: 6.16.4
      values:
        config:
          clients:
            - url: "${GRAFANA_CLOUD_LOKI_URL}"
              basic_auth:
                username: "${GRAFANA_CLOUD_LOKI_USERNAME}"
                password: "${GRAFANA_CLOUD_API_KEY}"
    secrets:
      - name: observability-loki-auth
        keys:
          GRAFANA_CLOUD_LOKI_URL: GRAFANA_CLOUD_LOKI_URL
          GRAFANA_CLOUD_LOKI_USERNAME: GRAFANA_CLOUD_LOKI_USERNAME
          GRAFANA_CLOUD_API_KEY: GRAFANA_CLOUD_API_KEY
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

  # =============================================================================
  # INFRASTRUCTURE COMPONENTS
  # =============================================================================

  - name: cnpg-system
    category: database
    tier: critical
    namespace: cnpg-system
    port: 443
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system]
    disable_auto_route: true
    helm:
      chart: cloudnative-pg
      repo: https://cloudnative-pg.github.io/charts
      version: 0.22.1

  - name: redis
    category: database
    tier: critical
    namespace: storage
    port: 6379
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system]
    disable_auto_route: true
    helm:
      chart: redis-ha
      repo: https://dandydeveloper.github.io/charts
      version: 4.33.4
      values:
        image:
          repository: docker.io/library/redis
          tag: 7.2.7-alpine
        auth: false
        replicas: 1
        sentinel:
          enabled: false
        persistentVolume:
          enabled: true
          storageClass: "local-path"
          size: "10Gi"

  - name: external-secrets
    category: internal
    tier: critical
    namespace: external-secrets
    port: 443
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system]
    disable_auto_route: true
    skip_crds: true
    helm:
      chart: external-secrets
      repo: https://charts.external-secrets.io
      version: 0.14.3
      values:
        installCRDs: false
        serviceAccount:
          create: true
    test:
      expected_resources:
        - kind: ServiceAccount
          name: external-secrets

  - name: cert-manager
    category: internal
    tier: critical
    namespace: cert-manager
    port: 443
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system]
    disable_auto_route: true
    skip_crds: true
    inject_secrets: false
    helm:
      chart: cert-manager
      repo: https://charts.jetstack.io
      version: v1.16.2
      values:
        installCRDs: false
        serviceAccount:
          create: true
    secrets:
      - name: cloudflare-api-token
        keys:
          api_token: CLOUDFLARE_API_TOKEN

  - name: envoy-gateway
    category: internal
    tier: critical
    namespace: envoy-gateway
    port: 443
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system]
    disable_auto_route: true
    inject_secrets: false
    helm:
      chart: gateway-helm
      repo: oci://docker.io/envoyproxy
      version: v1.2.1
      values:
        serviceAccount:
          create: true
          name: envoy-gateway
    test:
      expected_resources:
        - kind: ServiceAccount
          name: envoy-gateway

  - name: cloudflared
    category: internal
    tier: critical
    namespace: cloudflared
    port: 443
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system, external-secrets]
    disable_auto_route: true
    inject_secrets: true
    allow_external: true
    helm:
      chart: cloudflare-tunnel-remote
      repo: https://cloudflare.github.io/helm-charts
      version: 0.1.2
      values:
        fullnameOverride: cloudflared-tunnel
        image:
          repository: docker.io/cloudflare/cloudflared
          tag: 2024.8.3
        cloudflare:
          tunnel_token: ""
    secrets:
      - name: cloudflared-tunnel-doppler
        keys:
          tunnelToken: CLOUDFLARE_TUNNEL_TOKEN

  - name: external-dns
    category: internal
    tier: critical
    namespace: external-dns
    port: 7979
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system, external-secrets]
    disable_auto_route: true
    allow_external: true
    helm:
      chart: external-dns
      repo: https://kubernetes-sigs.github.io/external-dns/
      version: 1.15.0
      values:
        provider: cloudflare
        serviceAccount:
          create: true
        sources:
          - ingress
        policy: upsert-only
        txtPrefix: "edns-"
        domainFilters:
          - smadja.dev
        extraArgs:
          - "--cloudflare-proxied"
        cloudflare:
          apiToken: ""
          proxied: true
        env:
          - name: CF_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: cloudflare-api-token
                key: api_token
    secrets:
      - name: cloudflare-api-token
        keys:
          api_token: CLOUDFLARE_API_TOKEN
      - name: hetzner-cloud-api-token
        keys:
          token: HETZNER_CLOUD_API_TOKEN

  - name: local-path-provisioner
    category: internal
    tier: critical
    namespace: kube-system
    port: 80
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system]
    disable_auto_route: true
    helm:
      chart: local-path-provisioner
      repo: https://charts.containeroo.ch/
      version: 0.0.30
      values:
        image:
          repository: docker.io/rancher/local-path-provisioner
          tag: v0.0.34

  - name: csi-driver-smb
    category: internal
    tier: critical
    namespace: kube-system
    port: 443
    mode: internal
    clusters: [oci, local]
    dependencies: [kube-system]
    disable_auto_route: true
    helm:
      chart: csi-driver-smb
      repo: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-smb/master/charts
      version: v1.16.0
      values:
        feature:
          enableSMBSecurity: true
        serviceAccount:
          create: true
        controller:
          serviceAccount:
            create: true
        node:
          serviceAccount:
            create: true
