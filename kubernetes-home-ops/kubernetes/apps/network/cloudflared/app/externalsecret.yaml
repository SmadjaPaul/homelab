apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-secret
  namespace: network
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: cloudflared-secret
    template:
      engineVersion: v2
      data:
        TUNNEL_TOKEN: "{{ .HOME_OPS_CLOUDFLARE_TUNNEL_TOKEN }}"
  data:
    - secretKey: HOME_OPS_CLOUDFLARE_TUNNEL_TOKEN
      remoteRef:
        key: HOME_OPS_CLOUDFLARE_TUNNEL_TOKEN
