---
# yaml-language-server: $schema=https://k8s-schemas.smadja.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: doppler
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: doppler-secret
    template:
      data:
        1password-credentials.json: "{{ .credentials }}"
        token: "{{ .token }}"
  dataFrom:
    - extract:
        key: 1password connect
