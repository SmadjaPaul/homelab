# Pre-commit hooks for security and code quality
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # =============================================================================
  # Local - Context Sync
  # =============================================================================
  - repo: local
    hooks:
      - id: update-service-catalog
        name: 📋 Update SERVICE-CATALOG.md from apps.yaml
        entry: uv run --with PyYAML python scripts/update-context.py
        language: system
        files: ^kubernetes-pulumi/apps\.yaml$
        pass_filenames: false

  # =============================================================================
  # Security - Secret Detection
  # =============================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: 🔐 Detect secrets (gitleaks)
        exclude: |
          (?x)^(
            terraform/proxmox/.*|
            kubernetes-home-ops/kubernetes/talos/.*
          )$

  # =============================================================================
  # Terraform
  # =============================================================================
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
        name: 📐 Terraform format
      - id: terraform_validate
        name: ✅ Terraform validate
        args:
          - --tf-init-args=-backend=false
        exclude: |
          (?x)^(
            terraform/proxmox/.*
          )$
      - id: terraform_docs
        name: 📖 Terraform docs
        files: ^terraform/

  # =============================================================================
  # YAML
  # =============================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: 📋 YAML lint
        args: [-c=.yamllint.yaml]
        exclude: (_bmad|.*/charts/.*|.*/crds/.*|redis/.*|kubernetes-home-ops/.*)

  # =============================================================================
  # General Code Quality
  # =============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: 🧹 Trim trailing whitespace
      - id: end-of-file-fixer
        name: 📄 Fix end of files
      - id: check-yaml
        name: ✅ Check YAML syntax
        args: [--allow-multiple-documents, --unsafe]
        exclude: (_bmad|.*/charts/.*|.*/crds/.*|redis/.*)
      - id: check-json
        name: ✅ Check JSON syntax
        exclude: (docs-site/tsconfig\.json$|kubernetes-pulumi/doppler\.json$)
      - id: check-merge-conflict
        name: 🔀 Check merge conflicts
      - id: check-added-large-files
        name: 📦 Check large files
        args: [--maxkb=2500]
      - id: detect-private-key
        name: 🔑 Detect private keys
        exclude: |
          (?x)^(
            docs/.*\.md$|
            \.github/actions/oci-vault-secrets/action\.yml|
            \.github/actions/setup-ssh-key/action\.yml|
            \.github/workflows/deploy-oci-mgmt\.yml|
            scripts/update-oci-vault-ssh-key\.sh|
            \.env\.example$|
            terraform/proxmox/.*|
            kubernetes-home-ops/kubernetes/talos/.*
          )$  # Docs/examples; workflow+action use BEGIN/END only as repair strings

  # =============================================================================
  # Shell Scripts
  # =============================================================================
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: 🐚 Shell script lint
        args: [-S, error]
        exclude: |
          (?x)^(
            terraform/.*/templates/.*
          )$

  # =============================================================================
  # Python - Linting & Formatting
  # =============================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        name: 🐍 Ruff linter
        args: [--fix]
      - id: ruff-format
        name: 🎨 Ruff formatter

# Skip certain files globally
exclude: |
  (?x)^(
    \.terraform/.*|
    \.terraform\.lock\.hcl|
    secrets/.*\.enc\.yaml|
    _bmad.*|
    terraform/proxmox/.*
  )$
