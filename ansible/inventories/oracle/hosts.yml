---
# OCI Management VM Inventory
# The IP is updated dynamically by the GitHub Actions workflow
# Workflow retrieves the IP from Terraform output and updates this file
all:
  children:
    oci_mgmt_group:
      hosts:
        oci-mgmt:
          # This IP is updated by CI/CD pipeline - DO NOT COMMIT CHANGES
          # Default placeholder - will be replaced by pipeline
          ansible_host: 0.0.0.0
          ansible_user: ubuntu
          ansible_port: 22
          ansible_private_key_file: ~/.ssh/oci-homelab
          ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
          # For GitOps - path to oci-core on the VM
          oci_core_path: /opt/oci-core
