---
- name: Deploy OCI Core Services
  hosts: oci_mgmt
  vars:
    oci_core_path: "/opt/oci-core"
    doppler_token: "{{ lookup('env', 'DOPPLER_TOKEN') }}"
  become: yes
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Ensure Docker is installed
      ansible.builtin.package:
        name: docker.io
        state: present

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Create OCI Core directory
      ansible.builtin.file:
        path: "{{ oci_core_path }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Sync OCI Core files from local repository
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../docker/oci-core/"
        dest: "{{ oci_core_path }}/"
        delete: yes
        rsync_opts:
          - "--exclude=.env"
          - "--exclude=data"
          - "--exclude=.git"

    - name: Ensure data directories exist
      ansible.builtin.file:
        path: "{{ oci_core_path }}/{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
        - data/traefik/letsencrypt
        - data/authentik/postgres
        - data/authentik/redis
        - data/authentik/media
        - data/authentik/custom-templates
        - data/authentik/certs
        - data/prometheus
        - data/uptime-kuma
        - data/gotify
        - data/gitea
        - data/vaultwarden
        - data/filebrowser/database
        - config

    - name: Check if Doppler CLI is installed
      ansible.builtin.command: which doppler
      register: doppler_check
      ignore_errors: true
      changed_when: false

    - name: Install Doppler CLI if not present
      ansible.builtin.shell: |
        curl -Ls https://cli.doppler.com/install.sh | sh
      when: doppler_check.rc != 0

    - name: Create .env file from template
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../docker/oci-core/.env.example"
        dest: "{{ oci_core_path }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: '0600'
      vars:
        acme_email: "admin@smadja.dev"
        cloudflare_tunnel_token: "{{ lookup('env', 'CLOUDFLARE_TUNNEL_TOKEN') }}"
        authentik_secret_key: "{{ lookup('env', 'AUTHENTIK_SECRET_KEY') }}"
        authentik_postgres_password: "{{ lookup('env', 'AUTHENTIK_POSTGRES_PASSWORD') }}"
        vaultwarden_admin_token: "{{ lookup('env', 'VAULTWARDEN_ADMIN_TOKEN') }}"
        gotify_defaultuser_pass: "{{ lookup('env', 'GOTIFY_DEFAULTUSER_PASS') }}"
      ignore_errors: true

    - name: Pull Docker images for core profile
      ansible.builtin.shell: |
        docker compose --profile core pull
      args:
        chdir: "{{ oci_core_path }}"

    - name: Stop systemd-resolved to free port 53
      ansible.builtin.systemd:
        name: systemd-resolved
        state: stopped
        enabled: no
      ignore_errors: true

    - name: Configure DNS resolver
      ansible.builtin.copy:
        content: |
          nameserver 1.1.1.1
        dest: /etc/resolv.conf
        owner: root
        group: root
        mode: '0644'
      ignore_errors: true

    - name: Deploy core profile with Doppler
      ansible.builtin.shell: |
        DOPPLER_TOKEN="{{ doppler_token }}" doppler run --project infrastructure --config prd_infrastructure -- docker compose --profile core up -d
      args:
        chdir: "{{ oci_core_path }}"
      environment:
        DOPPLER_TOKEN: "{{ doppler_token }}"
      ignore_errors: true

    - name: Deploy monitoring profile
      ansible.builtin.shell: |
        DOPPLER_TOKEN="{{ doppler_token }}" doppler run --project infrastructure --config prd_infrastructure -- docker compose --profile monitoring up -d
      args:
        chdir: "{{ oci_core_path }}"
      environment:
        DOPPLER_TOKEN: "{{ doppler_token }}"
      ignore_errors: true

    - name: Deploy apps profile
      ansible.builtin.shell: |
        DOPPLER_TOKEN="{{ doppler_token }}" doppler run --project infrastructure --config prd_infrastructure -- docker compose --profile apps up -d
      args:
        chdir: "{{ oci_core_path }}"
      environment:
        DOPPLER_TOKEN: "{{ doppler_token }}"
      ignore_errors: true

    - name: Show Docker container status
      ansible.builtin.command: docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
      register: docker_status

    - name: Display Docker status
      ansible.builtin.debug:
        var: docker_status.stdout_lines
