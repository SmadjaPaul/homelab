name: 'Run Ansible'
description: 'Run Ansible playbook on OCI management VM'
inputs:
  terraform-version:
    description: 'Terraform version'
    required: false
    default: '1.14.4'
  ansible-playbook:
    description: 'Path to ansible playbook'
    required: false
    default: 'ansible/playbooks/deploy-oci-core.yml'
  ansible-inventory:
    description: 'Path to ansible inventory'
    required: false
    default: 'ansible/inventories/oracle/hosts.yml'
  # OCI Credentials
  oci-cli-user:
    description: 'OCI CLI User'
    required: true
  oci-cli-fingerprint:
    description: 'OCI CLI Fingerprint'
    required: true
  oci-cli-tenancy:
    description: 'OCI CLI Tenancy'
    required: true
  oci-cli-region:
    description: 'OCI CLI Region'
    required: true
  oci-cli-key-content:
    description: 'OCI CLI Private Key Content'
    required: true
  oci-object-storage-namespace:
    description: 'OCI Object Storage Namespace'
    required: true
  oci-mgmt-ip:
    description: 'OCI Management VM IP (optional)'
    required: false
    default: ''
  # SSH
  ssh-private-key:
    description: 'SSH Private Key'
    required: true
  # Secrets for Ansible
  cloudflare-tunnel-token:
    description: 'Cloudflare Tunnel Token'
    required: true
  litellm-master-key:
    description: 'Litellm Master Key'
    required: false
    default: ''
  openclaw-jwt-secret:
    description: 'OpenClaw JWT Secret'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Setup SSH key
      shell: bash
      run: |
        mkdir -p ~/.ssh
        echo "${{ inputs.ssh-private-key }}" > ~/.ssh/oci-homelab
        chmod 600 ~/.ssh/oci-homelab

    - name: Setup Terraform (get VM IP)
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Configure OCI
      shell: bash
      run: |
        mkdir -p ~/.oci
        echo "${{ inputs.oci-cli-key-content }}" > ~/.oci/oci_api_key.pem
        chmod 600 ~/.oci/oci_api_key.pem
        cat > ~/.oci/config << OCIEOF
        [DEFAULT]
        user=${{ inputs.oci-cli-user }}
        fingerprint=${{ inputs.oci-cli-fingerprint }}
        tenancy=${{ inputs.oci-cli-tenancy }}
        region=${{ inputs.oci-cli-region }}
        key_file=$HOME/.oci/oci_api_key.pem
        OCIEOF

    - name: Inject backend namespace
      shell: bash
      working-directory: terraform/oracle-cloud
      run: |
        sed -i.bak "s/YOUR_TENANCY_NAMESPACE/${{ inputs.oci-object-storage-namespace }}/g" backend.tf

    - name: Terraform Init
      shell: bash
      working-directory: terraform/oracle-cloud
      run: terraform init -reconfigure

    - name: Get management VM IP
      id: get-ip
      shell: bash
      working-directory: terraform/oracle-cloud
      run: |
        # Prefer OCI_MGMT_IP from inputs if provided
        if [[ -n "${{ inputs.oci-mgmt-ip }}" ]]; then
          IP="${{ inputs.oci-mgmt-ip }}"
          echo "Using OCI_MGMT_IP from inputs: $IP"
        else
          IP=$(terraform output -json 2>/dev/null | jq -r '.management_vm.value.public_ip // empty')
          echo "Using IP from Terraform: $IP"
        fi
        echo "public_ip=$IP" >> $GITHUB_OUTPUT
        echo "vm_exists=$([[ -n "$IP" ]] && echo "true" || echo "false")" >> $GITHUB_OUTPUT

    - name: Setup Python
      if: steps.get-ip.outputs.vm_exists == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Ansible
      if: steps.get-ip.outputs.vm_exists == 'true'
      shell: bash
      run: pip install ansible

    - name: Run Ansible Playbook
      if: steps.get-ip.outputs.vm_exists == 'true'
      shell: bash
      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        OCI_MGMT_IP: ${{ steps.get-ip.outputs.public_ip }}
        CLOUDFLARE_TUNNEL_TOKEN: ${{ inputs.cloudflare-tunnel-token }}
        LITELLM_MASTER_KEY: ${{ inputs.litellm-master-key }}
        OPENCLAW_JWT_SECRET: ${{ inputs.openclaw-jwt-secret }}
      run: |
        ansible-playbook -i ${{ inputs.ansible-inventory }} ${{ inputs.ansible-playbook }} \
          --private-key ~/.ssh/oci-homelab \
          -u ubuntu \
          -e "oci_mgmt_ip=${{ steps.get-ip.outputs.public_ip }}"

    - name: Verify deployment
      if: steps.get-ip.outputs.vm_exists == 'true'
      shell: bash
      run: |
        echo "Checking container status..."
        ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o ConnectTimeout=10 ubuntu@${{ steps.get-ip.outputs.public_ip }} "docker ps --format 'table {{.Names}}\t{{.Status}}'"

        # Check for restarting containers
        RESTARTING=$(ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o ConnectTimeout=10 ubuntu@${{ steps.get-ip.outputs.public_ip }} "docker ps --filter 'status=restarting' --format '{{.Names}}'" || true)
        if [ -n "$RESTARTING" ]; then
          echo "⚠️ WARNING: The following containers are restarting:"
          echo "$RESTARTING"

          # Show logs for restarting containers
          for container in $RESTARTING; do
            echo "=== Logs for $container ==="
            ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o ConnectTimeout=10 ubuntu@${{ steps.get-ip.outputs.public_ip }} "docker logs --tail 20 $container" || true
          done

          # Try to fix cloudflared specifically
          if echo "$RESTARTING" | grep -q "cloudflared"; then
            echo "🔧 Attempting to fix cloudflared..."
            ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o ConnectTimeout=10 ubuntu@${{ steps.get-ip.outputs.public_ip }} "docker rm -f oci-core-cloudflared-1 2>/dev/null || true; docker rm -f cloudflared 2>/dev/null || true"
            ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o ConnectTimeout=10 ubuntu@${{ steps.get-ip.outputs.public_ip }} "cd /opt/oci-core && docker compose --profile core up -d cloudflared"
            sleep 5
          fi

          # Final check
          sleep 5
          echo "=== Final container status ==="
          ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o ConnectTimeout=10 ubuntu@${{ steps.get-ip.outputs.public_ip }} "docker ps --format 'table {{.Names}}\t{{.Status}}'"
        else
          echo "✅ All containers are running properly!"
        fi
