name: 'Setup OCI CLI'
description: 'Configure OCI CLI with credentials from inputs'
inputs:
  oci-cli-user:
    description: 'OCI CLI User'
    required: true
  oci-cli-fingerprint:
    description: 'OCI CLI Fingerprint'
    required: true
  oci-cli-tenancy:
    description: 'OCI CLI Tenancy'
    required: true
  oci-cli-region:
    description: 'OCI CLI Region'
    required: true
  oci-cli-key-content:
    description: 'OCI CLI Private Key Content'
    required: true
  oci-object-storage-namespace:
    description: 'OCI Object Storage Namespace'
    required: true
  oci-compartment-id:
    description: 'OCI Compartment ID'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Configure OCI CLI
      shell: bash
      run: |
        mkdir -p ~/.oci
        printf '%s\n' "${{ inputs.oci-cli-key-content }}" > ~/.oci/oci_api_key.pem
        chmod 600 ~/.oci/oci_api_key.pem
        printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/oci_api_key.pem\n' \
          "${{ inputs.oci-cli-user }}" \
          "${{ inputs.oci-cli-fingerprint }}" \
          "${{ inputs.oci-cli-tenancy }}" \
          "${{ inputs.oci-cli-region }}" \
          "$HOME" > ~/.oci/config

        # Export as environment variables for Terraform provider and backend
        echo "OCI_CLI_USER=${{ inputs.oci-cli-user }}" >> $GITHUB_ENV
        echo "OCI_CLI_FINGERPRINT=${{ inputs.oci-cli-fingerprint }}" >> $GITHUB_ENV
        echo "OCI_CLI_TENANCY=${{ inputs.oci-cli-tenancy }}" >> $GITHUB_ENV
        echo "OCI_CLI_REGION=${{ inputs.oci-cli-region }}" >> $GITHUB_ENV
        echo "OCI_CLI_KEY_CONTENT=${{ inputs.oci-cli-key-content }}" >> $GITHUB_ENV
        echo "OCI_OBJECT_STORAGE_NAMESPACE=${{ inputs.oci-object-storage-namespace }}" >> $GITHUB_ENV

        if [ -n "${{ inputs.oci-compartment-id }}" ]; then
          echo "OCI_COMPARTMENT_ID=${{ inputs.oci-compartment-id }}" >> $GITHUB_ENV
        fi

        echo "✅ OCI CLI configured and environment variables exported"

    - name: Export namespace
      id: namespace
      shell: bash
      run: |
        echo "namespace=${{ inputs.oci-object-storage-namespace }}" >> $GITHUB_OUTPUT
