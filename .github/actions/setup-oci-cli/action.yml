name: 'Setup OCI CLI'
description: 'Configure OCI CLI with credentials from environment secrets'
runs:
  using: 'composite'
  steps:
    - name: Debug secrets
      shell: bash
      run: |
        echo "OCI_CLI_USER: ${OCI_CLI_USER:-not set}"
        echo "OCI_CLI_TENANCY: ${OCI_CLI_TENANCY:-not set}"
        echo "OCI_CLI_REGION: ${OCI_CLI_REGION:-not set}"
        echo "OCI_OBJECT_STORAGE_NAMESPACE: ${OCI_OBJECT_STORAGE_NAMESPACE:-not set}"
        echo "---"
        echo "secrets.OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT != '' && 'set' || 'NOT SET' }}"
        echo "secrets.OCI_CLI_USER: ${{ secrets.OCI_CLI_USER != '' && 'set' || 'NOT SET' }}"
        echo "secrets.OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY != '' && 'set' || 'NOT SET' }}"
        echo "secrets.OCI_OBJECT_STORAGE_NAMESPACE: ${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE != '' && 'set' || 'NOT SET' }}"

    - name: Configure OCI CLI
      shell: bash
      run: |
        mkdir -p ~/.oci
        printf '%s\n' "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
        chmod 600 ~/.oci/oci_api_key.pem
        printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/oci_api_key.pem\n' \
          "${{ secrets.OCI_CLI_USER }}" \
          "${{ secrets.OCI_CLI_FINGERPRINT }}" \
          "${{ secrets.OCI_CLI_TENANCY }}" \
          "${{ secrets.OCI_CLI_REGION }}" \
          "$HOME" > ~/.oci/config

    - name: Export namespace
      id: namespace
      shell: bash
      run: |
        echo "namespace=${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}" >> $GITHUB_OUTPUT
