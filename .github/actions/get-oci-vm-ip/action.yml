name: 'Get OCI VM IP'
description: 'Get the public IP of the OCI management VM'
inputs:
  working-directory:
    description: 'Terraform working directory'
    required: false
    default: 'terraform/oracle-cloud'
  oci-cli-user:
    description: 'OCI CLI User'
    required: true
  oci-cli-fingerprint:
    description: 'OCI CLI Fingerprint'
    required: true
  oci-cli-tenancy:
    description: 'OCI CLI Tenancy'
    required: true
  oci-cli-region:
    description: 'OCI CLI Region'
    required: true
  oci-cli-key-content:
    description: 'OCI CLI Private Key Content'
    required: true
  oci-object-storage-namespace:
    description: 'OCI Object Storage Namespace'
    required: true
  oci-mgmt-ip:
    description: 'OCI Management VM IP (optional, will query Terraform if not provided)'
    required: false
    default: ''
outputs:
  vm_ip:
    description: 'Public IP of the management VM'
    value: ${{ steps.get-ip.outputs.vm_ip }}
  vm_exists:
    description: 'Whether the VM exists'
    value: ${{ steps.get-ip.outputs.vm_exists }}
runs:
  using: 'composite'
  steps:
    - name: Setup OCI CLI
      uses: ./.github/actions/setup-oci-cli
      with:
        oci-cli-user: ${{ inputs.oci-cli-user }}
        oci-cli-fingerprint: ${{ inputs.oci-cli-fingerprint }}
        oci-cli-tenancy: ${{ inputs.oci-cli-tenancy }}
        oci-cli-region: ${{ inputs.oci-cli-region }}
        oci-cli-key-content: ${{ inputs.oci-cli-key-content }}
        oci-object-storage-namespace: ${{ inputs.oci-object-storage-namespace }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: '1.14.4'
        terraform_wrapper: false

    - name: Inject backend namespace
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        NAMESPACE="${{ inputs.oci-object-storage-namespace }}"
        if [ -f "backend.tf" ]; then
          sed -i.bak "s/YOUR_TENANCY_NAMESPACE/$NAMESPACE/g" backend.tf 2>/dev/null || true
        fi

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform init -reconfigure

    - name: Get VM IP
      id: get-ip
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Prefer OCI_MGMT_IP from inputs if provided
        if [[ -n "${{ inputs.oci-mgmt-ip }}" ]]; then
          IP="${{ inputs.oci-mgmt-ip }}"
          echo "Using OCI_MGMT_IP from inputs: $IP"
        else
          IP=$(terraform output -json 2>/dev/null | jq -r '.management_vm.value.public_ip // empty')
          echo "Using IP from Terraform: $IP"
        fi
        echo "vm_ip=$IP" >> $GITHUB_OUTPUT
        echo "vm_exists=$([[ -n "$IP" ]] && echo "true" || echo "false")" >> $GITHUB_OUTPUT

        if [ -n "$IP" ]; then
          echo "✅ VM IP: $IP"
        else
          echo "⚠️ No VM IP found"
        fi
