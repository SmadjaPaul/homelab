name: 'Deploy Docker Compose to OCI'
description: 'Deploy Docker Compose stack to OCI management VM with GitHub secrets'
inputs:
  compose-project:
    description: 'Docker Compose project name'
    required: false
    default: 'oci-core'
  compose-profile:
    description: 'Docker Compose profile to use'
    required: false
    default: 'core'
  working-directory:
    description: 'Working directory on remote VM'
    required: false
    default: '/opt/oci-core'
  wait-for-healthy:
    description: 'Wait for containers to be healthy'
    required: false
    default: 'true'
  health-timeout:
    description: 'Timeout in seconds for health check'
    required: false
    default: '300'
  # OCI Credentials
  oci-cli-user:
    description: 'OCI CLI User'
    required: true
  oci-cli-fingerprint:
    description: 'OCI CLI Fingerprint'
    required: true
  oci-cli-tenancy:
    description: 'OCI CLI Tenancy'
    required: true
  oci-cli-region:
    description: 'OCI CLI Region'
    required: true
  oci-cli-key-content:
    description: 'OCI CLI Private Key Content'
    required: true
  oci-object-storage-namespace:
    description: 'OCI Object Storage Namespace'
    required: true
  # SSH
  ssh-private-key:
    description: 'SSH Private Key'
    required: true
  # VM IP
  vm-ip:
    description: 'VM IP address (optional, will be fetched if not provided)'
    required: false
    default: ''
  # Secrets for .env file
  acme-email:
    description: 'ACME Email'
    required: true
  cloudflare-tunnel-token:
    description: 'Cloudflare Tunnel Token'
    required: true
  authentik-secret-key:
    description: 'Authentik Secret Key'
    required: false
    default: ''
  authentik-bootstrap-token:
    description: 'Authentik Bootstrap Token'
    required: false
    default: ''
  authentik-bootstrap-password:
    description: 'Authentik Bootstrap Password'
    required: false
    default: ''
  authentik-postgres-host:
    description: 'Authentik PostgreSQL Host'
    required: false
    default: ''
  authentik-postgres-port:
    description: 'Authentik PostgreSQL Port'
    required: false
    default: ''
  authentik-postgres-name:
    description: 'Authentik PostgreSQL Database Name'
    required: false
    default: ''
  authentik-postgres-user:
    description: 'Authentik PostgreSQL User'
    required: false
    default: ''
  authentik-postgres-password:
    description: 'Authentik PostgreSQL Password'
    required: false
    default: ''
  litellm-master-key:
    description: 'Litellm Master Key'
    required: false
    default: ''
  openclaw-litellm-key:
    description: 'OpenClaw Litellm Key'
    required: false
    default: ''
  openclaw-jwt-secret:
    description: 'OpenClaw JWT Secret'
    required: false
    default: ''
  grafana-cloud-metrics-url:
    description: 'Grafana Cloud Metrics URL'
    required: false
    default: ''
  grafana-cloud-logs-url:
    description: 'Grafana Cloud Logs URL'
    required: false
    default: ''
  grafana-cloud-api-key:
    description: 'Grafana Cloud API Key'
    required: false
    default: ''
  domain:
    description: 'Domain'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Install required tools
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq jq rsync

    - name: Setup OCI CLI
      uses: ./.github/actions/setup-oci-cli
      with:
        oci-cli-user: ${{ inputs.oci-cli-user }}
        oci-cli-fingerprint: ${{ inputs.oci-cli-fingerprint }}
        oci-cli-tenancy: ${{ inputs.oci-cli-tenancy }}
        oci-cli-region: ${{ inputs.oci-cli-region }}
        oci-cli-key-content: ${{ inputs.oci-cli-key-content }}
        oci-object-storage-namespace: ${{ inputs.oci-object-storage-namespace }}

    - name: Setup SSH key
      shell: bash
      run: |
        mkdir -p ~/.ssh
        echo "${{ inputs.ssh-private-key }}" > ~/.ssh/oci-homelab
        chmod 600 ~/.ssh/oci-homelab

    - name: Get VM IP
      id: get-ip
      shell: bash
      run: |
        # Use provided VM IP or query Terraform
        if [[ -n "${{ inputs.vm-ip }}" ]]; then
          IP="${{ inputs.vm-ip }}"
          echo "Using provided VM IP: $IP"
        else
          cd terraform/oracle-cloud
          # Inject namespace first
          NAMESPACE="${{ inputs.oci-object-storage-namespace }}"
          if [ -f "backend.tf" ]; then
            sed -i.bak "s/YOUR_TENANCY_NAMESPACE/$NAMESPACE/g" backend.tf 2>/dev/null || true
          fi
          terraform init -reconfigure
          IP=$(terraform output -json 2>/dev/null | jq -r '.management_vm.value.public_ip // empty')
          echo "Using IP from Terraform: $IP"
        fi
        echo "vm_ip=$IP" >> $GITHUB_OUTPUT
        echo "vm_exists=$([[ -n "$IP" ]] && echo "true" || echo "false")" >> $GITHUB_OUTPUT

    - name: Create .env file with secrets
      if: steps.get-ip.outputs.vm_exists == 'true'
      shell: bash
      run: |
        # Check if .env exists on VM (uploaded from workflow)
        ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o BatchMode=yes \
          ubuntu@${{ steps.get-ip.outputs.vm_ip }} \
          "test -f ${{ inputs.working-directory }}/.env && echo 'Env file exists' || echo 'Env file missing'"

    - name: Sync files to VM
      if: steps.get-ip.outputs.vm_exists == 'true'
      shell: bash
      run: |
        rsync -avz --exclude='.env' --exclude='data' --exclude='.git' \
          -e "ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o BatchMode=yes" \
          ./docker/${{ inputs.compose-project }}/ \
          ubuntu@${{ steps.get-ip.outputs.vm_ip }}:${{ inputs.working-directory }}/

    - name: Create directories
      if: steps.get-ip.outputs.vm_exists == 'true'
      shell: bash
      run: |
        ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o BatchMode=yes \
          ubuntu@${{ steps.get-ip.outputs.vm_ip }} \
          "mkdir -p ${{ inputs.working-directory }}/data"

    - name: Deploy with Docker Compose
      if: steps.get-ip.outputs.vm_exists == 'true'
      shell: bash
      run: |
        ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o BatchMode=yes \
          ubuntu@${{ steps.get-ip.outputs.vm_ip }} \
          "cd ${{ inputs.working-directory }} && docker compose --profile ${{ inputs.compose-profile }} up -d --force-recreate --remove-orphans"

    - name: Wait for healthy containers
      if: steps.get-ip.outputs.vm_exists == 'true' && inputs.wait-for-healthy == 'true'
      shell: bash
      run: |
        echo "Waiting for containers to be healthy..."
        TIMEOUT=${{ inputs.health-timeout }}
        START_TIME=$(date +%s)

        while true; do
          CURRENT_TIME=$(date +%s)
          ELAPSED=$((CURRENT_TIME - START_TIME))

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "⚠️ Timeout waiting for containers"
            break
          fi

          # Check if all containers are healthy or running
          UNHEALTHY=$(ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
            ubuntu@${{ steps.get-ip.outputs.vm_ip }} \
            "docker ps --filter 'health=unhealthy' --format '{{.Names}}'" 2>/dev/null)

          if [ -z "$UNHEALTHY" ]; then
            echo "✅ All containers are healthy!"
            break
          fi

          echo "⏳ Waiting... (${ELAPSED}s elapsed)"
          sleep 10
        done

    - name: Check container status
      if: steps.get-ip.outputs.vm_exists == 'true'
      shell: bash
      run: |
        echo "=== Container Status ==="
        ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
          ubuntu@${{ steps.get-ip.outputs.vm_ip }} \
          "docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'"

        # Check for restarting containers
        RESTARTING=$(ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
          ubuntu@${{ steps.get-ip.outputs.vm_ip }} \
          "docker ps --filter 'status=restarting' --format '{{.Names}}'" 2>/dev/null || true)

        if [ -n "$RESTARTING" ]; then
          echo ""
          echo "⚠️ WARNING: Containers restarting:"
          echo "$RESTARTING"

          for container in $RESTARTING; do
            echo ""
            echo "=== Logs for $container ==="
            ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              ubuntu@${{ steps.get-ip.outputs.vm_ip }} \
              "docker logs --tail 30 $container" || true
          done
        fi
