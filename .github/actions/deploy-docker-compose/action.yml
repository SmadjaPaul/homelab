name: 'Deploy Docker Compose to OCI'
description: 'Deploy Docker Compose stack to OCI management VM with GitHub secrets'
inputs:
  compose-project:
    description: 'Docker Compose project name'
    required: false
    default: 'oci-core'
  compose-profile:
    description: 'Docker Compose profile to use'
    required: false
    default: 'core'
  working-directory:
    description: 'Working directory on remote VM'
    required: false
    default: '/opt/oci-core'
  wait-for-healthy:
    description: 'Wait for containers to be healthy'
    required: false
    default: 'true'
  health-timeout:
    description: 'Timeout in seconds for health check'
    required: false
    default: '300'
runs:
  using: 'composite'
  steps:
    - name: Install required tools
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq jq rsync

    - name: Setup OCI CLI
      uses: ./.github/actions/setup-oci-cli

    - name: Setup SSH key
      shell: bash
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/oci-homelab
        chmod 600 ~/.ssh/oci-homelab

    - name: Get VM IP
      id: get-ip
      shell: bash
      run: |
        # Prefer OCI_MGMT_IP from environment secrets if set
        if [[ -n "${{ secrets.OCI_MGMT_IP }}" ]]; then
          IP="${{ secrets.OCI_MGMT_IP }}"
          echo "Using OCI_MGMT_IP from environment: $IP"
        else
          cd terraform/oracle-cloud
          IP=$(terraform output -json 2>/dev/null | jq -r '.management_vm.value.public_ip // empty')
          echo "Using IP from Terraform: $IP"
        fi
        echo "vm_ip=$IP" >> $GITHUB_OUTPUT
        echo "vm_exists=$([[ -n "$IP" ]] && echo "true" || echo "false")" >> $GITHUB_OUTPUT

    - name: Create .env file with secrets
      if: steps.get-ip.outputs.vm_exists == 'true'
      shell: bash
      run: |
        cat > /tmp/oci-core.env << 'EOF'
        # Core
        ACME_EMAIL=${{ secrets.ACME_EMAIL }}
        CLOUDFLARE_TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}

        # Authentik (if needed)
        AUTHENTIK_SECRET_KEY=${{ secrets.AUTHENTIK_SECRET_KEY }}
        AUTHENTIK_BOOTSTRAP_TOKEN=${{ secrets.AUTHENTIK_BOOTSTRAP_TOKEN }}
        AUTHENTIK_BOOTSTRAP_PASSWORD=${{ secrets.AUTHENTIK_BOOTSTRAP_PASSWORD }}

        # PostgreSQL (if needed)
        AUTHENTIK_POSTGRES_HOST=${{ secrets.AUTHENTIK_POSTGRES_HOST }}
        AUTHENTIK_POSTGRES_PORT=${{ secrets.AUTHENTIK_POSTGRES_PORT }}
        AUTHENTIK_POSTGRES_NAME=${{ secrets.AUTHENTIK_POSTGRES_NAME }}
        AUTHENTIK_POSTGRES_USER=${{ secrets.AUTHENTIK_POSTGRES_USER }}
        AUTHENTIK_POSTGRES_PASSWORD=${{ secrets.AUTHENTIK_POSTGRES_PASSWORD }}

        # Litellm
        LITELLM_MASTER_KEY=${{ secrets.LITELLM_MASTER_KEY }}

        # OpenClaw
        OPENCLAW_LITELLM_KEY=${{ secrets.OPENCLAW_LITELLM_KEY }}
        OPENCLAW_JWT_SECRET=${{ secrets.OPENCLAW_JWT_SECRET }}

        # Grafana Cloud
        GRAFANA_CLOUD_METRICS_URL=${{ secrets.GRAFANA_CLOUD_METRICS_URL }}
        GRAFANA_CLOUD_LOGS_URL=${{ secrets.GRAFANA_CLOUD_LOGS_URL }}
        GRAFANA_CLOUD_API_KEY=${{ secrets.GRAFANA_CLOUD_API_KEY }}

        # Domain
        DOMAIN=${{ secrets.DOMAIN }}
        EOF
        echo "✅ Created .env file with secrets"

    - name: Sync files to VM
      if: steps.get-ip.outputs.vm_exists == 'true'
      shell: bash
      run: |
        rsync -avz --exclude='.env' --exclude='data' --exclude='.git' \
          -e "ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o BatchMode=yes" \
          ./docker/${{ inputs.compose-project }}/ \
          ubuntu@${{ steps.get-ip.outputs.vm_ip }}:${{ inputs.working-directory }}/

    - name: Upload .env file to VM
      if: steps.get-ip.outputs.vm_exists == 'true'
      shell: bash
      run: |
        scp -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no \
          /tmp/oci-core.env \
          ubuntu@${{ steps.get-ip.outputs.vm_ip }}:${{ inputs.working-directory }}/.env

    - name: Create directories
      if: steps.get-ip.outputs.vm_exists == 'true'
      shell: bash
      run: |
        ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o BatchMode=yes \
          ubuntu@${{ steps.get-ip.outputs.vm_ip }} \
          "mkdir -p ${{ inputs.working-directory }}/data"

    - name: Deploy with Docker Compose
      if: steps.get-ip.outputs.vm_exists == 'true'
      shell: bash
      run: |
        ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o BatchMode=yes \
          ubuntu@${{ steps.get-ip.outputs.vm_ip }} \
          "cd ${{ inputs.working-directory }} && docker compose --profile ${{ inputs.compose-profile }} up -d --remove-orphans"

    - name: Wait for healthy containers
      if: steps.get-ip.outputs.vm_exists == 'true' && inputs.wait-for-healthy == 'true'
      shell: bash
      run: |
        echo "Waiting for containers to be healthy..."
        TIMEOUT=${{ inputs.health-timeout }}
        START_TIME=$(date +%s)

        while true; do
          CURRENT_TIME=$(date +%s)
          ELAPSED=$((CURRENT_TIME - START_TIME))

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "⚠️ Timeout waiting for containers"
            break
          fi

          # Check if all containers are healthy or running
          UNHEALTHY=$(ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
            ubuntu@${{ steps.get-ip.outputs.vm_ip }} \
            "docker ps --filter 'health=unhealthy' --format '{{.Names}}'" 2>/dev/null)

          if [ -z "$UNHEALTHY" ]; then
            echo "✅ All containers are healthy!"
            break
          fi

          echo "⏳ Waiting... (${ELAPSED}s elapsed)"
          sleep 10
        done

    - name: Check container status
      if: steps.get-ip.outputs.vm_exists == 'true'
      shell: bash
      run: |
        echo "=== Container Status ==="
        ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
          ubuntu@${{ steps.get-ip.outputs.vm_ip }} \
          "docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'"

        # Check for restarting containers
        RESTARTING=$(ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
          ubuntu@${{ steps.get-ip.outputs.vm_ip }} \
          "docker ps --filter 'status=restarting' --format '{{.Names}}'" 2>/dev/null || true)

        if [ -n "$RESTARTING" ]; then
          echo ""
          echo "⚠️ WARNING: Containers restarting:"
          echo "$RESTARTING"

          for container in $RESTARTING; do
            echo ""
            echo "=== Logs for $container ==="
            ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              ubuntu@${{ steps.get-ip.outputs.vm_ip }} \
              "docker logs --tail 30 $container" || true
          done
        fi
