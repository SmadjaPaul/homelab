name: 'Setup OCI'
description: 'Configure OCI CLI with credentials from environment secrets'
runs:
  using: 'composite'
  steps:
    - name: Configure OCI CLI
      shell: bash
      run: |
        mkdir -p ~/.oci
        echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
        chmod 600 ~/.oci/oci_api_key.pem
        cat > ~/.oci/config << OCIEOF
        [DEFAULT]
        user=${{ secrets.OCI_CLI_USER }}
        fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}
        tenancy=${{ secrets.OCI_CLI_TENANCY }}
        region=${{ secrets.OCI_CLI_REGION }}
        key_file=$HOME/.oci/oci_api_key.pem
        OCIEOF

    - name: Export secrets as outputs
      shell: bash
      run: |
        echo "namespace=${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}" >> $GITHUB_OUTPUT
