name: 'Setup Authentik API Tunnel'
description: 'Create SSH tunnel to access Authentik API directly (bypassing Cloudflare)'
inputs:
  vm-ip:
    description: 'OCI VM IP address'
    required: true
  ssh-private-key:
    description: 'SSH private key'
    required: true
  authentik-port:
    description: 'Local port to forward'
    required: false
    default: '9000'
outputs:
  authentik-url:
    description: 'Local URL for Authentik API (http://localhost:PORT)'
    value: http://localhost:${{ inputs.authentik-port }}
runs:
  using: 'composite'
  steps:
    - name: Setup SSH key
      shell: bash
      run: |
        mkdir -p ~/.ssh
        echo "${{ inputs.ssh-private-key }}" > ~/.ssh/oci-homelab
        chmod 600 ~/.ssh/oci-homelab

    - name: Start SSH tunnel
      shell: bash
      run: |
        echo "Starting SSH tunnel to Authentik API..."
        ssh -f -N -L ${{ inputs.authentik-port }}:localhost:9000 \
          -i ~/.ssh/oci-homelab \
          -o StrictHostKeyChecking=no \
          -o ServerAliveInterval=60 \
          -o ServerAliveCountMax=3 \
          -o ExitOnForwardFailure=yes \
          ubuntu@${{ inputs.vm-ip }}

        # Verify tunnel is working
        sleep 2
        if nc -z localhost ${{ inputs.authentik-port }}; then
          echo "✅ SSH tunnel established successfully"
          echo "Authentik API available at: http://localhost:${{ inputs.authentik-port }}"
        else
          echo "❌ Failed to establish SSH tunnel"
          exit 1
        fi

    - name: Export environment variables
      shell: bash
      run: |
        echo "AUTHENTIK_URL=http://localhost:${{ inputs.authentik-port }}" >> $GITHUB_ENV
        echo "auth_url=http://localhost:${{ inputs.authentik-port }}" >> $GITHUB_OUTPUT
