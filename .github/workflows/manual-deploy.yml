name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Which step to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cloudflare
          - oci
          - oci_mgmt

env:
  TF_VERSION: '1.14.4'
  TF_CF: terraform/cloudflare
  TF_OCI: terraform/oracle-cloud

jobs:
  cloudflare:
    name: Cloudflare
    runs-on: ubuntu-latest
    if: github.event.inputs.step == 'all' || github.event.inputs.step == 'cloudflare'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Inject backend namespace
        working-directory: ${{ env.TF_CF }}
        run: sed -i.bak "s/YOUR_TENANCY_NAMESPACE/${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}/g" main.tf

      - name: Terraform Init
        working-directory: ${{ env.TF_CF }}
        run: terraform init -reconfigure

      - name: Create tfvars
        working-directory: ${{ env.TF_CF }}
        run: |
          cat > terraform.tfvars << EOF
          cloudflare_api_token = "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          zone_id = "${{ secrets.CLOUDFLARE_ZONE_ID }}"
          domain = "${{ secrets.DOMAIN }}"
          enable_tunnel = true
          cloudflare_account_id = "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          tunnel_secret = "${{ secrets.CLOUDFLARE_TUNNEL_SECRET }}"
          tunnel_id = "${{ secrets.CLOUDFLARE_TUNNEL_ID }}"
          enable_tunnel_config = true
          enable_zone_settings = false
          enable_geo_restriction = false
          enable_authentik_api_skip_challenge = false
          EOF

      - name: Terraform Apply
        working-directory: ${{ env.TF_CF }}
        run: terraform apply -refresh=false -auto-approve -lock=false

  oci:
    name: OCI Infrastructure
    runs-on: ubuntu-latest
    needs: cloudflare
    if: (github.event.inputs.step == 'all' || github.event.inputs.step == 'oci') && (needs.cloudflare.result == 'success' || needs.cloudflare.result == 'skipped')
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set SSH public key
        run: |
          echo "TF_VAR_ssh_public_key<<EOF" >> $GITHUB_ENV
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Inject backend namespace
        working-directory: ${{ env.TF_OCI }}
        run: sed -i.bak "s/YOUR_TENANCY_NAMESPACE/${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}/g" backend.tf

      - name: Terraform Init
        working-directory: ${{ env.TF_OCI }}
        run: terraform init -reconfigure

      - name: Terraform Apply
        working-directory: ${{ env.TF_OCI }}
        run: terraform apply -refresh=false -auto-approve -lock=false
        env:
          TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
          TF_VAR_budget_alert_email: ${{ secrets.ALERT_EMAIL }}

  oci-mgmt:
    name: Deploy oci-mgmt (Ansible)
    runs-on: ubuntu-latest
    needs: oci
    if: (github.event.inputs.step == 'all' || github.event.inputs.step == 'oci_mgmt') && (needs.oci.result == 'success' || needs.oci.result == 'skipped')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Run Ansible with verification
        uses: ./.github/actions/run-ansible
        with:
          terraform-version: ${{ env.TF_VERSION }}
