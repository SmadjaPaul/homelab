name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Which step to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cloudflare
          - oci
          - oci_mgmt
          - modular
          - core
          - authentik
          - monitoring
          - comet

env:
  TF_VERSION: '1.14.4'
  TF_CF: terraform/cloudflare
  TF_OCI: terraform/oracle-cloud

jobs:
  cloudflare:
    name: Cloudflare
    runs-on: ubuntu-latest
    if: github.event.inputs.step == 'all' || github.event.inputs.step == 'cloudflare'
    environment: production
    env:
      # OCI credentials for backend access
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_OBJECT_STORAGE_NAMESPACE: ${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform with OCI Backend
        uses: ./.github/actions/terraform-oci
        with:
          working-directory: ${{ env.TF_CF }}
          terraform-version: ${{ env.TF_VERSION }}
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          oci-object-storage-namespace: ${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_CF }}
        run: terraform apply -refresh=false -auto-approve -lock=false
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_domain: ${{ secrets.DOMAIN }}
          TF_VAR_tunnel_id: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
          TF_VAR_tunnel_secret: ${{ secrets.CLOUDFLARE_TUNNEL_SECRET }}
          TF_VAR_create_root_record: "false"
          TF_VAR_enable_authentik_api_skip_challenge: "true"

  oci:
    name: OCI Infrastructure
    runs-on: ubuntu-latest
    needs: cloudflare
    if: (github.event.inputs.step == 'all' || github.event.inputs.step == 'oci') && (needs.cloudflare.result == 'success' || needs.cloudflare.result == 'skipped')
    environment: production
    env:
      # OCI credentials for backend access
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_OBJECT_STORAGE_NAMESPACE: ${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform with OCI Backend
        uses: ./.github/actions/terraform-oci
        with:
          working-directory: ${{ env.TF_OCI }}
          terraform-version: ${{ env.TF_VERSION }}
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          oci-object-storage-namespace: ${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}
          oci-compartment-id: ${{ secrets.OCI_COMPARTMENT_ID }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_OCI }}
        run: terraform apply -refresh=false -auto-approve -lock=false
        env:
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
          TF_VAR_budget_alert_email: ${{ secrets.ALERT_EMAIL }}

  oci-mgmt-disabled:
    name: Deploy oci-mgmt (Legacy - Disabled)
    runs-on: ubuntu-latest
    needs: oci
    if: false  # Disabled - oci-core archived, use deploy-modular instead
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Get VM IP
        id: get-ip
        uses: ./.github/actions/get-oci-vm-ip
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          oci-object-storage-namespace: ${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}

      - name: Deploy Docker Compose
        uses: ./.github/actions/deploy-docker-compose
        with:
          compose-project: 'oci-core'
          compose-profile: 'core'
          wait-for-healthy: 'true'
          health-timeout: '300'
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          oci-object-storage-namespace: ${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          vm-ip: ${{ steps.get-ip.outputs.vm_ip }}
          acme-email: ${{ secrets.ACME_EMAIL }}
          cloudflare-tunnel-token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          authentik-secret-key: ${{ secrets.AUTHENTIK_SECRET_KEY }}
          authentik-bootstrap-token: ${{ secrets.AUTHENTIK_BOOTSTRAP_TOKEN }}
          authentik-bootstrap-password: ${{ secrets.AUTHENTIK_BOOTSTRAP_PASSWORD }}
          authentik-postgres-host: ${{ secrets.AUTHENTIK_POSTGRES_HOST }}
          authentik-postgres-port: ${{ secrets.AUTHENTIK_POSTGRES_PORT }}
          authentik-postgres-name: ${{ secrets.AUTHENTIK_POSTGRES_NAME }}
          authentik-postgres-user: ${{ secrets.AUTHENTIK_POSTGRES_USER }}
          authentik-postgres-password: ${{ secrets.AUTHENTIK_POSTGRES_PASSWORD }}
          litellm-master-key: ${{ secrets.LITELLM_MASTER_KEY }}
          openclaw-litellm-key: ${{ secrets.OPENCLAW_LITELLM_KEY }}
          openclaw-jwt-secret: ${{ secrets.OPENCLAW_JWT_SECRET }}
          grafana-cloud-metrics-url: ${{ secrets.GRAFANA_CLOUD_METRICS_URL }}
          grafana-cloud-logs-url: ${{ secrets.GRAFANA_CLOUD_LOGS_URL }}
          grafana-cloud-api-key: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          domain: ${{ secrets.DOMAIN }}

  deploy-modular:
    name: Deploy Modular Stack
    runs-on: ubuntu-latest
    needs: [cloudflare, oci]
    if: |
      (github.event.inputs.step == 'all' ||
       github.event.inputs.step == 'modular' ||
       github.event.inputs.step == 'core' ||
       github.event.inputs.step == 'authentik' ||
       github.event.inputs.step == 'monitoring' ||
       github.event.inputs.step == 'comet') &&
      (needs.cloudflare.result == 'success' || needs.cloudflare.result == 'skipped') &&
      (needs.oci.result == 'success' || needs.oci.result == 'skipped')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/oci-homelab
          chmod 600 ~/.ssh/oci-homelab
          cat >> ~/.ssh/config <<EOF
          Host oci
            HostName ${{ secrets.OCI_MGMT_IP }}
            User ubuntu
            IdentityFile ~/.ssh/oci-homelab
            StrictHostKeyChecking no
          EOF

      - name: Create directory on VM
        run: |
          ssh -i ~/.ssh/oci-homelab ubuntu@${{ secrets.OCI_MGMT_IP }} "sudo mkdir -p /opt/docker && sudo chown ubuntu:ubuntu /opt/docker"

      - name: Sync files to VM
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/oci-homelab" \
            ./docker/ \
            ubuntu@${{ secrets.OCI_MGMT_IP }}:/opt/docker/

      - name: Deploy with Doppler
        env:
          DOPPLER_TOKEN_INFRA: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_TOKEN_STREAM: ${{ secrets.DOPPLER_TOKEN_STREAM }}
        run: |
          ssh -i ~/.ssh/oci-homelab oci "
            cd /opt/docker

            # Install Doppler CLI if not present
            if ! command -v doppler &> /dev/null; then
              echo 'Installing Doppler CLI...'
              curl -Ls https://cli.doppler.com/install.sh | sh
            fi

            # Create networks if they don't exist
            docker network inspect traefik-public &>/dev/null || docker network create traefik-public
            docker network inspect authentik-private &>/dev/null || docker network create authentik-private
            docker network inspect monitoring &>/dev/null || docker network create monitoring
            docker network inspect streaming &>/dev/null || docker network create streaming

            # Determine which service to deploy
            SERVICE='${{ github.event.inputs.step }}'

            case $SERVICE in
              all|modular)
                echo 'Deploying all services...'
                export DOPPLER_TOKEN='$DOPPLER_TOKEN_INFRA'
                doppler run -p infrastructure -c prd -- docker-compose -f core/docker-compose.yml up -d
                sleep 5
                doppler run -p infrastructure -c prd -- docker-compose -f authentik/docker-compose.yml up -d
                sleep 10
                doppler run -p infrastructure -c prd -- docker-compose -f monitoring/docker-compose.yml up -d
                export DOPPLER_TOKEN='$DOPPLER_TOKEN_STREAM'
                doppler run -p stream -c prd -- docker-compose -f services/comet/docker-compose.yml up -d
                ;;
              core)
                echo 'Deploying Core...'
                export DOPPLER_TOKEN='$DOPPLER_TOKEN_INFRA'
                doppler run -p infrastructure -c prd -- docker-compose -f core/docker-compose.yml up -d
                ;;
              authentik)
                echo 'Deploying Authentik...'
                export DOPPLER_TOKEN='$DOPPLER_TOKEN_INFRA'
                doppler run -p infrastructure -c prd -- docker-compose -f authentik/docker-compose.yml up -d
                ;;
              monitoring)
                echo 'Deploying Monitoring...'
                export DOPPLER_TOKEN='$DOPPLER_TOKEN_INFRA'
                doppler run -p infrastructure -c prd -- docker-compose -f monitoring/docker-compose.yml up -d
                ;;
              comet)
                echo 'Deploying Comet...'
                export DOPPLER_TOKEN='$DOPPLER_TOKEN_STREAM'
                doppler run -p stream -c prd -- docker-compose -f services/comet/docker-compose.yml up -d
                ;;
            esac

            echo '✅ Deployment complete'
          "

      - name: Health Check
        run: |
          sleep 30

          ssh -i ~/.ssh/oci-homelab oci "
            echo '=== Container Status ==='
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

            echo ''
            echo '=== Checking Services ==='
            curl -sf http://localhost:9000/-/health/ready/ && echo '✅ Authentik ready' || echo '❌ Authentik not ready'
            curl -sf http://localhost:8000/manifest.json > /dev/null && echo '✅ Comet responding' || echo '❌ Comet not responding'
          "
