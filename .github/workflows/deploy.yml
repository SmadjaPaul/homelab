name: Deploy Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Create kubeconfig
        run: |
          ~/.local/bin/oci ce cluster create-kubeconfig \
            --cluster-id ${{ secrets.OKE_CLUSTER_OCID }} \
            --file ${{ github.workspace }}/kubeconfig \
            --region ${{ secrets.OCI_CLI_REGION }} \
            --token-version 2.0.0

      - name: Install kubectl and Helm
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          curl -fsSL https://get.helm.sh/helm-v3.16.4-linux-amd64.tar.gz | tar -xz
          mv linux-amd64/helm /usr/local/bin/helm
          rm -rf linux-amd64

      - name: Install KCL and dependencies
        run: |
          wget -q https://kcl-lang.io/script/install-cli.sh -O - | bash
          pip install pyyaml

      - name: Deploy Namespaces
        run: |
          cd kubernetes
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true
          { kcl run bootstrap/main.k 2>&1 || true; } | sed '/^downloading /d' > /tmp/kcl.yaml
          python3 ${{ github.workspace }}/scripts/convert_kcl.py /tmp/kcl.yaml | kubectl apply -f -

      - name: Install Flux
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true
          # Install Flux using kubectl
          kubectl apply -f https://github.com/fluxcd/flux2/releases/latest/download/install.yaml

      - name: Deploy GitOps Configuration
        run: |
          cd kubernetes
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true
          { kcl run bootstrap/gitops.k 2>&1 || true; } | sed '/^downloading /d' > /tmp/kcl.yaml
          python3 ${{ github.workspace }}/scripts/convert_kcl.py /tmp/kcl.yaml | kubectl apply -f -
