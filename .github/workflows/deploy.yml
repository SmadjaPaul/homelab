name: Deploy Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create OIDC Token
        id: oidc
        run: |
          AUDIENCE="homelab-oke"
          OIDC_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUDIENCE}"
          IDTOKEN=$(curl -s -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            -H "Accept: application/json; api-version=2.0" \
            "${OIDC_URL}" | jq -r '.value')
          echo "idToken=${IDTOKEN}" >> $GITHUB_OUTPUT

      - name: Get Cluster kubeconfig
        run: |
          # Get cluster info and create kubeconfig with OIDC token
          CLUSTER_OCID="${{ secrets.OKE_CLUSTER_OCID }}"
          REGION="eu-paris-1"

          # Get cluster endpoint
          ENDPOINT=$(oci ce cluster get --cluster-id $CLUSTER_OCID --query 'data."endpoint-info"."kubernetes"."value"' --raw-output 2>/dev/null || echo "")

          if [ -z "$ENDPOINT" ]; then
            # Fallback to known public IP
            ENDPOINT="158.178.213.90:6443"
          fi

          # Create kubeconfig with OIDC token
          cat > kubeconfig << EOF
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: https://${ENDPOINT}
              insecure-skip-tls-verify: true
            name: homelab
          contexts:
          - context:
              cluster: homelab
              user: github-actions
            name: homelab
          current-context: homelab
          users:
          - name: github-actions
            user:
              token: ${{ steps.oidc.outputs.idToken }}
          EOF

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl

      - name: Install KCL and dependencies
        run: |
          wget -q https://kcl-lang.io/script/install-cli.sh -O - | bash
          pip install pyyaml

      - name: Deploy Bootstrap
        run: |
          cd kubernetes
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          { kcl run bootstrap/main.k 2>&1 || true; } | sed '/^downloading /d' > /tmp/kcl.yaml
          python3 ${{ github.workspace }}/scripts/convert_kcl.py /tmp/kcl.yaml | kubectl apply -f -

      - name: Deploy GitOps
        run: |
          cd kubernetes
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          { kcl run bootstrap/gitops.k 2>&1 || true; } | sed '/^downloading /d' > /tmp/kcl.yaml
          python3 ${{ github.workspace }}/scripts/convert_kcl.py /tmp/kcl.yaml | kubectl apply -f -
