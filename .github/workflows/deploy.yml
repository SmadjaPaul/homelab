name: Deploy Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Create kubeconfig
        run: |
          ~/.local/bin/oci ce cluster create-kubeconfig \
            --cluster-id ${{ secrets.OKE_CLUSTER_OCID }} \
            --file ${{ github.workspace }}/kubeconfig \
            --region ${{ secrets.OCI_CLI_REGION }} \
            --token-version 2.0.0

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install Flux CLI
        run: |
          curl -s https://fluxcd.io/install.sh | sudo bash

      - name: Install or Upgrade Flux
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          if kubectl get deployment -n flux-system kustomize-controller &>/dev/null; then
            echo "Flux already installed, upgrading..."
            flux install
          else
            echo "Installing Flux..."
            flux install
          fi

      - name: Apply HelmRepositories
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          kubectl apply -f ${{ github.workspace }}/kubernetes/apps/flux-helmrepositories.yaml
          sleep 10

      - name: Install External Secrets CRDs
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          # Install CRDs directly from external-secrets GitHub repo
          kubectl apply -f https://raw.githubusercontent.com/external-secrets/external-secrets/v0.9.9/deploy/crds/bundle.yaml

          echo "Waiting for CRDs to be established..."
          sleep 30

          # Wait for API to recognize them
          for i in {1..60}; do
            if kubectl api-resources | grep -q clustersecretstores; then
              echo "API is ready!"
              kubectl get crd | grep external-secrets
              break
            fi
            echo "Waiting for API... attempt $i/60"
            sleep 5
          done

      - name: Install External Secrets Operator
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          helm repo add external-secrets https://charts.external-secrets.io || true
          helm repo update

          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --set installCRDs=false \
            --wait

          echo "ESO installed"
          kubectl get pods -n external-secrets

      - name: Create Doppler Token Secret
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          kubectl create secret generic doppler-token \
            --from-literal=dopplerToken='${{ secrets.DOPPLER_SERVICE_TOKEN }}' \
            -n external-secrets \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create ClusterSecretStore
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          sleep 10

          cat <<EOF | kubectl apply -f -
          apiVersion: external-secrets.io/v1beta1
          kind: ClusterSecretStore
          metadata:
            name: doppler
          spec:
            provider:
              doppler:
                auth:
                  secretRef:
                    dopplerToken:
                      name: doppler-token
                      key: dopplerToken
                      namespace: external-secrets
          EOF

          kubectl wait --for=condition=ready clustersecretstore/doppler --timeout=120s || true

      - name: Deploy All Applications
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          kubectl apply -k ${{ github.workspace }}/kubernetes/apps/infra/

          echo "Waiting for ExternalDNS..."
          kubectl wait --for=condition=ready pods -l app.kubernetes.io/name=external-dns -n external-dns --timeout=300s || true

          echo "Waiting for Cloudflared..."
          kubectl wait --for=condition=ready pods -l app=cloudflared -n cloudflared --timeout=300s || true

          echo "Waiting for Authentik..."
          kubectl wait --for=condition=ready pods -l app.kubernetes.io/name=authentik -n infra --timeout=300s || true

          kubectl apply -k ${{ github.workspace }}/kubernetes/apps/public/

      - name: Verify Deployment
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          echo "=== Checking Namespaces ==="
          kubectl get namespaces

          echo ""
          echo "=== Checking External Secrets ==="
          kubectl get pods -n external-secrets
          kubectl get externalsecret -A || true

          echo ""
          echo "=== Checking ExternalDNS ==="
          kubectl get pods -n external-dns

          echo ""
          echo "=== Checking Cloudflared ==="
          kubectl get pods -n cloudflared

          echo ""
          echo "=== Checking Services ==="
          kubectl get pods -n infra
          kubectl get pods -n public

          echo ""
          echo "=== Checking Ingress ==="
          kubectl get ingress -A
