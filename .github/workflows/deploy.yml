name: Deploy Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCI CLI
        run: |
          # Download and run OCI CLI install script
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh -o install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults --install-dir $HOME/oci-cli --script-dir $HOME/oci-cli/bin
          echo "$HOME/oci-cli/bin" >> $GITHUB_PATH

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "$OCI_CLI_KEY_CONTENT" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=$OCI_CLI_USER
          fingerprint=$OCI_CLI_FINGERPRINT
          tenancy=$OCI_CLI_TENANCY
          region=$OCI_CLI_REGION
          key_file=$HOME/.oci/oci_api_key.pem
          EOF

      - name: Create kubeconfig
        run: |
          $HOME/oci-cli/bin/oci ce cluster create-kubeconfig \
            --cluster-id $OKE_CLUSTER_OCID \
            --file ${{ github.workspace }}/kubeconfig \
            --region $OCI_CLI_REGION \
            --token-version 2.0.0

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          mv kubectl ${{ github.workspace }}/

      - name: Install KCL
        run: |
          curl -Lo kcl.tar.gz https://github.com/kcl-lang/kcl/releases/download/v0.11.2/kcl-v0.11.2-x86_64-unknown-linux.tar.gz
          tar -xzf kcl.tar.gz
          mv kcl-v0.11.2-x86_64-unknown-linux/kcl /usr/local/bin/
          rm -rf kcl.tar.gz kcl-v0.11.2-x86_64-unknown-linux

      - name: Deploy Bootstrap
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          ${{ github.workspace }}/kubectl apply -f <(kcl run kubernetes/bootstrap/main.k)

      - name: Deploy GitOps
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          ${{ github.workspace }}/kubectl apply -f <(kcl run kubernetes/bootstrap/gitops.k)
