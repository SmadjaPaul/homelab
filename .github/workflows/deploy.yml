name: Deploy Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Create kubeconfig
        run: |
          ~/.local/bin/oci ce cluster create-kubeconfig \
            --cluster-id ${{ secrets.OKE_CLUSTER_OCID }} \
            --file ${{ github.workspace }}/kubeconfig \
            --region ${{ secrets.OCI_CLI_REGION }} \
            --token-version 2.0.0

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install Flux CLI
        run: |
          curl -s https://fluxcd.io/install.sh | sudo bash

      - name: Install or Upgrade Flux
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          # Check if Flux is already installed
          if kubectl get deployment -n flux-system kustomize-controller &>/dev/null; then
            echo "Flux already installed, upgrading..."
            flux install
          else
            echo "Installing Flux..."
            flux install
          fi

      - name: Apply HelmRepositories
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          kubectl apply -f ${{ github.workspace }}/kubernetes/apps/flux-helmrepositories.yaml

          # Wait for HelmRepositories to be ready
          sleep 10

      - name: Install External Secrets via Helm
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          # Add repo and update
          helm repo add external-secrets https://charts.external-secrets.io || true
          helm repo update

          # Install external-secrets with CRDs
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --set installCRDs=true \
            --wait

          echo "Helm install completed"

          # Debug: Check what CRDs exist
          echo "Checking installed CRDs..."
          kubectl get crd | grep external-secrets || echo "No external-secrets CRDs found!"

          # Wait for CRDs with longer timeout and polling
          echo "Waiting for ClusterSecretStore CRD..."
          for i in {1..60}; do
            if kubectl get crd clustersecretstores.external-secrets.io &>/dev/null; then
              echo "CRD found after $i attempts"
              break
            fi
            echo "Still waiting for CRD... attempt $i/60"
            sleep 5
          done

          # Verify CRD is ready
          kubectl get crd clustersecretstores.external-secrets.io -o yaml | head -20

          # Wait longer for API to be ready
          echo "Waiting for API server to register endpoints..."
          sleep 60

          # Test if API is working
          echo "Testing API availability..."
          for i in {1..30}; do
            if kubectl get clustersecretstore 2>&1 | grep -q "No resources found\|NAME"; then
              echo "API is ready!"
              break
            fi
            echo "API not ready yet... attempt $i/30"
            sleep 5
          done

      - name: Deploy External Secrets via Flux
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          # Apply the HelmRelease via Flux (for ongoing management)
          kubectl apply -k ${{ github.workspace }}/kubernetes/apps/infra/external-secrets/base/ || true

          # Wait for pods
          echo "Waiting for External Secrets pods..."
          kubectl wait --for=condition=ready pods -l app.kubernetes.io/name=external-secrets -n external-secrets --timeout=300s || true

      - name: Create Doppler Token Secret
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          # Create the Doppler token secret
          kubectl create secret generic doppler-token \
            --from-literal=dopplerToken='${{ secrets.DOPPLER_SERVICE_TOKEN }}' \
            -n external-secrets \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create ClusterSecretStore
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          # Retry logic for creating ClusterSecretStore
          for i in {1..10}; do
            echo "Attempting to create ClusterSecretStore... attempt $i/10"

            if cat <<EOF | kubectl apply -f - 2>&1; then
          apiVersion: external-secrets.io/v1beta1
          kind: ClusterSecretStore
          metadata:
            name: doppler
          spec:
            provider:
              doppler:
                auth:
                  secretRef:
                    dopplerToken:
                      name: doppler-token
                      key: dopplerToken
                      namespace: external-secrets
          EOF
              echo "ClusterSecretStore created successfully!"
              break
            else
              echo "Failed to create ClusterSecretStore, retrying in 10 seconds..."
              sleep 10
            fi
          done

          # Wait for it to be ready
          kubectl wait --for=condition=ready clustersecretstore/doppler --timeout=120s || true

      - name: Deploy All Applications
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          # Apply all remaining infrastructure
          kubectl apply -k ${{ github.workspace }}/kubernetes/apps/infra/

          # Wait for critical infrastructure
          echo "Waiting for ExternalDNS..."
          kubectl wait --for=condition=ready pods -l app.kubernetes.io/name=external-dns -n external-dns --timeout=300s || true

          echo "Waiting for Cloudflared..."
          kubectl wait --for=condition=ready pods -l app=cloudflared -n cloudflared --timeout=300s || true

          echo "Waiting for Authentik..."
          kubectl wait --for=condition=ready pods -l app.kubernetes.io/name=authentik -n infra --timeout=300s || true

          # Apply public services
          kubectl apply -k ${{ github.workspace }}/kubernetes/apps/public/

      - name: Verify Deployment
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          echo "=== Checking Namespaces ==="
          kubectl get namespaces

          echo ""
          echo "=== Checking External Secrets ==="
          kubectl get pods -n external-secrets
          kubectl get externalsecret -A || true

          echo ""
          echo "=== Checking ExternalDNS ==="
          kubectl get pods -n external-dns

          echo ""
          echo "=== Checking Cloudflared ==="
          kubectl get pods -n cloudflared
          kubectl logs -n cloudflared deployment/cloudflared --tail=5

          echo ""
          echo "=== Checking Services ==="
          kubectl get pods -n infra
          kubectl get pods -n public

          echo ""
          echo "=== Checking Ingress ==="
          kubectl get ingress -A
