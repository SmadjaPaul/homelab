name: Deploy Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Create kubeconfig
        run: |
          ~/.local/bin/oci ce cluster create-kubeconfig \
            --cluster-id ${{ secrets.OKE_CLUSTER_OCID }} \
            --file ${{ github.workspace }}/kubeconfig \
            --region ${{ secrets.OCI_CLI_REGION }} \
            --token-version 2.0.0

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install Flux
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true
          kubectl apply -f https://github.com/fluxcd/flux2/releases/latest/download/install.yaml

      - name: Wait for Flux to be ready
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          # Wait for Flux CRDs to be established
          kubectl wait --for=condition=established crd/gitrepositories.source.toolkit.fluxcd.io --timeout=300s
          kubectl wait --for=condition=established crd/helmrepositories.source.toolkit.fluxcd.io --timeout=300s
          kubectl wait --for=condition=established crd/helmreleases.helm.toolkit.fluxcd.io --timeout=300s

          # Wait for Flux pods to be ready
          kubectl wait --for=condition=ready pods -l app.kubernetes.io/instance=flux-system -n flux-system --timeout=300s

      - name: Install External Secrets via Helm
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          # Delete all existing ESO CRDs if they exist (from previous failed installs)
          kubectl get crd --output=jsonpath='{.items[*].metadata.name}' | tr ' ' '\n' | grep 'external-secrets.io' | xargs kubectl delete crd --ignore-not-found=true 2>/dev/null || true

          # Install via Helm
          helm repo add external-secrets https://charts.external-secrets.io || true
          helm repo update
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --version 0.9.9 \
            --set installCRDs=true \
            --wait --timeout 5m

      - name: Wait for External Secrets to be ready
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true
          kubectl wait --for=condition=ready pods -l app.kubernetes.io/instance=external-secrets -n external-secrets --timeout=300s

      - name: Create Doppler token secret
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true
          kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic doppler-token \
            --from-literal=dopplerToken='${{ secrets.DOPPLER_SERVICE_TOKEN }}' \
            -n external-secrets \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Applications with Kustomize
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          # Refresh kubectl cache to pick up new CRDs
          kubectl api-resources --api-group=helm.toolkit.fluxcd.io || true

          # Apply Helm repositories
          kubectl apply -f ${{ github.workspace }}/kubernetes/apps/flux-helmrepositories.yaml

          # Wait for CRDs to be fully registered in API server
          sleep 30

          # Apply all apps using Kustomize with server-side apply
          kubectl apply -k ${{ github.workspace }}/kubernetes/apps/ --server-side
