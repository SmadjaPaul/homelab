# Deploy Kubernetes via Flux GitOps (no Terraform; Terraform runs separately via workflow_dispatch in terraform.yml)
name: Deploy Infrastructure and Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"

jobs:
  bootstrap-flux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production
    outputs:
      flux-ready: ${{ steps.check-flux.outputs.ready }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Tools
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/kubectl
            /usr/local/bin/flux
          key: ${{ runner.os }}-flux-tools-v1

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Create kubeconfig
        run: |
          ~/.local/bin/oci ce cluster create-kubeconfig \
            --cluster-id ${{ secrets.OKE_CLUSTER_OCID }} \
            --file ${{ github.workspace }}/kubeconfig \
            --region ${{ secrets.OCI_CLI_REGION }} \
            --token-version 2.0.0

      - name: Install Tools
        run: |
          if ! command -v kubectl &> /dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
          fi

          if ! command -v flux &> /dev/null; then
            curl -s https://fluxcd.io/install.sh | sudo bash
          fi

      - name: Check Flux Status
        id: check-flux
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          if kubectl get deployment -n flux-system kustomize-controller &>/dev/null; then
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "✅ Flux already installed"
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "⚠️ Flux not installed"
          fi

      - name: Bootstrap Flux
        if: steps.check-flux.outputs.ready != 'true'
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig

          echo "Bootstrapping Flux..."
          flux install

      - name: Create SSH Key Secret for GitRepository
        env:
          FLUX_GIT_SSH_KEY: ${{ secrets.FLUX_GIT_SSH_KEY }}
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          if [ -z "$FLUX_GIT_SSH_KEY" ]; then
            echo "❌ FLUX_GIT_SSH_KEY not set in GitHub Secrets (sync from Doppler or add manually)"
            exit 1
          fi
          kubectl create secret generic flux-system \
            --namespace flux-system \
            --from-literal=identity="$FLUX_GIT_SSH_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Flux Kustomizations
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig

          kubectl apply -k ${{ github.workspace }}/kubernetes/clusters/oci/

      - name: Reconcile Flux
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig

          echo "Triggering reconciliation..."
          flux reconcile kustomization flux-system --with-source || true
          flux reconcile kustomization helm-repositories --with-source || true

  wait-infra:
    runs-on: ubuntu-latest
    needs: bootstrap-flux
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache kubectl
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/kubectl
          key: ${{ runner.os }}-kubectl-v1

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Create kubeconfig
        run: |
          ~/.local/bin/oci ce cluster create-kubeconfig \
            --cluster-id ${{ secrets.OKE_CLUSTER_OCID }} \
            --file ${{ github.workspace }}/kubeconfig \
            --region ${{ secrets.OCI_CLI_REGION }} \
            --token-version 2.0.0

      - name: Install kubectl
        run: |
          if ! command -v kubectl &> /dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
          fi

      - name: Create Doppler Token Secret
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig

          kubectl create secret generic doppler-token \
            --from-literal=dopplerToken='${{ secrets.DOPPLER_SERVICE_TOKEN }}' \
            -n external-secrets \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Wait for Infrastructure
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig

          echo "Waiting for External Secrets..."
          kubectl wait --for=condition=ready pods -l app.kubernetes.io/name=external-secrets -n external-secrets --timeout=300s || true

          echo "Waiting for ClusterSecretStore..."
          kubectl wait --for=condition=ready clustersecretstore/doppler --timeout=120s || true

          echo "Waiting for ExternalDNS..."
          kubectl wait --for=condition=ready pods -l app.kubernetes.io/name=external-dns -n external-dns --timeout=300s || true

          echo "Waiting for Cloudflared..."
          kubectl wait --for=condition=ready pods -l app=cloudflared -n cloudflared --timeout=300s || true

      - name: Trigger Apps Reconciliation
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig

          flux reconcile kustomization apps-infra --with-source || true
          flux reconcile kustomization apps-public --with-source || true
          flux reconcile kustomization apps-automation --with-source || true

  wait-services:
    runs-on: ubuntu-latest
    needs: wait-infra
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache kubectl
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/kubectl
          key: ${{ runner.os }}-kubectl-v1

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Create kubeconfig
        run: |
          ~/.local/bin/oci ce cluster create-kubeconfig \
            --cluster-id ${{ secrets.OKE_CLUSTER_OCID }} \
            --file ${{ github.workspace }}/kubeconfig \
            --region ${{ secrets.OCI_CLI_REGION }} \
            --token-version 2.0.0

      - name: Install kubectl
        run: |
          if ! command -v kubectl &> /dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
          fi

      - name: Wait for Services
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig

          echo "Waiting for Homepage..."
          kubectl wait --for=condition=ready pods -l app.kubernetes.io/name=homepage -n public --timeout=300s || true

      - name: Verify Deployment
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig

          echo "=== Flux Kustomizations ==="
          flux get kustomizations -A

          echo "=== Helm Releases ==="
          flux get helmreleases -A

          echo "=== All Pods ==="
          kubectl get pods -A | grep -E "Running|Pending|Failed"

  health-checks:
    runs-on: ubuntu-latest
    needs: wait-services
    permissions:
      contents: read

    steps:
      - name: Wait for services
        run: sleep 30

      - name: Health Check - Homepage
        run: |
          echo "Checking home.smadja.dev..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://home.smadja.dev --max-time 30 || echo "000")
          echo "HTTP Code: $HTTP_CODE"
          if [ "$HTTP_CODE" == "200" ] || [ "$HTTP_CODE" == "302" ]; then
            echo "✅ Homepage is accessible"
          else
            echo "⚠️ Homepage returned HTTP $HTTP_CODE (might be OK if auth is required)"
          fi

  notify:
    runs-on: ubuntu-latest
    needs: [bootstrap-flux, wait-infra, wait-services, health-checks]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Notify Success
        if: needs.bootstrap-flux.result == 'success' && needs.wait-infra.result == 'success' && needs.wait-services.result == 'success'
        run: |
          echo "🎉 GitOps deployment completed successfully!"
          echo ""
          echo "Flux Kustomizations reconciled:"
          echo "- flux-system"
          echo "- helm-repositories"
          echo "- apps-infra"
          echo "- apps-public"
          echo ""
          echo "- https://home.smadja.dev"

      - name: Notify Failure
        if: needs.bootstrap-flux.result == 'failure' || needs.wait-infra.result == 'failure' || needs.wait-services.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          echo ""
          echo "Bootstrap Flux: ${{ needs.bootstrap-flux.result }}"
          echo "Wait Infra: ${{ needs.wait-infra.result }}"
          echo "Wait Services: ${{ needs.wait-services.result }}"
          echo "Health Checks: ${{ needs.health-checks.result }}"
