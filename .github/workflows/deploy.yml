name: Deploy Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Create kubeconfig
        run: |
          ~/.local/bin/oci ce cluster create-kubeconfig \
            --cluster-id ${{ secrets.OKE_CLUSTER_OCID }} \
            --file ${{ github.workspace }}/kubeconfig \
            --region ${{ secrets.OCI_CLI_REGION }} \
            --token-version 2.0.0

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl

      - name: Install KCL
        run: |
          curl -Lo kcl.tar.gz https://github.com/kcl-lang/kcl/releases/download/v0.11.2/kcl-v0.11.2-x86_64-unknown-linux.tar.gz
          tar -xzf kcl.tar.gz
          mv kcl-v0.11.2-x86_64-unknown-linux/kcl /usr/local/bin/
          rm -rf kcl.tar.gz kcl-v0.11.2-x86_64-unknown-linux

      - name: Deploy Bootstrap
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true
          ./kubectl apply -f <(kcl run kubernetes/bootstrap/main.k)

      - name: Deploy GitOps
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true
          ./kubectl apply -f <(kcl run kubernetes/bootstrap/gitops.k)
