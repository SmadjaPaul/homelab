name: Deploy Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Create kubeconfig
        run: |
          ~/.local/bin/oci ce cluster create-kubeconfig \
            --cluster-id ${{ secrets.OKE_CLUSTER_OCID }} \
            --file ${{ github.workspace }}/kubeconfig \
            --region ${{ secrets.OCI_CLI_REGION }} \
            --token-version 2.0.0

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl

      - name: Install Flux
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true
          kubectl apply -f https://github.com/fluxcd/flux2/releases/latest/download/install.yaml

      - name: Wait for Flux to be ready
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          # Wait for Flux CRDs to be established
          kubectl wait --for=condition=established crd/gitrepositories.source.toolkit.fluxcd.io --timeout=300s
          kubectl wait --for=condition=established crd/helmrepositories.source.toolkit.fluxcd.io --timeout=300s
          kubectl wait --for=condition=established crd/helmreleases.helm.toolkit.fluxcd.io --timeout=300s

          # Wait for Flux pods to be ready
          kubectl wait --for=condition=ready pods -l app.kubernetes.io/instance=flux-system -n flux-system --timeout=300s

      - name: Deploy Applications with Kustomize
        run: |
          export KUBECONFIG=${{ github.workspace }}/kubeconfig
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=true

          # Apply Helm repositories
          kubectl apply -f ${{ github.workspace }}/kubernetes/apps/flux-helmrepositories.yaml

          # Apply all apps using Kustomize
          kubectl apply -k ${{ github.workspace }}/kubernetes/apps/
