name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'kubernetes/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Deployment phase'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cloudflare
          - oci-vms
          - omni-bootstrap
          - k8s-apps

env:
  # Terraform Cloud / Local Backend
  TF_IN_AUTOMATION: true
  TF_INPUT: 0

  # OCI Credentials
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  OCI_CLI_REGION: eu-paris-1

  # Terraform Variables - Cloudflare
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_tunnel_secret: ${{ secrets.CLOUDFLARE_TUNNEL_SECRET }}
  TF_VAR_tunnel_id: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
  TF_VAR_domain: smadja.dev
  TF_VAR_enable_tunnel: true
  TF_VAR_enable_tunnel_config: true
  TF_VAR_enable_zone_settings: true
  TF_VAR_enable_geo_restriction: ${{ secrets.ENABLE_GEO_RESTRICTION }}
  TF_VAR_enable_authentik_api_skip_challenge: true
  TF_VAR_authentik_oidc_enabled: true
  TF_VAR_authentik_oidc_client_id: ${{ secrets.AUTHENTIK_OIDC_CLIENT_ID }}
  TF_VAR_authentik_oidc_client_secret: ${{ secrets.AUTHENTIK_OIDC_CLIENT_SECRET }}
  TF_VAR_authentik_oidc_auth_url: ${{ secrets.AUTHENTIK_OIDC_AUTH_URL }}
  TF_VAR_authentik_oidc_token_url: ${{ secrets.AUTHENTIK_OIDC_TOKEN_URL }}
  TF_VAR_authentik_oidc_certs_url: ${{ secrets.AUTHENTIK_OIDC_CERTS_URL }}
  TF_VAR_allowed_emails: ${{ secrets.ALLOWED_EMAILS }}

  # Terraform Variables - OCI
  TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
  TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
  TF_VAR_budget_alert_email: ${{ secrets.ALERT_EMAIL }}
  TF_VAR_allow_ssh_from_anywhere: true

  # Omni
  OMNI_ENDPOINT: ${{ secrets.OMNI_ENDPOINT }}
  OMNI_KEY: ${{ secrets.OMNI_KEY }}

  # Doppler
  DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
  TF_VAR_doppler_token: ${{ secrets.DOPPLER_TOKEN }}

jobs:
  # ============================================================================
  # PHASE 1: Cloudflare (DNS, Tunnel, Access)
  # ============================================================================
  cloudflare:
    name: Deploy Cloudflare
    runs-on: ubuntu-latest
    if: github.event.inputs.phase == 'all' || github.event.inputs.phase == 'cloudflare' || github.event_name == 'push'
    environment: cloudflare
    defaults:
      run:
        working-directory: terraform/cloudflare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

      - name: Output Tunnel Info
        if: github.ref == 'refs/heads/main'
        run: |
          echo "TUNNEL_ID=$(terraform output -raw tunnel_id)" >> $GITHUB_ENV
          echo "CNAME_TARGET=$(terraform output -raw cname_target)" >> $GITHUB_ENV
          echo "::set-output name=tunnel_id::$(terraform output -raw tunnel_id)"
          echo "::set-output name=cname_target::$(terraform output -raw cname_target)"
    outputs:
      tunnel_id: ${{ steps.output.outputs.tunnel_id }}
      cname_target: ${{ steps.output.outputs.cname_target }}

  # ============================================================================
  # PHASE 2: OCI Infrastructure (VMs)
  # ============================================================================
  oci-vms:
    name: Deploy OCI VMs
    runs-on: ubuntu-latest
    needs: cloudflare
    if: |
      always() &&
      needs.cloudflare.result == 'success' &&
      (github.event.inputs.phase == 'all' || github.event.inputs.phase == 'oci-vms' || github.event_name == 'push')
    environment: production
    defaults:
      run:
        working-directory: terraform/oracle-cloud

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Setup OCI CLI
        uses: oracle-actions/run-oci-cli-command@v1.1.1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

      - name: Output VM Info
        if: github.ref == 'refs/heads/main'
        id: output
        run: |
          echo "HUB_IP=$(terraform output -raw hub_public_ip)" >> $GITHUB_ENV
          echo "::set-output name=hub_ip::$(terraform output -raw hub_public_ip)"
          echo "::set-output name=hub_public_ip::$(terraform output -raw hub_public_ip)"

          echo "VMs created:"
          terraform output

      - name: Wait for VMs
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Waiting for VMs to be accessible..."
          sleep 60
    outputs:
      hub_ip: ${{ steps.output.outputs.hub_ip }}
      hub_public_ip: ${{ steps.output.outputs.hub_public_ip }}

  # ============================================================================
  # PHASE 3: Omni Bootstrap
  # ============================================================================
  omni-bootstrap:
    name: Omni Bootstrap
    runs-on: ubuntu-latest
    needs: oci-vms
    if: |
      always() &&
      needs.oci-vms.result == 'success' &&
      (github.event.inputs.phase == 'all' || github.event.inputs.phase == 'omni-bootstrap')
    environment: omni

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          # Install talosctl
          curl -sL https://talos.dev/install | sh
          sudo mv talosctl /usr/local/bin/

          # Install omnictl
          curl -sL https://omni.siderolabs.io/install | sh
          sudo mv omnictl /usr/local/bin/

          # Install qemu-img
          sudo apt-get update
          sudo apt-get install -y qemu-utils

      - name: Check Omni Connection
        run: |
          if [ -z "$OMNI_ENDPOINT" ] || [ -z "$OMNI_KEY" ]; then
            echo "❌ OMNI_ENDPOINT or OMNI_KEY not set"
            echo "Please set these secrets in GitHub:"
            echo "  - OMNI_ENDPOINT: https://xxx.omni.siderolabs.io:50001"
            echo "  - OMNI_KEY: your-omni-api-key"
            exit 1
          fi

          echo "Omni Endpoint: $OMNI_ENDPOINT"
          echo "Testing connection..."

          # Test connection (this will fail if key is invalid)
          curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $OMNI_KEY" \
            "$OMNI_ENDPOINT/api/v1/version" | grep -q "200" && echo "✅ Connected to Omni" || {
              echo "❌ Cannot connect to Omni"
              exit 1
            }

      - name: Create Omni Cluster
        run: |
          CLUSTER_NAME="oci-hub"

          if omnictl cluster get $CLUSTER_NAME 2>/dev/null; then
            echo "✅ Cluster $CLUSTER_NAME already exists"
          else
            echo "Creating cluster $CLUSTER_NAME..."
            omnictl cluster create \
              --name $CLUSTER_NAME \
              --kubernetes-version "1.31.0" \
              --talos-version "v1.9.0" \
              --control-plane-count 1 \
              --worker-count 2
            echo "✅ Cluster created"
          fi

      - name: Generate Talos Image
        run: |
          CLUSTER_NAME="oci-hub"
          mkdir -p /tmp/talos-images
          cd /tmp/talos-images

          echo "Downloading Talos image from Omni..."
          curl -s -H "Authorization: Bearer $OMNI_KEY" \
            "$OMNI_ENDPOINT/api/v1/clusters/$CLUSTER_NAME/image?platform=oracle&arch=arm64" \
            -o "talos-$CLUSTER_NAME.raw.xz"

          if [ ! -f "talos-$CLUSTER_NAME.raw.xz" ]; then
            echo "❌ Failed to download image"
            exit 1
          fi

          echo "Decompressing..."
          xz -d "talos-$CLUSTER_NAME.raw.xz"

          echo "Converting to QCOW2..."
          qemu-img convert -f raw -O qcow2 "talos-$CLUSTER_NAME.raw" "talos-$CLUSTER_NAME.qcow2"

          ls -lh "talos-$CLUSTER_NAME.qcow2"

      - name: Upload to OCI
        run: |
          CLUSTER_NAME="oci-hub"
          OCI_NAMESPACE=$(oci os ns get --query data --raw-output)
          BUCKET_NAME="talos-images"

          echo "Namespace: $OCI_NAMESPACE"

          # Create bucket if needed
          if ! oci os bucket get --bucket-name "$BUCKET_NAME" --namespace-name "$OCI_NAMESPACE" 2>/dev/null; then
            echo "Creating bucket..."
            oci os bucket create --name "$BUCKET_NAME" --namespace-name "$OCI_NAMESPACE" \
              --compartment-id "$TF_VAR_compartment_id"
          fi

          echo "Uploading image..."
          oci os object put --bucket-name "$BUCKET_NAME" --namespace-name "$OCI_NAMESPACE" \
            --file "/tmp/talos-images/talos-$CLUSTER_NAME.qcow2" \
            --name "talos-$CLUSTER_NAME.qcow2" \
            --force

          echo "✅ Image uploaded"

      - name: Create Custom Image
        run: |
          CLUSTER_NAME="oci-hub"
          OCI_NAMESPACE=$(oci os ns get --query data --raw-output)
          BUCKET_NAME="talos-images"

          echo "Creating custom image..."
          IMAGE_OCID=$(oci compute image create \
            --compartment-id "$TF_VAR_compartment_id" \
            --namespace-name "$OCI_NAMESPACE" \
            --bucket-name "$BUCKET_NAME" \
            --object-name "talos-$CLUSTER_NAME.qcow2" \
            --display-name "talos-$CLUSTER_NAME" \
            --operating-system "Talos" \
            --operating-system-version "v1.9.0" \
            --query 'data.id' --raw-output)

          echo "IMAGE_OCID=$IMAGE_OCID" >> $GITHUB_ENV
          echo "Image OCID: $IMAGE_OCID"

          # Wait for image to be available
          echo "Waiting for image to be available (this may take 10-15 minutes)..."
          for i in {1..30}; do
            STATUS=$(oci compute image get --image-id "$IMAGE_OCID" --query 'data."lifecycle-state"' --raw-output)
            echo "  Status: $STATUS (attempt $i/30)"

            if [ "$STATUS" == "AVAILABLE" ]; then
              echo "✅ Image is available!"
              break
            elif [ "$STATUS" == "FAILED" ]; then
              echo "❌ Image creation failed"
              exit 1
            fi

            sleep 30
          done

      - name: Update Terraform & Re-deploy
        run: |
          cd terraform/oracle-cloud

          # Update terraform.tfvars
          if grep -q "^talos_image_id" terraform.tfvars; then
            sed -i "s|^talos_image_id.*|talos_image_id = \"$IMAGE_OCID\"|" terraform.tfvars
          else
            echo "" >> terraform.tfvars
            echo "# Image Talos generated on $(date)" >> terraform.tfvars
            echo "talos_image_id = \"$IMAGE_OCID\"" >> terraform.tfvars
          fi

          echo "Updated terraform.tfvars:"
          grep "talos_image_id" terraform.tfvars

          # Re-apply terraform
          terraform init
          terraform plan -out=tfplan
          terraform apply -auto-approve tfplan

          echo "✅ VMs re-deployed with Talos"

      - name: Wait for Talos
        run: |
          echo "Waiting for Talos to boot..."
          sleep 120

  # ============================================================================
  # PHASE 4: Kubernetes Apps
  # ============================================================================
  k8s-apps:
    name: Deploy K8s Apps
    runs-on: ubuntu-latest
    needs: omni-bootstrap
    if: |
      always() &&
      needs.omni-bootstrap.result == 'success' &&
      (github.event.inputs.phase == 'all' || github.event.inputs.phase == 'k8s-apps')
    environment: kubernetes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          # Install kubectl
          curl -LO "https://dl.k8s/release/$(curl -L -s https://dl.k8s/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

          # Install talosctl
          curl -sL https://talos.dev/install | sh
          sudo mv talosctl /usr/local/bin/

          # Install flux
          curl -s https://fluxcd.io/install.sh | sudo bash

      - name: Get Kubeconfig
        run: |
          mkdir -p ~/.kube

          # Wait for cluster and get kubeconfig
          for i in {1..20}; do
            if omnictl kubeconfig -c oci-hub > ~/.kube/config 2>/dev/null; then
              if kubectl get nodes &>/dev/null; then
                echo "✅ Got kubeconfig, cluster is ready"
                kubectl get nodes
                break
              fi
            fi
            echo "  Waiting for cluster... (attempt $i/20)"
            sleep 15
          done

      - name: Install Flux CD
        run: |
          flux install
          echo "✅ Flux CD installed"

      - name: Create Doppler Secret
        run: |
          if [ -z "$TF_VAR_doppler_token" ] && [ -z "$DOPPLER_TOKEN" ]; then
            echo "⚠️  DOPPLER_TOKEN not set, using placeholder"
            DOPPLER_TOKEN="placeholder"
          fi

          TOKEN="${TF_VAR_doppler_token:-$DOPPLER_TOKEN}"

          kubectl create secret generic doppler-token-infrastructure \
            --from-literal=dopplerToken="$TOKEN" \
            -n flux-system --dry-run=client -o yaml | kubectl apply -f -

          echo "✅ Doppler secret created"

      - name: Deploy Apps
        run: |
          echo "Deploying applications..."
          kubectl apply -k kubernetes/clusters/oci-hub
          echo "✅ Applications deployed"

      - name: Verify Deployment
        run: |
          echo "Waiting for pods to start..."
          sleep 60

          echo ""
          echo "=== Infrastructure Pods ==="
          kubectl get pods -n infra || true

          echo ""
          echo "=== All Namespaces ==="
          kubectl get pods --all-namespaces || true

          echo ""
          echo "=== Flux Status ==="
          flux get kustomizations || true

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "============================================"
          echo "  Deployment Summary"
          echo "============================================"
          echo ""
          echo "✅ Infrastructure deployed!"
          echo ""
          echo "Next steps:"
          echo "  - Access Authentik: https://auth.smadja.dev"
          echo "  - Check pods: kubectl get pods -A"
          echo "  - Check flux: flux get all"
          echo ""
