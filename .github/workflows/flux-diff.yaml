name: Flux Diff

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
  pull_request:
    branches:
      - main
    paths:
      - 'kubernetes/**'

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: eu-paris-1
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Create kubeconfig
        run: |
          oci ce cluster create-kubeconfig \
            --cluster-id ${{ secrets.OKE_CLUSTER_OCID }} \
            --file /tmp/kubeconfig \
            --region eu-paris-1

      - name: Setup Flux
        uses: fluxcd/flux2/action@main
        with:
          kubeconfig: /tmp/kubeconfig

      - name: Diff Kustomizations
        run: |
          flux diff kustomization apps --namespace flux-system 2>&1 | tee diff.log || true
        continue-on-error: true

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('diff.log', 'utf8');

            const body = "## Flux Diff\n\n```\n" + diff + "\n```";

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
