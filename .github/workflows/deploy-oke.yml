name: Deploy OKE Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'terraform/oracle-cloud/**'
      - 'kubernetes/**'
      - '.github/workflows/deploy-oke.yml'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Deployment phase'
        required: true
        default: 'oke'
        type: choice
        options:
          - oke
          - k8s-apps

env:
  # Terraform
  TF_IN_AUTOMATION: true
  TF_INPUT: 0

jobs:
  # ============================================================================
  # PHASE 1: OKE Infrastructure
  # ============================================================================
  oke:
    name: Deploy OKE Cluster
    runs-on: ubuntu-latest
    if: github.event.inputs.phase == 'oke' || github.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: terraform/oracle-cloud

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_CLI_USER }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_CLI_TENANCY }}" >> ~/.oci/config
          echo "region=${{ secrets.OCI_CLI_REGION }}" >> ~/.oci/config
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Get OCI Object Storage Namespace
        run: |
          NAMESPACE=$(oci os ns get --query data --raw-output)
          echo "OCI_OBJECT_STORAGE_NAMESPACE=$NAMESPACE" >> $GITHUB_ENV
          echo "OCI_REGION=${{ secrets.OCI_CLI_REGION }}" >> $GITHUB_ENV

      - name: Create Backend Config
        run: |
          cat > backend.hcl <<EOF
          bucket   = "terraform-states"
          key      = "oracle-cloud/terraform.tfstate"
          region   = "${{ env.OCI_REGION }}"
          endpoints = { s3 = "https://${{ env.OCI_OBJECT_STORAGE_NAMESPACE }}.compat.objectstorage.${{ env.OCI_REGION }}.oraclecloud.com" }
          skip_region_validation      = true
          skip_credentials_validation = true
          skip_metadata_api_check     = true
          force_path_style            = true
          EOF
          cat backend.hcl

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_CLI_TENANCY }}
          TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_CLI_TENANCY }}
          TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Output Cluster Info
        if: github.ref == 'refs/heads/main'
        run: |
          echo "CLUSTER_ID=$(terraform output -raw cluster_id)" >> $GITHUB_ENV
          echo "CLUSTER_ENDPOINT=$(terraform output -raw cluster_endpoint)" >> $GITHUB_ENV
          terraform output

      - name: Wait for Cluster
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Waiting for OKE cluster nodes to be ready..."
          sleep 120

  # ============================================================================
  # PHASE 2: Kubernetes Apps
  # ============================================================================
  k8s-apps:
    name: Deploy Kubernetes Apps
    runs-on: ubuntu-latest
    needs: oke
    if: |
      always() &&
      needs.oke.result == 'success' &&
      (github.event.inputs.phase == 'oke' || github.event.inputs.phase == 'k8s-apps')
    environment: kubernetes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_CLI_USER }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_CLI_TENANCY }}" >> ~/.oci/config
          echo "region=${{ secrets.OCI_CLI_REGION }}" >> ~/.oci/config
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Setup kubectl
        run: |
          curl -LO "https://dl.k8s/release/$(curl -L -s https://dl.k8s/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Get Kubeconfig
        run: |
          mkdir -p ~/.kube
          oci ce cluster create-kubeconfig \
            --cluster-id ${{ env.CLUSTER_ID }} \
            --file ~/.kube/config \
            --region ${{ secrets.OCI_CLI_REGION }} \
            --token-version 2.0.0
          echo "✅ Kubeconfig created"
          kubectl get nodes

      - name: Install Flux CD
        run: |
          curl -s https://fluxcd.io/install.sh | sudo bash
          flux install
          echo "✅ Flux CD installed"

      - name: Verify Comet Network Policy
        run: |
          echo "Applying Comet Network Policy..."
          kubectl apply -f kubernetes/apps/media/comet/networkpolicy.yaml
          kubectl get networkpolicy -n media

      - name: Deploy Apps
        run: |
          echo "Deploying applications..."
          kubectl apply -k kubernetes/clusters/oci-hub
          echo "✅ Applications deployed"

      - name: Verify Deployment
        run: |
          echo "Waiting for pods to start..."
          sleep 60

          echo ""
          echo "=== All Namespaces ==="
          kubectl get pods --all-namespaces || true

          echo ""
          echo "=== Network Policies ==="
          kubectl get networkpolicies --all-namespaces || true

          echo ""
          echo "=== Comet Service ==="
          kubectl get svc -n media | grep comet || true

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "============================================"
          echo "  OKE Deployment Complete"
          echo "============================================"
          echo ""
          echo "✅ OKE infrastructure deployed!"
          echo ""
          echo "Cluster Info:"
          echo "  - Endpoint: $CLUSTER_ENDPOINT"
          echo "  - Nodes: $(kubectl get nodes -o name | wc -l)"
          echo ""
          echo "Comet Streaming:"
          echo "  - NodePort: 30080"
          echo "  - Access: http://<worker-ip>:30080"
          echo "  - Isolated: Yes (NetworkPolicy applied)"
          echo ""
