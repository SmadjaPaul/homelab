name: Full Bootstrap

on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Which step to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - infrastructure
          - omni-bootstrap
          - k8s-apps

env:
  # OCI
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  OCI_CLI_REGION: eu-paris-1
  OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}

  # Cloudflare
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_tunnel_secret: ${{ secrets.CLOUDFLARE_TUNNEL_SECRET }}
  TF_VAR_tunnel_id: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}

  # OCI Terraform
  TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
  TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}

  # Omni
  OMNI_ENDPOINT: ${{ secrets.OMNI_ENDPOINT }}
  OMNI_KEY: ${{ secrets.OMNI_KEY }}

jobs:
  # ============================================================================
  # ÉTAPE 1: INFRASTRUCTURE (Terraform)
  # ============================================================================
  infrastructure:
    runs-on: ubuntu-latest
    if: github.event.inputs.step == 'all' || github.event.inputs.step == 'infrastructure'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Setup OCI CLI
        uses: oracle-actions/run-oci-cli-command@v1.1.1
        with:
          command: "oci --version"
          silent: false

      - name: Deploy Cloudflare
        run: |
          cd terraform/cloudflare
          terraform init
          terraform apply -auto-approve

      - name: Deploy OCI (VMs Ubuntu temporaires)
        run: |
          cd terraform/oracle-cloud
          terraform init
          terraform apply -auto-approve

      - name: Output IPs
        run: |
          cd terraform/oracle-cloud
          echo "HUB_IP=$(terraform output -raw hub_public_ip)" >> $GITHUB_ENV
          echo "hub_ip=$(terraform output -raw hub_public_ip)" >> $GITHUB_OUTPUT

      - name: Wait for VMs
        run: |
          echo "Attente que les VMs soient accessibles..."
          sleep 60

  # ============================================================================
  # ÉTAPE 2: OMNI BOOTSTRAP (Semi-automatique)
  # ============================================================================
  omni-bootstrap:
    runs-on: ubuntu-latest
    needs: infrastructure
    if: github.event.inputs.step == 'all' || github.event.inputs.step == 'omni-bootstrap'
    environment: omni
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          # Install talosctl
          curl -sL https://talos.dev/install | sh

          # Install omnictl
          curl -sL https://omni.siderolabs.io/install | sh

          # Install OCI CLI
          curl -L -O https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          bash install.sh --accept-all-defaults

      - name: Run Omni Bootstrap
        run: |
          export OMNI_ENDPOINT="${{ secrets.OMNI_ENDPOINT }}"
          export OMNI_KEY="${{ secrets.OMNI_KEY }}"
          export OCI_COMPARTMENT_ID="${{ secrets.OCI_COMPARTMENT_ID }}"

          ./scripts/omni-bootstrap.sh

      - name: Re-apply Terraform with Talos image
        run: |
          cd terraform/oracle-cloud
          terraform apply -auto-approve

      - name: Wait for Talos
        run: |
          echo "Attente que Talos démarre sur les VMs..."
          sleep 120

  # ============================================================================
  # ÉTAPE 3: KUBERNETES APPS (Flux CD)
  # ============================================================================
  k8s-apps:
    runs-on: ubuntu-latest
    needs: omni-bootstrap
    if: github.event.inputs.step == 'all' || github.event.inputs.step == 'k8s-apps'
    environment: kubernetes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Install Flux
        uses: fluxcd/flux2/action@main

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_OMNI }}" > ~/.kube/config
          kubectl get nodes

      - name: Install Flux CD
        run: |
          flux install

      - name: Create Doppler Secret
        run: |
          kubectl create secret generic doppler-token-infrastructure \
            --from-literal=dopplerToken="${{ secrets.DOPPLER_TOKEN }}" \
            -n flux-system

      - name: Deploy Apps
        run: |
          kubectl apply -k kubernetes/clusters/oci-hub

      - name: Verify
        run: |
          sleep 30
          kubectl get pods -n infra
          kubectl get pods -n authentik || true

      - name: Summary
        run: |
          echo "✅ Déploiement terminé !"
          echo ""
          echo "URLs:"
          echo "  - Authentik: https://auth.smadja.dev"
          echo "  - Omni: https://omni.smadja.dev (via Tailscale)"
