# Deploy Stack (ordre unique : Cloudflare → OCI → oci-mgmt → Authentik)
# Un seul workflow, un seul run. Chaque couche ne s'exécute que si ses fichiers ont changé.
# Push main (paths) ou workflow_dispatch (tout exécuter).
# Secrets: Tous les secrets proviennent de Doppler (infrastructure/prd)
name: Deploy Stack

on:
  push:
    branches: [main]
    paths:
      - 'terraform/cloudflare/**'
      - 'terraform/oracle-cloud/**'
      - 'docker/oci-core/**'
      - 'ansible/**'
      - 'terraform/authentik/**'
      - 'doppler.yaml'
      - 'Taskfile.yaml'
      - '.github/workflows/deploy-stack.yml'
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run all layers (ignore path filters)'
        required: false
        default: true
        type: boolean
      cloudflare:
        description: 'Run Cloudflare job'
        required: false
        default: false
        type: boolean
      oci:
        description: 'Run OCI job'
        required: false
        default: false
        type: boolean
      oci_mgmt:
        description: 'Run oci-mgmt job'
        required: false
        default: false
        type: boolean
      authentik:
        description: 'Run Authentik job'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-stack-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: '1.14.4'
  TF_CF: terraform/cloudflare
  TF_OCI: terraform/oracle-cloud
  TF_AUTH: terraform/authentik

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      cloudflare: ${{ steps.outputs.outputs.cloudflare }}
      oci: ${{ steps.outputs.outputs.oci }}
      oci_mgmt: ${{ steps.outputs.outputs.oci_mgmt }}
      authentik: ${{ steps.outputs.outputs.authentik }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cloudflare:
              - 'terraform/cloudflare/**'
              - '.github/workflows/deploy-stack.yml'
            oci:
              - 'terraform/oracle-cloud/**'
              - 'Taskfile.yaml'
              - '.github/workflows/deploy-stack.yml'
            oci_mgmt:
              - 'docker/oci-core/**'
              - 'ansible/**'
              - 'doppler.yaml'
              - '.github/workflows/deploy-stack.yml'
            authentik:
              - 'terraform/authentik/**'
              - '.github/workflows/deploy-stack.yml'
          base: main
      - name: Set outputs (use filter or run_all)
        id: outputs
        run: |
          # Manual selection via workflow_dispatch
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.run_all }}" == "true" ]]; then
              echo "cloudflare=true" >> $GITHUB_OUTPUT
              echo "oci=true" >> $GITHUB_OUTPUT
              echo "oci_mgmt=true" >> $GITHUB_OUTPUT
              echo "authentik=true" >> $GITHUB_OUTPUT
            else
              # Individual job selection
              [[ "${{ github.event.inputs.cloudflare }}" == "true" ]] && echo "cloudflare=true" >> $GITHUB_OUTPUT || echo "cloudflare=false" >> $GITHUB_OUTPUT
              [[ "${{ github.event.inputs.oci }}" == "true" ]] && echo "oci=true" >> $GITHUB_OUTPUT || echo "oci=false" >> $GITHUB_OUTPUT
              [[ "${{ github.event.inputs.oci_mgmt }}" == "true" ]] && echo "oci_mgmt=true" >> $GITHUB_OUTPUT || echo "oci_mgmt=false" >> $GITHUB_OUTPUT
              [[ "${{ github.event.inputs.authentik }}" == "true" ]] && echo "authentik=true" >> $GITHUB_OUTPUT || echo "authentik=false" >> $GITHUB_OUTPUT
            fi
          else
            # Auto-detection from path filters
            echo "cloudflare=${{ steps.filter.outputs.cloudflare }}" >> $GITHUB_OUTPUT
            echo "oci=${{ steps.filter.outputs.oci }}" >> $GITHUB_OUTPUT
            echo "oci_mgmt=${{ steps.filter.outputs.oci_mgmt }}" >> $GITHUB_OUTPUT
            echo "authentik=${{ steps.filter.outputs.authentik }}" >> $GITHUB_OUTPUT
          fi

  # ---- 1. Cloudflare ----
  cloudflare:
    name: 1. Cloudflare
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: always() && (needs.detect-changes.result == 'success')
    environment: production
    steps:
      - name: Skip when no Cloudflare changes
        id: skip
        run: echo "run=${{ needs.detect-changes.outputs.cloudflare }}" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v4
        if: steps.skip.outputs.run == 'true'
      - name: Fetch secrets from Doppler
        if: steps.skip.outputs.run == 'true'
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
      - name: Configure OCI for Terraform backend
        if: steps.skip.outputs.run == 'true'
        env:
          OCI_CLI_KEY: ${{ steps.doppler.outputs.OCI_CLI_KEY_CONTENT }}
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_CLI_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/oci_api_key.pem\n' \
            "${{ steps.doppler.outputs.OCI_CLI_USER }}" "${{ steps.doppler.outputs.OCI_CLI_FINGERPRINT }}" "${{ steps.doppler.outputs.OCI_CLI_TENANCY }}" "${{ steps.doppler.outputs.OCI_CLI_REGION }}" "$HOME" > ~/.oci/config
      - uses: hashicorp/setup-terraform@v3
        if: steps.skip.outputs.run == 'true'
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Inject backend namespace
        if: steps.skip.outputs.run == 'true'
        working-directory: ${{ env.TF_CF }}
        env:
          OCI_NAMESPACE: ${{ steps.doppler.outputs.OCI_OBJECT_STORAGE_NAMESPACE }}
        run: |
          [[ -z "$OCI_NAMESPACE" ]] && { echo "::error::OCI_OBJECT_STORAGE_NAMESPACE required"; exit 1; }
          sed -i.bak "s/YOUR_TENANCY_NAMESPACE/$OCI_NAMESPACE/g" main.tf
      - name: Terraform Init
        if: steps.skip.outputs.run == 'true'
        working-directory: ${{ env.TF_CF }}
        run: terraform init -reconfigure
      - name: Create tfvars
        if: steps.skip.outputs.run == 'true'
        working-directory: ${{ env.TF_CF }}
        run: |
          cat > terraform.tfvars << EOF
          cloudflare_api_token = "${{ steps.doppler.outputs.CLOUDFLARE_API_TOKEN }}"
          zone_id = "${{ vars.CLOUDFLARE_ZONE_ID || 'bda8e2196f6b4f1684c6c9c06d996109' }}"
          domain = "smadja.dev"
          enable_tunnel = true
          cloudflare_account_id = "${{ steps.doppler.outputs.CLOUDFLARE_ACCOUNT_ID }}"
          tunnel_secret = "${{ steps.doppler.outputs.CLOUDFLARE_TUNNEL_SECRET }}"
          tunnel_id = "${{ vars.CLOUDFLARE_TUNNEL_ID }}"
          enable_authentik_api_skip_challenge = false
          enable_geo_restriction = false
          enable_access_applications = false
          enable_zone_settings = false
          enable_tunnel_config = true
          oci_management_ip = "${{ vars.OCI_MANAGEMENT_IP }}"
          proxmox_local_ip = "${{ vars.PROXMOX_LOCAL_IP || '192.168.68.51' }}"
          EOF
      - name: Terraform Apply
        if: steps.skip.outputs.run == 'true'
        working-directory: ${{ env.TF_CF }}
        run: terraform apply -refresh=false -auto-approve -lock=false
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.doppler.outputs.CLOUDFLARE_API_TOKEN }}
      - name: Skipped (no Cloudflare changes)
        if: steps.skip.outputs.run != 'true'
        run: echo "Skipped — no changes for Cloudflare"

  # ---- 2. OCI ----
  oci:
    name: 2. OCI
    runs-on: ubuntu-latest
    needs: [detect-changes, cloudflare]
    if: always() && (needs.detect-changes.result == 'success' && needs.cloudflare.result == 'success')
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Skip when no OCI changes
        id: skip
        run: echo "run=${{ needs.detect-changes.outputs.oci }}" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v4
        if: steps.skip.outputs.run == 'true'
      - name: Fetch secrets from Doppler
        if: steps.skip.outputs.run == 'true'
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
      - name: Set SSH public key for Terraform
        if: steps.skip.outputs.run == 'true'
        run: |
          echo "TF_VAR_ssh_public_key<<EOF" >> $GITHUB_ENV
          printf '%s\n' "${{ steps.doppler.outputs.SSH_PUBLIC_KEY }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - uses: hashicorp/setup-terraform@v3
        if: steps.skip.outputs.run == 'true'
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure OCI Authentication
        if: steps.skip.outputs.run == 'true'
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "${{ steps.doppler.outputs.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/oci_api_key.pem\n' \
            "${{ steps.doppler.outputs.OCI_CLI_USER }}" "${{ steps.doppler.outputs.OCI_CLI_FINGERPRINT }}" "${{ steps.doppler.outputs.OCI_CLI_TENANCY }}" "${{ steps.doppler.outputs.OCI_CLI_REGION }}" "$HOME" > ~/.oci/config
      - name: Inject backend namespace
        if: steps.skip.outputs.run == 'true'
        working-directory: ${{ env.TF_OCI }}
        run: sed -i.bak "s/YOUR_TENANCY_NAMESPACE/${{ steps.doppler.outputs.OCI_OBJECT_STORAGE_NAMESPACE }}/g" backend.tf
      - name: Terraform Init
        if: steps.skip.outputs.run == 'true'
        working-directory: ${{ env.TF_OCI }}
        run: terraform init -reconfigure
      - name: Terraform Apply
        if: steps.skip.outputs.run == 'true'
        working-directory: ${{ env.TF_OCI }}
        run: terraform apply -refresh=false -auto-approve -lock=false
        env:
          TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
          TF_VAR_vault_secrets_managed_in_ci: "true"
          TF_VAR_budget_alert_email: ${{ vars.TF_VAR_budget_alert_email || 'smadjapaul02@gmail.com' }}
          TF_VAR_user_ocid: ${{ steps.doppler.outputs.OCI_CLI_USER }}
          TF_VAR_admin_allowed_cidrs: ${{ secrets.ADMIN_ALLOWED_CIDRS || '[]' }}
          TF_VAR_allow_ssh_from_anywhere: ${{ vars.ALLOW_SSH_FROM_ANYWHERE || 'false' }}
      - name: Skipped (no OCI changes)
        if: steps.skip.outputs.run != 'true'
        run: echo "Skipped — no changes for OCI"

  # ---- 3. Deploy OCI Management Stack ----
  oci-mgmt:
    name: 3. Deploy oci-mgmt
    runs-on: ubuntu-latest
    needs: [detect-changes, oci]
    if: always() && (needs.detect-changes.result == 'success' && needs.oci.result == 'success')
    environment: production
    permissions:
      contents: read
      id-token: write
    outputs:
      mgmt_ip: ${{ steps.get-ip.outputs.public_ip }}
      vm_exists: ${{ steps.get-ip.outputs.vm_exists }}
    steps:
      - name: Skip when no oci-mgmt changes
        id: skip
        run: echo "run=${{ needs.detect-changes.outputs.oci_mgmt }}" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v4
        if: steps.skip.outputs.run == 'true'
      - name: Fetch secrets from Doppler
        if: steps.skip.outputs.run == 'true'
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
      - name: Setup Terraform (get VM IP)
        if: steps.skip.outputs.run == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure OCI Authentication
        if: steps.skip.outputs.run == 'true'
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "${{ steps.doppler.outputs.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/oci_api_key.pem\n' \
            "${{ steps.doppler.outputs.OCI_CLI_USER }}" "${{ steps.doppler.outputs.OCI_CLI_FINGERPRINT }}" "${{ steps.doppler.outputs.OCI_CLI_TENANCY }}" "${{ steps.doppler.outputs.OCI_CLI_REGION }}" "$HOME" > ~/.oci/config
      - name: Inject backend namespace
        if: steps.skip.outputs.run == 'true'
        working-directory: ${{ env.TF_OCI }}
        run: sed -i.bak "s/YOUR_TENANCY_NAMESPACE/${{ steps.doppler.outputs.OCI_OBJECT_STORAGE_NAMESPACE }}/g" backend.tf
      - name: Terraform Init
        if: steps.skip.outputs.run == 'true'
        working-directory: ${{ env.TF_OCI }}
        run: terraform init -reconfigure
      - name: Get management VM IP
        id: get-ip
        if: steps.skip.outputs.run == 'true'
        working-directory: ${{ env.TF_OCI }}
        run: |
          IP=$(terraform output -json 2>/dev/null | jq -r '.management_vm.value.public_ip // empty')
          if [[ -z "$IP" ]]; then
            echo "public_ip=" >> $GITHUB_OUTPUT
            echo "vm_exists=false" >> $GITHUB_OUTPUT
          else
            echo "public_ip=$IP" >> $GITHUB_OUTPUT
            echo "vm_exists=true" >> $GITHUB_OUTPUT
          fi
      - name: Setup SSH key
        if: steps.skip.outputs.run == 'true' && steps.get-ip.outputs.vm_exists == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ steps.doppler.outputs.SSH_PRIVATE_KEY }}" > ~/.ssh/oci-homelab
          chmod 600 ~/.ssh/oci-homelab
          echo "Host 141.253.104.22" >> ~/.ssh/config
          echo "    IdentityFile ~/.ssh/oci-homelab" >> ~/.ssh/config
          echo "    StrictHostKeyChecking no" >> ~/.ssh/config
      - name: Run Ansible Playbook
        if: steps.skip.outputs.run == 'true' && steps.get-ip.outputs.vm_exists == 'true'
        run: |
          # Install Ansible
          pip install ansible
          ansible-galaxy collection install community.docker || true

          # Sync oci-core to VM and deploy
          rsync -avz --exclude='.env' --exclude='data' --exclude='.git' \
            -e "ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no" \
            ./docker/oci-core/ ubuntu@${{ steps.get-ip.outputs.public_ip }}:/opt/oci-core/

          # Run deployment via SSH
          ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no ubuntu@${{ steps.get-ip.outputs.public_ip }} << 'ANSIBLE_EOF'
            cd /opt/oci-core

            # Create directories
            mkdir -p data/traefik/letsencrypt
            mkdir -p data/authentik/{postgres,redis,media,custom-templates,certs}
            mkdir -p data/prometheus data/uptime-kuma data/gotify
            mkdir -p data/gitea data/vaultwarden data/filebrowser/database

            # Stop systemd-resolved
            sudo systemctl stop systemd-resolved || true
            echo "nameserver 1.1.1.1" | sudo tee /etc/resolv.conf

            # Deploy with Doppler (pass secrets via SSH)
            export DOPPLER_TOKEN="${{ secrets.DOPPLER_SERVICE_TOKEN }}"
            doppler run --project infrastructure --config prd -- docker compose --profile core up -d
          ANSIBLE_EOF
      - name: Skipped (no oci-mgmt changes)
        if: steps.skip.outputs.run != 'true'
        run: echo "Skipped — no changes for oci-mgmt"

  # ---- 4. Authentik ----
  authentik:
    name: 4. Authentik
    runs-on: ubuntu-latest
    needs: [detect-changes, oci-mgmt]
    if: always() && (needs.detect-changes.result == 'success' && needs.oci-mgmt.result == 'success')
    environment: production
    steps:
      - name: Skip when no Authentik changes
        id: skip
        run: echo "run=${{ needs.detect-changes.outputs.authentik }}" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v4
        if: steps.skip.outputs.run == 'true'
      - name: Fetch secrets from Doppler
        if: steps.skip.outputs.run == 'true'
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
      - name: Configure OCI
        if: steps.skip.outputs.run == 'true'
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "${{ steps.doppler.outputs.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/oci_api_key.pem\n' \
            "${{ steps.doppler.outputs.OCI_CLI_USER }}" "${{ steps.doppler.outputs.OCI_CLI_FINGERPRINT }}" "${{ steps.doppler.outputs.OCI_CLI_TENANCY }}" "${{ steps.doppler.outputs.OCI_CLI_REGION }}" "$HOME" > ~/.oci/config
      - uses: hashicorp/setup-terraform@v3
        if: steps.skip.outputs.run == 'true'
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Inject backend namespace (OCI)
        if: steps.skip.outputs.run == 'true'
        working-directory: ${{ env.TF_AUTH }}
        env:
          OCI_NAMESPACE: ${{ steps.doppler.outputs.OCI_OBJECT_STORAGE_NAMESPACE }}
        run: |
          [[ -z "$OCI_NAMESPACE" ]] && { echo "::error::OCI_OBJECT_STORAGE_NAMESPACE required for Authentik backend"; exit 1; }
          sed -i.bak "s/YOUR_TENANCY_NAMESPACE/$OCI_NAMESPACE/g" backend.tf
      - name: Terraform Init
        if: steps.skip.outputs.run == 'true'
        working-directory: ${{ env.TF_AUTH }}
        run: terraform init -reconfigure -input=false
      - name: Terraform Apply
        if: steps.skip.outputs.run == 'true'
        working-directory: ${{ env.TF_AUTH }}
        env:
          AUTHENTIK_URL: ${{ steps.doppler.outputs.AUTHENTIK_URL || 'https://auth.smadja.dev' }}
          AUTHENTIK_TOKEN: ${{ steps.doppler.outputs.AUTHENTIK_TOKEN }}
          TF_VAR_authentik_url: ${{ steps.doppler.outputs.AUTHENTIK_URL || 'https://auth.smadja.dev' }}
        run: |
          terraform plan -input=false -var="authentik_url=${{ steps.doppler.outputs.AUTHENTIK_URL || 'https://auth.smadja.dev' }}" -out=tfplan
          terraform apply -input=false -auto-approve -lock=false tfplan || terraform apply -input=false -auto-approve -lock=false -var="authentik_url=${{ steps.doppler.outputs.AUTHENTIK_URL || 'https://auth.smadja.dev' }}"
      - name: Skipped (no Authentik changes)
        if: steps.skip.outputs.run != 'true'
        run: echo "Skipped — no changes for Authentik"
