name: Deploy Stack

on:
  push:
    branches: [main]
    paths:
      - 'terraform/cloudflare/**'
      - 'terraform/oracle-cloud/**'
      - 'ansible/**'
      - 'terraform/authentik/**'
      - 'doppler.yaml'
      - '.github/workflows/deploy-stack.yml'
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run all layers'
        required: false
        default: true
        type: boolean
      cloudflare:
        description: 'Run Cloudflare'
        required: false
        default: false
        type: boolean
      oci:
        description: 'Run OCI'
        required: false
        default: false
        type: boolean
      oci_mgmt:
        description: 'Run oci-mgmt (Ansible)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-stack-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: '1.14.4'
  TF_CF: terraform/cloudflare
  TF_OCI: terraform/oracle-cloud

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      cloudflare: ${{ steps.filter.outputs.cloudflare }}
      oci: ${{ steps.filter.outputs.oci }}
      oci_mgmt: ${{ steps.filter.outputs.oci_mgmt }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cloudflare:
              - 'terraform/cloudflare/**'
            oci:
              - 'terraform/oracle-cloud/**'
            oci_mgmt:
              - 'ansible/**'
          base: main

  cloudflare:
    name: 1. Cloudflare
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' && (github.inputs.run_all == 'true' || github.inputs.cloudflare == 'true') || needs.detect-changes.outputs.cloudflare == 'true'
    continue-on-error: true
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Fetch secrets from Doppler
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          echo "${{ steps.doppler.outputs.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << OCIEOF
          [DEFAULT]
          user=${{ steps.doppler.outputs.OCI_CLI_USER }}
          fingerprint=${{ steps.doppler.outputs.OCI_CLI_FINGERPRINT }}
          tenancy=${{ steps.doppler.outputs.OCI_CLI_TENANCY }}
          region=${{ steps.doppler.outputs.OCI_CLI_REGION }}
          key_file=$HOME/.oci/oci_api_key.pem
          OCIEOF
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Inject backend namespace
        working-directory: ${{ env.TF_CF }}
        run: sed -i.bak "s/YOUR_TENANCY_NAMESPACE/${{ steps.doppler.outputs.OCI_OBJECT_STORAGE_NAMESPACE }}/g" main.tf
      - name: Terraform Init
        working-directory: ${{ env.TF_CF }}
        run: terraform init -reconfigure
      - name: Create tfvars
        working-directory: ${{ env.TF_CF }}
        run: |
          # Validate and set defaults for Cloudflare variables
          DOMAIN="${{ steps.doppler.outputs.DOMAIN }}"
          ZONE_ID="${{ steps.doppler.outputs.CLOUDFLARE_ZONE_ID }}"
          API_TOKEN="${{ steps.doppler.outputs.CLOUDFLARE_API_TOKEN }}"

          # Validate required variables with fallbacks
          if [ -z "$API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not set in Doppler"
            exit 1
          fi

          if [ -z "$DOMAIN" ]; then
            echo "::warning::DOMAIN not set in Doppler, using default: smadja.dev"
            DOMAIN="smadja.dev"
          fi

          if [ -z "$ZONE_ID" ]; then
            echo "::warning::CLOUDFLARE_ZONE_ID not set in Doppler, using default"
            ZONE_ID="bda8e2196f6b4f1684c6c9c06d996109"
          fi

          # Set optional feature flags with defaults
          ENABLE_ZONE_SETTINGS="${{ steps.doppler.outputs.ENABLE_ZONE_SETTINGS }}"
          ENABLE_GEO_RESTRICTION="${{ steps.doppler.outputs.ENABLE_GEO_RESTRICTION }}"
          ENABLE_API_SKIP_CHALLENGE="${{ steps.doppler.outputs.ENABLE_API_SKIP_CHALLENGE }}"

          # Default to false if not set
          [ -z "$ENABLE_ZONE_SETTINGS" ] && ENABLE_ZONE_SETTINGS="false"
          [ -z "$ENABLE_GEO_RESTRICTION" ] && ENABLE_GEO_RESTRICTION="false"
          [ -z "$ENABLE_API_SKIP_CHALLENGE" ] && ENABLE_API_SKIP_CHALLENGE="false"

          cat > terraform.tfvars << EOF
          cloudflare_api_token = "$API_TOKEN"
          zone_id = "$ZONE_ID"
          domain = "$DOMAIN"
          enable_tunnel = true
          cloudflare_account_id = "${{ steps.doppler.outputs.CLOUDFLARE_ACCOUNT_ID }}"
          tunnel_secret = "${{ steps.doppler.outputs.CLOUDFLARE_TUNNEL_SECRET }}"
          tunnel_id = "${{ steps.doppler.outputs.CLOUDFLARE_TUNNEL_ID }}"
          enable_tunnel_config = true
          # Zone WAF features (require Zone WAF permissions)
          enable_zone_settings = $ENABLE_ZONE_SETTINGS
          enable_geo_restriction = $ENABLE_GEO_RESTRICTION
          enable_authentik_api_skip_challenge = $ENABLE_API_SKIP_CHALLENGE
          EOF
      - name: Terraform Apply
        working-directory: ${{ env.TF_CF }}
        run: terraform apply -refresh=false -auto-approve -lock=false

  oci:
    name: 2. OCI Infrastructure
    runs-on: ubuntu-latest
    needs: cloudflare
    if: github.event_name == 'workflow_dispatch' && (github.inputs.run_all == 'true' || github.inputs.oci == 'true') || needs.detect-changes.outputs.oci == 'true'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch secrets from Doppler
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
      - name: Set SSH public key
        run: |
          echo "TF_VAR_ssh_public_key<<EOF" >> $GITHUB_ENV
          echo "${{ steps.doppler.outputs.SSH_PUBLIC_KEY }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          echo "${{ steps.doppler.outputs.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << OCIEOF
          [DEFAULT]
          user=${{ steps.doppler.outputs.OCI_CLI_USER }}
          fingerprint=${{ steps.doppler.outputs.OCI_CLI_FINGERPRINT }}
          tenancy=${{ steps.doppler.outputs.OCI_CLI_TENANCY }}
          region=${{ steps.doppler.outputs.OCI_CLI_REGION }}
          key_file=$HOME/.oci/oci_api_key.pem
          OCIEOF
      - name: Inject backend namespace
        working-directory: ${{ env.TF_OCI }}
        run: sed -i.bak "s/YOUR_TENANCY_NAMESPACE/${{ steps.doppler.outputs.OCI_OBJECT_STORAGE_NAMESPACE }}/g" backend.tf
      - name: Terraform Init
        working-directory: ${{ env.TF_OCI }}
        run: terraform init -reconfigure
      - name: Terraform Apply
        working-directory: ${{ env.TF_OCI }}
        run: terraform apply -refresh=false -auto-approve -lock=false
        env:
          TF_VAR_compartment_id: ${{ steps.doppler.outputs.OCI_COMPARTMENT_ID }}
          TF_VAR_budget_alert_email: ${{ steps.doppler.outputs.ALERT_EMAIL }}

  oci-mgmt:
    name: 3. Deploy oci-mgmt (Ansible)
    runs-on: ubuntu-latest
    needs: oci
    if: github.event_name == 'workflow_dispatch' && (github.inputs.run_all == 'true' || github.inputs.oci_mgmt == 'true') || needs.detect-changes.outputs.oci_mgmt == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Fetch secrets from Doppler
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ steps.doppler.outputs.SSH_PRIVATE_KEY }}" > ~/.ssh/oci-homelab
          chmod 600 ~/.ssh/oci-homelab
      - name: Setup Terraform (get VM IP)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          echo "${{ steps.doppler.outputs.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << OCIEOF
          [DEFAULT]
          user=${{ steps.doppler.outputs.OCI_CLI_USER }}
          fingerprint=${{ steps.doppler.outputs.OCI_CLI_FINGERPRINT }}
          tenancy=${{ steps.doppler.outputs.OCI_CLI_TENANCY }}
          region=${{ steps.doppler.outputs.OCI_CLI_REGION }}
          key_file=$HOME/.oci/oci_api_key.pem
          OCIEOF
      - name: Inject backend namespace
        working-directory: ${{ env.TF_OCI }}
        run: sed -i.bak "s/YOUR_TENANCY_NAMESPACE/${{ steps.doppler.outputs.OCI_OBJECT_STORAGE_NAMESPACE }}/g" backend.tf
      - name: Terraform Init
        working-directory: ${{ env.TF_OCI }}
        run: terraform init -reconfigure
      - name: Get management VM IP
        id: get-ip
        working-directory: ${{ env.TF_OCI }}
        run: |
          IP=$(terraform output -json 2>/dev/null | jq -r '.management_vm.value.public_ip // empty')
          echo "public_ip=$IP" >> $GITHUB_OUTPUT
          echo "vm_exists=$([[ -n "$IP" ]] && echo "true" || echo "false")" >> $GITHUB_OUTPUT
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ansible
        if: steps.get-ip.outputs.vm_exists == 'true'
        run: |
          pip install ansible
      - name: Run Ansible Playbook
        if: steps.get-ip.outputs.vm_exists == 'true'
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ steps.doppler.outputs.CLOUDFLARE_TUNNEL_TOKEN }}
          LITELLM_MASTER_KEY: ${{ steps.doppler.outputs.LITELLM_MASTER_KEY }}
          OPENCLAW_JWT_SECRET: ${{ steps.doppler.outputs.OPENCLAW_JWT_SECRET }}
        run: |
          # Update inventory with dynamic IP
          sed -i "s/ansible_host: .*/ansible_host: ${{ steps.get-ip.outputs.public_ip }}/" ansible/inventories/oracle/hosts.yml

          # Run Ansible
          ansible-playbook -i ansible/inventories/oracle/hosts.yml ansible/playbooks/deploy-oci-core.yml \
            --private-key ~/.ssh/oci-homelab \
            -u ubuntu \
            -e "doppler_token=${{ secrets.DOPPLER_SERVICE_TOKEN }}"
