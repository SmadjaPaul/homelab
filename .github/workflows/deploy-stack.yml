name: Deploy Stack

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'docker/**'
      - 'ansible/**'
      - '.github/workflows/deploy-stack.yml'
      - '.github/actions/**'
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run all layers'
        required: false
        default: true
        type: boolean
      cloudflare:
        description: 'Run Cloudflare'
        required: false
        default: false
        type: boolean
      oci:
        description: 'Run OCI Infrastructure'
        required: false
        default: false
        type: boolean
      oci_mgmt:
        description: 'Deploy Docker Compose to OCI'
        required: false
        default: false
        type: boolean
      authentik:
        description: 'Configure Authentik'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-stack-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: '1.14.4'

jobs:
  # =============================================================================
  # DETECT CHANGES
  # =============================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      cloudflare: ${{ steps.filter.outputs.cloudflare }}
      oci: ${{ steps.filter.outputs.oci }}
      authentik: ${{ steps.filter.outputs.authentik }}
      oci_mgmt: ${{ steps.filter.outputs.oci_mgmt }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cloudflare:
              - 'terraform/cloudflare/**'
            oci:
              - 'terraform/oracle-cloud/**'
            authentik:
              - 'terraform/authentik/**'
            oci_mgmt:
              - 'docker/oci-core/**'
              - 'ansible/**'
          base: main

  # =============================================================================
  # LAYER 1: Cloudflare (DNS, Tunnel, Access)
  # =============================================================================
  cloudflare:
    name: '1️⃣ Cloudflare'
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.run_all == true || inputs.cloudflare == true)) ||
      (github.event_name == 'push' && needs.detect-changes.outputs.cloudflare == 'true')
    environment: production
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_OBJECT_STORAGE_NAMESPACE: ${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform with OCI Backend
        uses: ./.github/actions/terraform-oci
        with:
          working-directory: terraform/cloudflare
          terraform-version: ${{ env.TF_VERSION }}
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          oci-object-storage-namespace: ${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}

      - name: Terraform Apply
        working-directory: terraform/cloudflare
        run: terraform apply -auto-approve -lock=false
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_domain: ${{ secrets.DOMAIN }}
          TF_VAR_tunnel_id: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
          TF_VAR_tunnel_secret: ${{ secrets.CLOUDFLARE_TUNNEL_SECRET }}
          TF_VAR_create_root_record: "false"
          TF_VAR_enable_authentik_api_skip_challenge: "true"

  # =============================================================================
  # LAYER 2: OCI Infrastructure (VMs, Network)
  # =============================================================================
  oci:
    name: '2️⃣ OCI Infrastructure'
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.run_all == true || inputs.oci == true)) ||
      (github.event_name == 'push' && needs.detect-changes.outputs.oci == 'true')
    environment: production
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_OBJECT_STORAGE_NAMESPACE: ${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform with OCI Backend
        uses: ./.github/actions/terraform-oci
        with:
          working-directory: terraform/oracle-cloud
          terraform-version: ${{ env.TF_VERSION }}
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          oci-object-storage-namespace: ${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}
          oci-compartment-id: ${{ secrets.OCI_COMPARTMENT_ID }}

      - name: Terraform Apply
        working-directory: terraform/oracle-cloud
        run: terraform apply -auto-approve -lock=false
        env:
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
          TF_VAR_budget_alert_email: ${{ secrets.ALERT_EMAIL }}

  # =============================================================================
  # LAYER 3: Deploy Docker Compose (Authentik, Traefik, etc.)
  # =============================================================================
  oci-mgmt:
    name: '3️⃣ Deploy Services'
    runs-on: ubuntu-latest
    needs: [detect-changes, oci]
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.run_all == true || inputs.oci_mgmt == true)) ||
      (github.event_name == 'push' && needs.detect-changes.outputs.oci_mgmt == 'true')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Get VM IP
        id: get-ip
        uses: ./.github/actions/get-oci-vm-ip
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          oci-object-storage-namespace: ${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}
          oci-mgmt-ip: ${{ secrets.OCI_MGMT_IP }}

      - name: Deploy Docker Compose
        uses: ./.github/actions/deploy-docker-compose
        with:
          compose-project: 'oci-core'
          compose-profile: 'core'
          wait-for-healthy: 'true'
          health-timeout: '300'
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          oci-object-storage-namespace: ${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          vm-ip: ${{ steps.get-ip.outputs.vm_ip }}
          acme-email: ${{ secrets.ACME_EMAIL }}
          cloudflare-tunnel-token: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          authentik-secret-key: ${{ secrets.AUTHENTIK_SECRET_KEY }}
          authentik-bootstrap-token: ${{ secrets.AUTHENTIK_BOOTSTRAP_TOKEN }}
          authentik-bootstrap-password: ${{ secrets.AUTHENTIK_BOOTSTRAP_PASSWORD }}
          authentik-postgres-host: ${{ secrets.AUTHENTIK_POSTGRES_HOST }}
          authentik-postgres-port: ${{ secrets.AUTHENTIK_POSTGRES_PORT }}
          authentik-postgres-name: ${{ secrets.AUTHENTIK_POSTGRES_NAME }}
          authentik-postgres-user: ${{ secrets.AUTHENTIK_POSTGRES_USER }}
          authentik-postgres-password: ${{ secrets.AUTHENTIK_POSTGRES_PASSWORD }}
          litellm-master-key: ${{ secrets.LITELLM_MASTER_KEY }}
          openclaw-litellm-key: ${{ secrets.OPENCLAW_LITELLM_KEY }}
          openclaw-jwt-secret: ${{ secrets.OPENCLAW_JWT_SECRET }}
          grafana-cloud-metrics-url: ${{ secrets.GRAFANA_CLOUD_METRICS_URL }}
          grafana-cloud-logs-url: ${{ secrets.GRAFANA_CLOUD_LOGS_URL }}
          grafana-cloud-api-key: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          domain: ${{ secrets.DOMAIN }}

  # =============================================================================
  # LAYER 4: Configure Authentik (Using SSH Tunnel)
  # =============================================================================
  authentik:
    name: '4️⃣ Configure Authentik'
    runs-on: ubuntu-latest
    needs: [detect-changes, oci-mgmt]
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.run_all == true || inputs.authentik == true)) ||
      (github.event_name == 'push' && needs.detect-changes.outputs.authentik == 'true')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Tunnel to Authentik
        uses: ./.github/actions/setup-authentik-tunnel
        with:
          vm-ip: ${{ secrets.OCI_MGMT_IP }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform with OCI Backend
        uses: ./.github/actions/terraform-oci
        with:
          working-directory: terraform/authentik
          terraform-version: ${{ env.TF_VERSION }}
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          oci-object-storage-namespace: ${{ secrets.OCI_OBJECT_STORAGE_NAMESPACE }}

      - name: Wait for Authentik API
        continue-on-error: true
        run: |
          echo "Waiting for Authentik API to be ready (via SSH tunnel)..."
          MAX_RETRIES=30
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            if curl -sf -H "Authorization: Bearer $AUTHENTIK_TOKEN" \
              "http://localhost:9000/api/v3/core/users/?page_size=1" > /dev/null 2>&1; then
              echo "✅ Authentik API is ready!"
              exit 0
            fi
            echo "⏳ Attempt $((RETRY + 1))/$MAX_RETRIES - API not ready yet..."
            sleep 2
            RETRY=$((RETRY + 1))
          done
          echo "⚠️ API check timeout, continuing anyway..."
        env:
          AUTHENTIK_TOKEN: ${{ secrets.AUTHENTIK_BOOTSTRAP_TOKEN }}

      - name: Terraform Apply
        working-directory: terraform/authentik
        run: terraform apply -auto-approve -lock=false
        env:
          AUTHENTIK_URL: http://localhost:9000
          AUTHENTIK_TOKEN: ${{ secrets.AUTHENTIK_BOOTSTRAP_TOKEN }}
