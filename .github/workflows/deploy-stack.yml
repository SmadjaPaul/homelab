name: Deploy Stack

on:
  push:
    branches: [main]
    paths:
      - 'terraform/cloudflare/**'
      - 'terraform/oracle-cloud/**'
      - 'docker/oci-core/**'
      - 'ansible/**'
      - 'terraform/authentik/**'
      - 'doppler.yaml'
      - 'Taskfile.yaml'
      - '.github/workflows/deploy-stack.yml'
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run all layers'
        required: false
        default: true
        type: boolean
      cloudflare:
        description: 'Run Cloudflare'
        required: false
        default: false
        type: boolean
      oci:
        description: 'Run OCI'
        required: false
        default: false
        type: boolean
      oci_mgmt:
        description: 'Run oci-mgmt'
        required: false
        default: false
        type: boolean
      authentik:
        description: 'Run Authentik'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-stack-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: '1.14.4'
  TF_CF: terraform/cloudflare
  TF_OCI: terraform/oracle-cloud
  TF_AUTH: terraform/authentik

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      cloudflare: ${{ steps.filter.outputs.cloudflare }}
      oci: ${{ steps.filter.outputs.oci }}
      oci_mgmt: ${{ steps.filter.outputs.oci_mgmt }}
      authentik: ${{ steps.filter.outputs.authentik }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cloudflare:
              - 'terraform/cloudflare/**'
            oci:
              - 'terraform/oracle-cloud/**'
            oci_mgmt:
              - 'docker/oci-core/**'
              - 'ansible/**'
              - 'doppler.yaml'
            authentik:
              - 'terraform/authentik/**'
          base: main

  cloudflare:
    name: 1. Cloudflare
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.cloudflare == 'true'
    continue-on-error: true
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Fetch secrets from Doppler
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "${{ steps.doppler.outputs.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/oci_api_key.pem\n' \
            "${{ steps.doppler.outputs.OCI_CLI_USER }}" "${{ steps.doppler.outputs.OCI_CLI_FINGERPRINT }}" "${{ steps.doppler.outputs.OCI_CLI_TENANCY }}" "${{ steps.doppler.outputs.OCI_CLI_REGION }}" "$HOME" > ~/.oci/config
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Inject backend namespace
        working-directory: ${{ env.TF_CF }}
        run: sed -i.bak "s/YOUR_TENANCY_NAMESPACE/${{ steps.doppler.outputs.OCI_OBJECT_STORAGE_NAMESPACE }}/g" main.tf
      - name: Terraform Init
        working-directory: ${{ env.TF_CF }}
        run: terraform init -reconfigure
      - name: Create tfvars
        working-directory: ${{ env.TF_CF }}
        run: |
          cat > terraform.tfvars << EOF
          cloudflare_api_token = "${{ steps.doppler.outputs.CLOUDFLARE_API_TOKEN }}"
          zone_id = "bda8e2196f6b4f1684c6c9c06d996109"
          domain = "smadja.dev"
          enable_tunnel = true
          cloudflare_account_id = "${{ steps.doppler.outputs.CLOUDFLARE_ACCOUNT_ID }}"
          tunnel_secret = "${{ steps.doppler.outputs.CLOUDFLARE_TUNNEL_SECRET }}"
          tunnel_id = "64e0b862-35f3-45e8-ab7c-f1eee6609eab"
          enable_tunnel_config = true
          EOF
      - name: Terraform Apply
        working-directory: ${{ env.TF_CF }}
        run: terraform apply -refresh=false -auto-approve -lock=false

  oci:
    name: 2. OCI
    runs-on: ubuntu-latest
    needs: cloudflare
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.oci == 'true'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch secrets from Doppler
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
      - name: Set SSH public key
        run: |
          echo "TF_VAR_ssh_public_key<<EOF" >> $GITHUB_ENV
          printf '%s\n' "${{ steps.doppler.outputs.SSH_PUBLIC_KEY }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "${{ steps.doppler.outputs.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/oci_api_key.pem\n' \
            "${{ steps.doppler.outputs.OCI_CLI_USER }}" "${{ steps.doppler.outputs.OCI_CLI_FINGERPRINT }}" "${{ steps.doppler.outputs.OCI_CLI_TENANCY }}" "${{ steps.doppler.outputs.OCI_CLI_REGION }}" "$HOME" > ~/.oci/config
      - name: Inject backend namespace
        working-directory: ${{ env.TF_OCI }}
        run: sed -i.bak "s/YOUR_TENANCY_NAMESPACE/${{ steps.doppler.outputs.OCI_OBJECT_STORAGE_NAMESPACE }}/g" backend.tf
      - name: Terraform Init
        working-directory: ${{ env.TF_OCI }}
        run: terraform init -reconfigure
      - name: Terraform Apply
        working-directory: ${{ env.TF_OCI }}
        run: terraform apply -refresh=false -auto-approve -lock=false
        env:
          TF_VAR_compartment_id: ${{ steps.doppler.outputs.OCI_COMPARTMENT_ID }}
          TF_VAR_budget_alert_email: smadjapaul02@gmail.com

  oci-mgmt:
    name: 3. Deploy oci-mgmt
    runs-on: ubuntu-latest
    needs: oci
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.oci_mgmt == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Fetch secrets from Doppler
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
      - name: Setup Terraform (get VM IP)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "${{ steps.doppler.outputs.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/oci_api_key.pem\n' \
            "${{ steps.doppler.outputs.OCI_CLI_USER }}" "${{ steps.doppler.outputs.OCI_CLI_FINGERPRINT }}" "${{ steps.doppler.outputs.OCI_CLI_TENANCY }}" "${{ steps.doppler.outputs.OCI_CLI_REGION }}" "$HOME" > ~/.oci/config
      - name: Inject backend namespace
        working-directory: ${{ env.TF_OCI }}
        run: sed -i.bak "s/YOUR_TENANCY_NAMESPACE/${{ steps.doppler.outputs.OCI_OBJECT_STORAGE_NAMESPACE }}/g" backend.tf
      - name: Terraform Init
        working-directory: ${{ env.TF_OCI }}
        run: terraform init -reconfigure
      - name: Get management VM IP
        id: get-ip
        working-directory: ${{ env.TF_OCI }}
        run: |
          IP=$(terraform output -json 2>/dev/null | jq -r '.management_vm.value.public_ip // empty')
          echo "public_ip=$IP" >> $GITHUB_OUTPUT
          echo "vm_exists=$([[ -n "$IP" ]] && echo "true" || echo "false")" >> $GITHUB_OUTPUT
      - name: Setup SSH key
        if: steps.get-ip.outputs.vm_exists == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ steps.doppler.outputs.SSH_PRIVATE_KEY }}" > ~/.ssh/oci-homelab
          chmod 600 ~/.ssh/oci-homelab
          echo "Host ${{ steps.get-ip.outputs.public_ip }}" >> ~/.ssh/config
          echo "    IdentityFile ~/.ssh/oci-homelab" >> ~/.ssh/config
          echo "    StrictHostKeyChecking no" >> ~/.ssh/config
          echo "    BatchMode yes" >> ~/.ssh/config
      - name: Deploy to VM
        if: steps.get-ip.outputs.vm_exists == 'true'
        run: |
          ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o BatchMode=yes ubuntu@${{ steps.get-ip.outputs.public_ip }} \
            "sudo mkdir -p /opt/oci-core && sudo chown -R ubuntu:ubuntu /opt/oci-core"

          rsync -avz --exclude='.env' --exclude='data' --exclude='.git' \
            -e "ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o BatchMode=yes" \
            ./docker/oci-core/ ubuntu@${{ steps.get-ip.outputs.public_ip }}:/opt/oci-core/

          ssh -i ~/.ssh/oci-homelab -o StrictHostKeyChecking=no -o BatchMode=yes ubuntu@${{ steps.get-ip.outputs.public_ip }} \
            "cd /opt/oci-core && \
             mkdir -p data/traefik/letsencrypt data/authentik/{postgres,redis,media,custom-templates,certs} data/prometheus data/uptime-kuma data/gotify data/gitea data/vaultwarden data/filebrowser/database && \
             (sudo systemctl stop systemd-resolved 2>/dev/null || true) && \
             echo 'nameserver 1.1.1.1' | sudo tee /etc/resolv.conf && \
             export DOPPLER_TOKEN='${{ secrets.DOPPLER_SERVICE_TOKEN }}' && \
             doppler run --project infrastructure --config prd -- docker compose --profile core up -d"

  authentik:
    name: 4. Authentik
    runs-on: ubuntu-latest
    needs: oci-mgmt
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.authentik == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Fetch secrets from Doppler
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "${{ steps.doppler.outputs.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/oci_api_key.pem\n' \
            "${{ steps.doppler.outputs.OCI_CLI_USER }}" "${{ steps.doppler.outputs.OCI_CLI_FINGERPRINT }}" "${{ steps.doppler.outputs.OCI_CLI_TENANCY }}" "${{ steps.doppler.outputs.OCI_CLI_REGION }}" "$HOME" > ~/.oci/config
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Inject backend namespace
        working-directory: ${{ env.TF_AUTH }}
        run: sed -i.bak "s/YOUR_TENANCY_NAMESPACE/${{ steps.doppler.outputs.OCI_OBJECT_STORAGE_NAMESPACE }}/g" backend.tf
      - name: Terraform Init
        working-directory: ${{ env.TF_AUTH }}
        run: terraform init -reconfigure -input=false
      - name: Terraform Apply
        working-directory: ${{ env.TF_AUTH }}
        run: terraform apply -input=false -auto-approve -lock=false -var="authentik_url=https://auth.smadja.dev"
