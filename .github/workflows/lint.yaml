name: Validate Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - 'kubernetes/**'
  pull_request:
    branches:
      - main
    paths:
      - 'kubernetes/**'

jobs:
  validate-k8s:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Validate Kubernetes manifests (syntax only)
        run: |
          # Just check YAML syntax, don't try to connect to a cluster
          find kubernetes/ -name "*.yaml" -type f | head -20
          echo "YAML files found. Use pre-commit for full validation."
