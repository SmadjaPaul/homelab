name: Terraform (Disabled)

on:
  workflow_dispatch:
    inputs:
      workspace:
        description: 'Terraform workspace/project to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - auth0
          - cloudflare
          - oracle-cloud
      action:
        description: 'Terraform action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
  TF_VERSION: "1.12.0"

jobs:
  # =============================================================================
  # AUTH0
  # =============================================================================
  auth0:
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.workspace == 'auth0' ||
      github.event.inputs.workspace == 'all' ||
      github.event_name != 'workflow_dispatch'
    environment: production
    defaults:
      run:
        working-directory: terraform/auth0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            terraform/auth0/.terraform
          key: ${{ runner.os }}-terraform-auth0-${{ hashFiles('terraform/auth0/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-auth0-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Terraform Init
        run: terraform init
        env:
          TF_VAR_doppler_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action != 'destroy' && github.ref == 'refs/heads/main'
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_doppler_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_doppler_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
        env:
          TF_VAR_doppler_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}

  # =============================================================================
  # CLOUDFLARE
  # =============================================================================
  cloudflare:
    runs-on: ubuntu-latest
    needs: auth0
    if: |
      (github.event.inputs.workspace == 'cloudflare' ||
       github.event.inputs.workspace == 'all' ||
       github.event_name != 'workflow_dispatch') &&
      always() && (needs.auth0.result == 'success' || needs.auth0.result == 'skipped')
    environment: production
    defaults:
      run:
        working-directory: terraform/cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            terraform/cloudflare/.terraform
          key: ${{ runner.os }}-terraform-cloudflare-${{ hashFiles('terraform/cloudflare/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-cloudflare-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}


      - name: Terraform Init
        run: terraform init
        env:
          TF_VAR_doppler_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action != 'destroy' && github.ref == 'refs/heads/main'
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_doppler_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_doppler_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
        env:
          TF_VAR_doppler_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}

      - name: Output Tunnel Info
        if: github.event.inputs.action == 'apply' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          echo "Tunnel ID: $(terraform output -raw tunnel_id 2>/dev/null || echo 'N/A')"
          echo "CNAME Target: $(terraform output -raw cname_target 2>/dev/null || echo 'N/A')"
        env:
          TF_VAR_doppler_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}

  # =============================================================================
  # ORACLE CLOUD
  # =============================================================================
  oracle-cloud:
    runs-on: ubuntu-latest
    needs: cloudflare
    if: |
      (github.event.inputs.workspace == 'oracle-cloud' ||
       github.event.inputs.workspace == 'all' ||
       github.event_name != 'workflow_dispatch') &&
      always() && (needs.cloudflare.result == 'success' || needs.cloudflare.result == 'skipped')
    environment: production
    defaults:
      run:
        working-directory: terraform/oracle-cloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            terraform/oracle-cloud/.terraform
          key: ${{ runner.os }}-terraform-oracle-cloud-${{ hashFiles('terraform/oracle-cloud/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-oracle-cloud-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup OCI CLI
        uses: ./.github/actions/setup-oci-cli
        with:
          oci-cli-user: ${{ secrets.OCI_CLI_USER }}
          oci-cli-fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
          oci-cli-tenancy: ${{ secrets.OCI_CLI_TENANCY }}
          oci-cli-region: ${{ secrets.OCI_CLI_REGION }}
          oci-cli-key-content: ${{ secrets.OCI_CLI_KEY_CONTENT }}

      - name: Terraform Init
        run: terraform init
        env:
          TF_VAR_doppler_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action != 'destroy' && github.ref == 'refs/heads/main'
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_doppler_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_doppler_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
        env:
          TF_VAR_doppler_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}

      - name: Output VM Info
        if: github.event.inputs.action == 'apply' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          echo "Hub IP: $(terraform output -raw hub_public_ip 2>/dev/null || echo 'N/A')"
          echo ""
          echo "Prochaines étapes:"
          echo "1. Configurer Omni: https://$(terraform output -raw hub_public_ip 2>/dev/null || echo 'N/A'):50001"
          echo "2. Lancer: ./scripts/bootstrap-phase2.sh"
        env:
          TF_VAR_doppler_token: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
