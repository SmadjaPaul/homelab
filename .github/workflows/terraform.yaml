name: Terraform

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yaml'
  workflow_dispatch:
    inputs:
      workspace:
        description: 'Terraform workspace'
        required: true
        default: 'oracle-cloud'
        type: choice
        options:
          - oracle-cloud
          - cloudflare
          - authentik
          - all
      action:
        description: 'Terraform action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  # OCI Variables
  TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
  TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
  TF_VAR_budget_alert_email: ${{ secrets.ALERT_EMAIL }}

  # Cloudflare Variables
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_tunnel_secret: ${{ secrets.CLOUDFLARE_TUNNEL_SECRET }}
  TF_VAR_tunnel_id: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
  TF_VAR_domain: smadja.dev
  TF_VAR_enable_tunnel: true
  TF_VAR_enable_tunnel_config: true
  TF_VAR_authentik_oidc_enabled: true
  TF_VAR_authentik_oidc_client_id: ${{ secrets.AUTHENTIK_OIDC_CLIENT_ID }}
  TF_VAR_authentik_oidc_client_secret: ${{ secrets.AUTHENTIK_OIDC_CLIENT_SECRET }}

jobs:
  # =============================================================================
  # CLOUDFLARE
  # =============================================================================
  cloudflare:
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.workspace == 'cloudflare' ||
      github.event.inputs.workspace == 'all' ||
      github.event_name != 'workflow_dispatch'
    environment: cloudflare
    defaults:
      run:
        working-directory: terraform/cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: github.event.inputs.action != 'destroy'
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve

      - name: Output Tunnel Info
        if: github.event.inputs.action == 'apply'
        run: |
          echo "Tunnel ID: $(terraform output -raw tunnel_id)"
          echo "CNAME Target: $(terraform output -raw cname_target)"

  # =============================================================================
  # ORACLE CLOUD
  # =============================================================================
  oracle-cloud:
    runs-on: ubuntu-latest
    needs: cloudflare
    if: |
      (github.event.inputs.workspace == 'oracle-cloud' ||
       github.event.inputs.workspace == 'all' ||
       github.event_name != 'workflow_dispatch') &&
      always() && needs.cloudflare.result == 'success'
    environment: production
    defaults:
      run:
        working-directory: terraform/oracle-cloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: github.event.inputs.action != 'destroy'
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve

      - name: Output VM Info
        if: github.event.inputs.action == 'apply'
        run: |
          echo "Hub IP: $(terraform output -raw hub_public_ip)"
          echo ""
          echo "Prochaines étapes:"
          echo "1. Configurer Omni: https://$(terraform output -raw hub_public_ip):50001"
          echo "2. Lancer: ./scripts/bootstrap-phase2.sh"
