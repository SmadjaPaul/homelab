name: Deploy All Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  # Doppler
  DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  # Cloudflare
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_tunnel_secret: ${{ secrets.CLOUDFLARE_TUNNEL_SECRET }}
  TF_VAR_tunnel_id: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}

  # OCI
  TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
  TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}

jobs:
  # =============================================================================
  # PHASE 1: Cloudflare (DNS, Tunnel, Access)
  # =============================================================================
  cloudflare:
    runs-on: ubuntu-latest
    environment: cloudflare
    outputs:
      tunnel_id: ${{ steps.tunnel.outputs.tunnel_id }}
      cname_target: ${{ steps.tunnel.outputs.cname_target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init - Cloudflare
        run: |
          cd terraform/cloudflare
          terraform init

      - name: Terraform Plan - Cloudflare
        if: github.event.inputs.action == 'plan'
        run: |
          cd terraform/cloudflare
          terraform plan -no-color

      - name: Terraform Apply - Cloudflare
        if: github.event.inputs.action == 'apply'
        run: |
          cd terraform/cloudflare
          terraform apply -auto-approve

      - name: Export Tunnel Info
        if: github.event.inputs.action == 'apply'
        id: tunnel
        run: |
          cd terraform/cloudflare
          echo "tunnel_id=$(terraform output -raw tunnel_id)" >> $GITHUB_OUTPUT
          echo "cname_target=$(terraform output -raw cname_target)" >> $GITHUB_OUTPUT

  # =============================================================================
  # PHASE 2: OCI Infrastructure (VMs)
  # =============================================================================
  oci:
    runs-on: ubuntu-latest
    needs: cloudflare
    environment: production
    if: always() && needs.cloudflare.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init - OCI
        run: |
          cd terraform/oracle-cloud
          terraform init

      - name: Terraform Plan - OCI
        if: github.event.inputs.action == 'plan'
        run: |
          cd terraform/oracle-cloud
          terraform plan -no-color

      - name: Terraform Apply - OCI
        if: github.event.inputs.action == 'apply'
        run: |
          cd terraform/oracle-cloud
          terraform apply -auto-approve

      - name: Get OCI Outputs
        if: github.event.inputs.action == 'apply'
        run: |
          cd terraform/oracle-cloud
          echo "Hub IP: $(terraform output -raw hub_public_ip)"
          echo "Next: Configure Omni manually, then bootstrap K8s"

  # =============================================================================
  # PHASE 3: Notification
  # =============================================================================
  notify:
    runs-on: ubuntu-latest
    needs: [cloudflare, oci]
    if: always()
    steps:
      - name: Notify Success
        if: needs.cloudflare.result == 'success' && needs.oci.result == 'success'
        run: |
          echo "✅ Infrastructure déployée avec succès!"
          echo ""
          echo "Prochaines étapes manuelles:"
          echo "1. Configurer Omni sur la VM Hub"
          echo "2. Générer l'image Talos"
          echo "3. Lancer ./scripts/bootstrap-phase2.sh"
          echo "4. Déployer les apps: kubectl apply -k kubernetes/clusters/oci-hub"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Échec du déploiement"
          echo "Vérifiez les logs ci-dessus"
