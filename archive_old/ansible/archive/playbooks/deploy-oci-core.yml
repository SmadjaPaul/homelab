---
# Deploy Enterprise Homelab - Phase 1
# Services: cloudflared, traefik, blocky, prometheus, litellm, openclaw
# Auth: Cloudflare Access (no Authentik)
# Monitoring: Prometheus + Grafana Cloud

- name: Deploy OCI Core Services
  hosts: oci-mgmt
  vars:
    oci_core_path: "/opt/oci-core"
    doppler_token: "{{ lookup('env', 'DOPPLER_TOKEN') }}"
  become: yes
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
          - curl
          - jq
        state: present

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Create OCI Core directory
      ansible.builtin.file:
        path: "{{ oci_core_path }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Create config directory
      ansible.builtin.file:
        path: "{{ oci_core_path }}/config"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Create data directories
      ansible.builtin.file:
        path: "{{ oci_core_path }}/{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
        - data/traefik/letsencrypt
        - data/prometheus
        - data/litellm

    - name: Fix prometheus data ownership for non-root container
      ansible.builtin.file:
        path: "{{ oci_core_path }}/data/prometheus"
        state: directory
        owner: "65534"
        group: "65534"
        recurse: yes

    - name: Copy docker-compose file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker/oci-core/docker-compose.yml"
        dest: "{{ oci_core_path }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Create blocky config
      ansible.builtin.copy:
        dest: "{{ oci_core_path }}/config/blocky.yml"
        content: |
          upstream:
            default:
              - 1.1.1.1
              - 1.0.0.1
          blocking:
            blackLists:
              ads:
                - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
            clientGroupsBlock:
              default:
                - ads
          port: 53
          httpPort: 4000
          logLevel: info
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Create prometheus config
      ansible.builtin.copy:
        dest: "{{ oci_core_path }}/config/prometheus.yml"
        content: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s
          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']
            - job_name: 'docker'
              static_configs:
                - targets: ['host.docker.internal:9323']
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Create grafana-agent config
      ansible.builtin.copy:
        dest: "{{ oci_core_path }}/config/grafana-agent.yml"
        content: |
          metrics:
            wal_directory: /tmp/grafana-agent-wal
            global:
              scrape_interval: 15s
              remote_write:
                - url: ${GRAFANA_CLOUD_METRICS_URL}
                  basic_auth:
                    username: ${GRAFANA_CLOUD_USER}
                    password: ${GRAFANA_CLOUD_API_KEY}
          logs:
            configs:
              - name: default
                clients:
                  - url: ${GRAFANA_CLOUD_LOGS_URL}
                    basic_auth:
                      username: ${GRAFANA_CLOUD_USER}
                      password: ${GRAFANA_CLOUD_API_KEY}
                positions:
                  filename: /tmp/positions.yaml
                scrape_configs:
                  - job_name: varlogs
                    static_configs:
                      - targets: [localhost]
                        labels:
                          job: varlogs
                          __path__: /var/log/*.log
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Create environment file with secrets
      blockinfile:
        path: "{{ oci_core_path }}/.env"
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          ACME_EMAIL=admin@smadja.dev
          CLOUDFLARE_TUNNEL_TOKEN={{ lookup('ansible.builtin.env', 'CLOUDFLARE_TUNNEL_TOKEN') | default('', true) }}
          LITELLM_MASTER_KEY={{ lookup('ansible.builtin.env', 'LITELLM_MASTER_KEY') | default('changeme', true) }}
          LITELLM_DATABASE_URL=sqlite:///app/litellm.db
          OPENCLAW_LITELLM_URL=http://litellm:4000
          OPENCLAW_LITELLM_KEY={{ lookup('ansible.builtin.env', 'LITELLM_MASTER_KEY') | default('changeme', true) }}
          OPENCLAW_JWT_SECRET={{ lookup('ansible.builtin.env', 'OPENCLAW_JWT_SECRET') | default('changeme', true) }}
          GRAFANA_CLOUD_METRICS_URL={{ lookup('ansible.builtin.env', 'GRAFANA_CLOUD_METRICS_URL') | default('', true) }}
          GRAFANA_CLOUD_LOGS_URL={{ lookup('ansible.builtin.env', 'GRAFANA_CLOUD_LOGS_URL') | default('', true) }}
          GRAFANA_CLOUD_API_KEY={{ lookup('ansible.builtin.env', 'GRAFANA_CLOUD_API_KEY') | default('', true) }}
          GRAFANA_CLOUD_USER={{ lookup('ansible.builtin.env', 'GRAFANA_CLOUD_USER') | default('', true) }}
        create: yes
        mode: '0600'
        owner: ubuntu
        group: ubuntu
      ignore_errors: true

    - name: Pull images
      ansible.builtin.shell:
        cmd: "cd {{ oci_core_path }} && docker compose --profile core pull"
        executable: /bin/bash
      ignore_errors: true
      register: compose_pull

    - name: Start services
      ansible.builtin.shell:
        cmd: "cd {{ oci_core_path }} && docker compose --profile core up -d"
        executable: /bin/bash
      register: compose_up
      ignore_errors: true

    - name: Wait for services to start
      ansible.builtin.pause:
        seconds: 15
      when: compose_up is changed

    - name: Show Docker container status
      ansible.builtin.command: docker ps
      register: docker_status
      changed_when: false

    - name: Display container status
      ansible.builtin.debug:
        var: docker_status.stdout_lines
