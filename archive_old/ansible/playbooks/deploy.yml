---
- name: Deploy Homelab Docker Stack
  hosts: homelab
  become: yes
  gather_facts: no

  vars:
    docker_dir: /opt/docker

  tasks:
    - name: Ensure Docker is installed
      apt:
        name:
          - docker.io
          - docker-compose
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Create Docker networks
      docker_network:
        name: "{{ item }}"
        state: present
      loop:
        - traefik-public
        - authentik-private
        - monitoring
        - streaming

    - name: Ensure docker directory exists
      file:
        path: "{{ docker_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Deploy Core services
      shell: |
        cd {{ docker_dir }}/core && docker-compose up -d
      register: core_deploy

    - name: Deploy Authentik
      shell: |
        cd {{ docker_dir }}/authentik && docker-compose up -d
      register: authentik_deploy

    - name: Deploy Monitoring
      shell: |
        cd {{ docker_dir }}/monitoring && docker-compose up -d
      register: monitoring_deploy

    - name: Deploy Comet
      shell: |
        cd {{ docker_dir }}/services/comet && docker-compose up -d
      register: comet_deploy

    - name: Check containers
      shell: docker ps --format "table {% raw %}{{.Names}}\t{{.Status}}{% endraw %}"
      register: container_status

    - name: Show container status
      debug:
        msg: "{{ container_status.stdout }}"
