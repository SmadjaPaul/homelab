---
# OCI Management VM Inventory
#
# Usage:
#   - CI/CD: OCI_MGMT_IP is passed via -e flag from GitHub Actions
#   - Local: set OCI_MGMT_IP environment variable before running ansible
#
# Examples:
#   Local:  export OCI_MGMT_IP=158.178.210.98 && ansible-playbook ...
#   CI/CD:  ansible-playbook ... -e "oci_mgmt_ip=158.178.210.98"
#
all:
  children:
    oci_mgmt_group:
      hosts:
        oci-mgmt:
          ansible_host: "{{ oci_mgmt_ip | default(lookup('env', 'OCI_MGMT_IP'), default('REPLACE_WITH_VM_IP', true)) }}"
          ansible_user: ubuntu
          ansible_port: 22
          ansible_private_key_file: ~/.ssh/oci-homelab
          ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
          oci_core_path: /opt/oci-core
