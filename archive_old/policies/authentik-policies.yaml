# Security Policies for Authentik Terraform
# Uses Checkov (open source) to enforce security policies
# Docs: https://www.checkov.io/

# Policy 1: Prevent creation of superuser accounts
# CKV_CUSTOM_001
metadata:
  id: "CKV_CUSTOM_001"
  name: "Authentik - No superuser creation"
  category: "IAM"
  guideline: "Creating superuser accounts bypasses all access controls. Use specific groups instead."

# Block any user with is_superuser = true
definition:
  cond_type: "attribute"
  resource_types:
    - "authentik_user"
  attribute: "is_superuser"
  operator: "not_equals"
  value: true

---

# Policy 2: Enforce MFA for all users
# CKV_CUSTOM_002
metadata:
  id: "CKV_CUSTOM_002"
  name: "Authentik - MFA required"
  category: "IAM"
  guideline: "All users must have MFA configured"

definition:
  cond_type: "attribute"
  resource_types:
    - "authentik_user"
  attribute: "groups"
  operator: "contains"
  value: "mfa_required"

---

# Policy 3: Prevent modification of bootstrap credentials
# CKV_CUSTOM_003
metadata:
  id: "CKV_CUSTOM_003"
  name: "Authentik - Protect bootstrap credentials"
  category: "GENERAL_SECURITY"
  guideline: "Bootstrap credentials should never be modified via Terraform"

definition:
  cond_type: "attribute"
  resource_types:
    - "authentik_user"
  attribute: "username"
  operator: "not_contains"
  value: "bootstrap"

---

# Policy 4: Require flow binding for authentication
# CKV_CUSTOM_004
metadata:
  id: "CKV_CUSTOM_004"
  name: "Authentik - Authentication flow required"
  category: "NETWORKING"
  guideline: "All applications must use authentication flows"

definition:
  cond_type: "attribute"
  resource_types:
    - "authentik_provider_oauth2"
    - "authentik_provider_proxy"
    - "authentik_provider_saml"
  attribute: "authentication_flow"
  operator: "exists"

---

# Policy 5: Block external providers without proper validation
# CKV_CUSTOM_005
metadata:
  id: "CKV_CUSTOM_005"
  name: "Authentik - External provider validation"
  category: "NETWORKING"
  guideline: "External identity providers must have certificate validation enabled"

definition:
  cond_type: "attribute"
  resource_types:
    - "authentik_provider_ldap"
    - "authentik_source_ldap"
  attribute: "tls_verification"
  operator: "equals"
  value: true
