---
# External Secrets Operator - Doppler SecretStore
# This configures ESO to sync secrets from Doppler to Kubernetes
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: doppler
spec:
  provider:
    doppler:
      auth:
        secretRef:
          dopplerToken:
            name: doppler-token-auth
            key: dopplerToken
            namespace: external-secrets
---
# Secret containing Doppler Service Token
# This must be created manually after cluster bootstrap:
# kubectl create secret generic doppler-token-auth \
#   --from-literal=dopplerToken='dp.st.xxxxxx' \
#   -n external-secrets
apiVersion: v1
kind: Secret
metadata:
  name: doppler-token-auth
  namespace: external-secrets
type: Opaque
stringData:
  dopplerToken: "CHANGE_ME_AFTER_BOOTSTRAP"
