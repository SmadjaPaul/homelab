name: 'Terraform with OCI Backend'
description: 'Setup Terraform and inject OCI backend namespace'
inputs:
  working-directory:
    description: 'Terraform working directory'
    required: true
  terraform-version:
    description: 'Terraform version'
    required: false
    default: '1.14.4'
  init-args:
    description: 'Additional arguments for terraform init'
    required: false
    default: ''
  oci-cli-user:
    description: 'OCI CLI User'
    required: true
  oci-cli-fingerprint:
    description: 'OCI CLI Fingerprint'
    required: true
  oci-cli-tenancy:
    description: 'OCI CLI Tenancy'
    required: true
  oci-cli-region:
    description: 'OCI CLI Region'
    required: true
  oci-cli-key-content:
    description: 'OCI CLI Private Key Content'
    required: true
  oci-object-storage-namespace:
    description: 'OCI Object Storage Namespace'
    required: true
  oci-compartment-id:
    description: 'OCI Compartment ID'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Setup OCI CLI
      uses: ./.github/actions/setup-oci-cli
      with:
        oci-cli-user: ${{ inputs.oci-cli-user }}
        oci-cli-fingerprint: ${{ inputs.oci-cli-fingerprint }}
        oci-cli-tenancy: ${{ inputs.oci-cli-tenancy }}
        oci-cli-region: ${{ inputs.oci-cli-region }}
        oci-cli-key-content: ${{ inputs.oci-cli-key-content }}
        oci-object-storage-namespace: ${{ inputs.oci-object-storage-namespace }}
        oci-compartment-id: ${{ inputs.oci-compartment-id }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: false

    - name: Inject OCI backend namespace
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        NAMESPACE="${{ inputs.oci-object-storage-namespace }}"

        if [ -n "$NAMESPACE" ]; then
          for file in *.tf; do
            if [ -f "$file" ]; then
              sed -i.bak "s/YOUR_TENANCY_NAMESPACE/$NAMESPACE/g" "$file" 2>/dev/null || true
            fi
          done
          echo "✓ Injected namespace: $NAMESPACE"
        else
          echo "⚠️ Warning: Could not get OCI namespace"
        fi

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform init -reconfigure ${{ inputs.init-args }}
