# Doppler Configuration
# =====================
# This file maps Doppler projects to your homelab services
# Each service group has its own Doppler project

projects:
  # Infrastructure secrets (Terraform + Docker)
  infrastructure:
    description: "Core infrastructure secrets for Terraform and Docker"
    secrets:
      # Cloudflare (Required)
      - DOMAIN                          # Root domain (e.g., smadja.dev)
      - CLOUDFLARE_ZONE_ID              # Zone ID for your domain
      - CLOUDFLARE_API_TOKEN            # API token with Zone permissions
      - CLOUDFLARE_ACCOUNT_ID           # Account ID for Cloudflare
      - CLOUDFLARE_TUNNEL_ID            # Existing tunnel ID
      - CLOUDFLARE_TUNNEL_SECRET        # Tunnel secret (base64)
      - CLOUDFLARE_TUNNEL_TOKEN         # Tunnel token for cloudflared
      # Cloudflare (Optional - Zone WAF features)
      - ENABLE_ZONE_SETTINGS            # Set to "true" to manage zone settings
      - ENABLE_GEO_RESTRICTION          # Set to "true" for geo-blocking
      - ENABLE_API_SKIP_CHALLENGE       # Set to "true" for Authentik API skip
      - CLOUDFLARE_EMAIL                # Email for Cloudflare
      - CF_DNS_API_TOKEN                # DNS-only API token
      - CF_ZONE_API_TOKEN               # Zone API token
      # ACME/Let's Encrypt
      - ACME_EMAIL                      # Email for Let's Encrypt certificates
      # OCI (Required)
      - OCI_CLI_USER                    # OCI User OCID
      - OCI_CLI_FINGERPRINT             # OCI API Key Fingerprint
      - OCI_CLI_TENANCY                 # OCI Tenancy OCID
      - OCI_CLI_REGION                  # OCI Region (e.g., eu-paris-1)
      - OCI_CLI_KEY_CONTENT             # OCI API Private Key content
      - OCI_COMPARTMENT_ID              # OCI Compartment OCID
      - OCI_OBJECT_STORAGE_NAMESPACE    # OCI Object Storage Namespace
      # OCI (Optional)
      - ALERT_EMAIL                     # Email for OCI budget alerts
      - OCI_PRIVATE_KEY                 # Alternative: path to OCI key
      - OCI_FINGERPRINT                 # Alternative: OCI fingerprint
      - OCI_TENANCY_OCID                # Alternative: OCI tenancy
      - OCI_USER_OCID                   # Alternative: OCI user
      - OCI_REGION                      # Alternative: OCI region
      # SSH Keys (Required)
      - SSH_PUBLIC_KEY                  # SSH public key for VMs
      - SSH_PRIVATE_KEY                 # SSH private key for VMs
      # Authentik (Required for Docker)
      - AUTHENTIK_SECRET_KEY            # Secret key for Authentik (generate: openssl rand -base64 60)
      - AUTHENTIK_POSTGRES_PASSWORD     # PostgreSQL password for Authentik
      - AUTHENTIK_BOOTSTRAP_PASSWORD    # Bootstrap password for admin user
      - AUTHENTIK_BOOTSTRAP_TOKEN       # Bootstrap token for API access
      # Grafana Cloud (Required)
      - GRAFANA_CLOUD_API_KEY           # Grafana Cloud API key (for Alloy)
      - GRAFANA_CLOUD_METRICS_URL       # Metrics URL (e.g., https://prometheus-prod-.../api/prom/push)
      - GRAFANA_CLOUD_LOGS_URL          # Logs URL (e.g., https://logs-prod-.../loki/api/v1/push)
      # Twingate (Optional)
      - TWINGATE_API_TOKEN
      - TWINGATE_NETWORK
      # Proxmox (Optional)
      - PROXMOX_API_TOKEN
      - PROXMOX_API_SECRET
      # UniFi (Optional)
      - UNIFI_USERNAME
      - UNIFI_PASSWORD

  # Database secrets
  databases:
    description: "Database passwords"
    secrets:
      - POSTGRES_PASSWORD
      - MYSQL_ROOT_PASSWORD
      - MYSQL_PASSWORD
      - MONGO_INITDB_ROOT_PASSWORD
      - REDIS_PASSWORD
      - MINIO_ROOT_PASSWORD
      - RUSTFS_ACCESS_KEY
      - RUSTFS_SECRET_KEY

  # Application secrets (Docker)
  apps:
    description: "Application-specific secrets for Docker services"
    secrets:
      - GOTIFY_DEFAULTUSER_NAME
      - GOTIFY_DEFAULTUSER_PASS
      - HTTP_SERVER_NAME
      - SERVER_ADMIN
      - WEBHOOK_URL
      - GITEA__database__PASSWD
      - GITEA_API_TOKEN
      - VWDOMAIN
      - MAKEMKV_KEY
      - DOCKER_HUB_USERNAME
      - DOCKER_HUB_PASSWORD
      - COMPOSE_PROJECT_NAME
      - SSMTP_HOST
      - SSMTP_USER
      - SSMTP_PASSWORD
      - SSMTP_HOSTNAME
      - NEXTAUTH_URL
      - NEXTAUTH_SECRET
      - NEXT_PUBLIC_AUTHENTIK_ENABLED
      - AUTHENTIK_CUSTOM_NAME
      - AUTHENTIK_ISSUER
      - AUTHENTIK_CLIENT_ID
      - AUTHENTIK_CLIENT_SECRET
      - SSO_CLIENT_SECRET
      - DATABASE_URL
      - OAUTH_CLIENT_ID
      - OAUTH_CLIENT_SECRET
      - GF_SECURITY_ADMIN_PASSWORD
      - RADARR_API
      - RADARR_URL
      - SONARR_API
      - SONARR_URL
      - PROWLARR_API
      - PROWLARR_URL
      - SAB_URL
      - SAB_API
      - BAZARR_API
      - BAZARR_URL
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      - GF_SERVER_ROOT_URL
      - AUTHENTIK_URL
      - PVE_PASSWORD
      - JS_POSTGRES_PASSWORD
      - JWT_SECRET
      - JS_GEOLITE_LICENSE_KEY
      - NEXT_PUBLIC_GOOGLE_API_KEY
      - DB_NAME
      - CRYPTR_SECRET
      - PGADMIN_DEFAULT_PASSWORD
      - PGADMIN_CONFIG_OAUTH2_CONFIG
      - COUCHDB_PASSWORD

  # Monitoring
  monitoring:
    description: "Monitoring and alerting secrets"
    secrets:
      - SMTP_PASSWORD
      - ALERTMANAGER_SLACK_WEBHOOK

  # Terraform: Servarr Stack
  servarr:
    description: "Servarr stack API keys and passwords (Terraform)"
    secrets:
      - SONARR_API_KEY
      - RADARR_API_KEY
      - PROWLARR_API_KEY
      - QBITTY_PASSWORD
      - SABNZBD_API_KEY
      - GOTIFY_RADARR_KEY
      - NZBGEEK_API_KEY
      - NINJACENTRAL_API_KEY
      - ALTHUB_API_KEY

  # Terraform: Authentik
  authentik:
    description: "Authentik configuration secrets (Terraform)"
    secrets:
      - AUTHENTIK_URL
      - AUTHENTIK_TOKEN
      - SMTP_HOST
      - SMTP_PORT
      - SMTP_USERNAME
      - SMTP_PASSWORD
      - SMTP_FROM
      - GOOGLE_OAUTH2_CLIENT_ID
      - GOOGLE_OAUTH2_CLIENT_SECRET

  # Terraform: LiteLLM
  litellm:
    description: "LiteLLM configuration secrets (Terraform)"
    secrets:
      - LITELLM_URL
      - LITELLM_MASTER_KEY
      - OPENCLAW_LITELLM_KEY

# Doppler CLI Setup
# =================
# 1. Install Doppler CLI:
#    brew install doppler
#
# 2. Login to Doppler:
#    doppler login
#
# 3. Set up your projects:
#    doppler projects create infrastructure
#    doppler projects create databases
#    doppler projects create apps
#    doppler projects create monitoring
#    doppler projects create servarr
#    doppler projects create authentik
#    doppler projects create litellm
#
# 4. Add secrets to each project using the web UI or CLI:
#    doppler secrets set POSTGRES_PASSWORD="your-password" -p databases
#
# 5. Generate a Service Token for each environment:
#    doppler configs tokens create --config prd homelab-prd-token -p infrastructure
#    doppler configs tokens create --config prd servarr-prd-token -p servarr
#    doppler configs tokens create --config prd authentik-prd-token -p authentik
#    doppler configs tokens create --config prd litellm-prd-token -p litellm

# External Secrets Operator Setup
# ================================
# The Kubernetes cluster uses External Secrets Operator to sync secrets from Doppler.
# See kubernetes/apps/external-secrets/ for configuration.

# Terraform + Doppler
# ===================
# Terraform modules use the Doppler provider to fetch secrets at runtime.
# Each Terraform module has a corresponding Doppler project:
#
# - terraform/servarr    → Doppler project: servarr
# - terraform/twingate   → Doppler project: infrastructure (TWINGATE_API_TOKEN)
# - terraform/unifi      → Doppler project: infrastructure (UNIFI_PASSWORD)
# - terraform/authentik  → Doppler project: authentik
# - terraform/litellm    → Doppler project: litellm
#
# To run Terraform locally with Doppler:
#   export DOPPLER_TOKEN=$(doppler configs tokens create --config prd temp-token -p <project> --plain)
#   terraform plan
#
# For CI/CD, store the service token in GitHub Secrets as DOPPLER_TOKEN
