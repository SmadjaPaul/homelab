apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: flux-system
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: flux-system
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        identity: "{{ .FLUX_GIT_SSH_KEY }}"
  data:
    - secretKey: FLUX_GIT_SSH_KEY
      remoteRef:
        key: FLUX_GIT_SSH_KEY
