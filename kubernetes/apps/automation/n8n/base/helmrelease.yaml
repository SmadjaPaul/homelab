apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: n8n
  namespace: automation
spec:
  interval: 1h
  releaseName: n8n
  chart:
    spec:
      chart: n8n
      version: "0.26.0"
      sourceRef:
        kind: HelmRepository
        name: n8n
  values:
    n8n:
      baseUrl: https://n8n.smadja.dev
    ingress:
      enabled: true
      className: traefik
      hosts:
        - n8n.smadja.dev
      tls:
        - secretName: n8n-tls
          hosts:
            - n8n.smadja.dev
    persistence:
      enabled: true
      size: 10Gi
