# =============================================================================
# Omni Secrets
# =============================================================================
# Note: Store sensitive values in Doppler and use External Secrets Operator
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: omni-secrets
  namespace: omni
type: Opaque
stringData:
  # Generate with: uuidgen
  account-uuid: "01F52A6F-B922-445F-8F13-E22158D1AAB8"
  # ETCD encryption key (generate with: openssl rand -base64 32)
  etcd-encryption-key: ""
  # Auth0 credentials (user needs to configure)
  auth0-client-id: ""
  auth0-client-secret: ""
  auth0-domain: ""
