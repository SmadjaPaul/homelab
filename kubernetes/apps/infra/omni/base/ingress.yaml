# =============================================================================
# Omni Ingress
# =============================================================================
# Uses Cloudflare Access for authentication
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omni
  namespace: omni
  annotations:
    # Traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Cloudflare Access (uncomment after configuring Access Policy)
    # cf-access-authenticated-origin-hook: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: omni.smadja.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omni
                port:
                  number: 443
  tls:
    - hosts:
        - omni.smadja.dev
      secretName: omni-tls
---
# =============================================================================
# TLS Secret (managed by cert-manager)
# =============================================================================
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: omni-tls
  namespace: omni
spec:
  secretName: omni-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - omni.smadja.dev
