apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: admin@smadja.dev
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - dns01:
          cloudflare:
            email: admin@smadja.dev
            apiTokenSecretRef:
              name: cf-dns-token
              key: CF_DNS_API_TOKEN
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cf-dns-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: SecretStore
  target:
    name: cf-dns-token
    creationPolicy: Owner
  data:
    - secretKey: CF_DNS_API_TOKEN
      remoteRef:
        key: infrastructure/prd
        property: CF_DNS_API_TOKEN
