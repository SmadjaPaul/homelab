apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kong
  namespace: kong
spec:
  interval: 1h
  chart:
    spec:
      chart: kong
      version: "3.0.2"
      sourceRef:
        kind: HelmRepository
        name: kong
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    ingressController:
      enabled: true
      installCRDs: false
      env:
        feature_gates: "GatewayAlpha=true"
    gateway:
      enabled: false
    admin:
      enabled: false
    proxy:
      type: ClusterIP
      http:
        enabled: true
        servicePort: 80
        containerPort: 8000
      tls:
        enabled: true
        servicePort: 443
        containerPort: 8443
