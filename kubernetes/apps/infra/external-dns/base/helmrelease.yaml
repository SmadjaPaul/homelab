apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  releaseName: external-dns
  targetNamespace: external-dns
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: "1.15.1"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  values:
    provider: cloudflare
    cloudflare:
      proxied: true
    sources:
      - ingress
    txtOwnerName: "external-dns"
    domainFilters:
      - "smadja.dev"
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: external-dns-secrets
            key: CLOUDFLARE_API_TOKEN
      - name: CF_API_EMAIL
        valueFrom:
          secretKeyRef:
            name: external-dns-secrets
            key: CLOUDFLARE_EMAIL
  install:
    createNamespace: true
  upgrade:
    force: true
