apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: external-dns-secrets
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    name: external-dns-secrets
    creationPolicy: Owner
  dataFrom:
    - find:
        name:
          regexp: 'CLOUDFLARE_'
