apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: storage
spec:
  interval: 1h
  chart:
    spec:
      chart: redis
      version: "20.2.1"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    architecture: standalone
    auth:
      enabled: true
      # Secret will be injected via Doppler / External Secrets
      existingSecret: "redis-auth"
      existingSecretPasswordKey: "redis-password"
    master:
      persistence:
        enabled: true
        size: 2Gi
