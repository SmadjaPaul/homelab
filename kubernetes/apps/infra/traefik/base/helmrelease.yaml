apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  releaseName: traefik
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: traefik
      version: "35.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    deployment:
      replicas: 1
    ingressClass:
      enabled: true
      isDefaultClass: true
    service:
      type: ClusterIP
    ports:
      web:
        port: 8080
        exposedPort: 8080
      websecure:
        port: 8443
        exposedPort: 8443
    logs:
      general:
        level: INFO
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsGroup: 65532
      runAsNonRoot: true
      runAsUser: 65532
