# Infrastructure Kustomization (order: external-secrets first, then consumers)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # DNS management
  - external-dns/base
  # Tunnel
  - cloudflared/base
  # Omni - Kubernetes cluster management
  - omni/base
  # Backup system
  - velero/base
  # Ingress controller
  - traefik/base
  # ClusterIssuer for cert-manager
  - cluster-issuer.yaml
