# Infrastructure Kustomization (order: external-secrets first, then consumers)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # DNS management
  - external-dns/base
  # Tunnel
  - cloudflared/base
  # Backup system
  - velero/base
  # Gateway API CRDs
  - gateway-api-crds
  # API Gateway (Kong)
  - kong/base
  # ClusterIssuer for cert-manager
  - cluster-issuer.yaml
