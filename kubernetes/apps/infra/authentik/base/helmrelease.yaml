apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: infra
spec:
  interval: 1h
  releaseName: authentik
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  values:
    authentik:
      secret_key:
        $env: AUTHENTIK_SECRET_KEY
    postgresql:
      enabled: false
    externalDatabase:
      host:
        $env: AIVEN_POSTGRES_HOST
      port:
        $env: AIVEN_POSTGRES_PORT
      database:
        $env: AIVEN_POSTGRES_NAME
      username:
        $env: AIVEN_POSTGRES_USER
      password:
        $env: AUTHENTIK_POSTGRES_PASSWORD
    redis:
      enabled: true
