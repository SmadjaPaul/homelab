apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: infra
spec:
  interval: 1h
  timeout: 10m
  releaseName: authentik
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  values:
    postgresql:
      enabled: false
    redis:
      enabled: true
    extraEnv:
      - name: AUTHENTIK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-values
            key: AUTHENTIK_SECRET_KEY
      - name: AUTHENTIK_POSTGRESQL__HOST
        valueFrom:
          secretKeyRef:
            name: authentik-values
            key: AUTHENTIK_POSTGRESQL__HOST
      - name: AUTHENTIK_POSTGRESQL__PORT
        valueFrom:
          secretKeyRef:
            name: authentik-values
            key: AUTHENTIK_POSTGRESQL__PORT
      - name: AUTHENTIK_POSTGRESQL__NAME
        valueFrom:
          secretKeyRef:
            name: authentik-values
            key: AUTHENTIK_POSTGRESQL__NAME
      - name: AUTHENTIK_POSTGRESQL__USER
        valueFrom:
          secretKeyRef:
            name: authentik-values
            key: AUTHENTIK_POSTGRESQL__USER
      - name: AUTHENTIK_POSTGRESQL__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-values
            key: AUTHENTIK_POSTGRESQL__PASSWORD
      - name: AUTHENTIK_POSTGRESQL__CONN_MAX_AGE
        valueFrom:
          secretKeyRef:
            name: authentik-values
            key: AUTHENTIK_POSTGRESQL__CONN_MAX_AGE
      - name: AUTHENTIK_POSTGRESQL__DISABLE_SERVER_SIDE_CURSORS
        valueFrom:
          secretKeyRef:
            name: authentik-values
            key: AUTHENTIK_POSTGRESQL__DISABLE_SERVER_SIDE_CURSORS
  install:
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    force: false
    remediation:
      retries: 3
      remediateLastFailure: true
  driftDetection:
    mode: enabled
