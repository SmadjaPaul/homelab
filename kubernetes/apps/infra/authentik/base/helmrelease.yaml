apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: infra
spec:
  interval: 1h
  releaseName: authentik
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  values:
    authentik:
      secret_key: secret-key-placeholder
    postgresql:
      enabled: true
      auth:
        database: authentik
        username: authentik
    redis:
      enabled: true
