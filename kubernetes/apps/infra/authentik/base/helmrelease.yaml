apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: infra
spec:
  interval: 1h
  timeout: 10m
  releaseName: authentik
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: authentik-values
      valuesKey: values.yaml
  values:
    postgresql:
      enabled: false
    redis:
      enabled: true
  install:
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    force: false
    remediation:
      retries: 3
      remediateLastFailure: true
  driftDetection:
    mode: enabled
