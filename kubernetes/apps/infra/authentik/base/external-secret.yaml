apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: infra
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    name: authentik-values
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        values.yaml: |
          authentik:
            secret_key: "{{ .AUTHENTIK_SECRET_KEY }}"
          externalDatabase:
            host: "{{ .AIVEN_POSTGRES_HOST }}"
            port: "{{ .AIVEN_POSTGRES_PORT }}"
            database: "{{ .AIVEN_POSTGRES_NAME }}"
            username: "{{ .AIVEN_POSTGRES_USER }}"
            password: "{{ .AUTHENTIK_POSTGRES_PASSWORD }}"
  data:
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef:
        key: AUTHENTIK_SECRET_KEY
    - secretKey: AUTHENTIK_POSTGRES_PASSWORD
      remoteRef:
        key: AUTHENTIK_POSTGRES_PASSWORD
    - secretKey: AIVEN_POSTGRES_HOST
      remoteRef:
        key: AIVEN_POSTGRES_HOST
    - secretKey: AIVEN_POSTGRES_PORT
      remoteRef:
        key: AIVEN_POSTGRES_PORT
    - secretKey: AIVEN_POSTGRES_NAME
      remoteRef:
        key: AIVEN_POSTGRES_NAME
    - secretKey: AIVEN_POSTGRES_USER
      remoteRef:
        key: AIVEN_POSTGRES_USER
