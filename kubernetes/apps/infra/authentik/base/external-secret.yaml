apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: infra
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    name: authentik-values
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        AUTHENTIK_SECRET_KEY: "{{ .AUTHENTIK_SECRET_KEY }}"
        AUTHENTIK_POSTGRESQL__HOST: "134.122.58.11"
        AUTHENTIK_POSTGRESQL__PORT: "14351"
        AUTHENTIK_POSTGRESQL__NAME: "defaultdb"
        AUTHENTIK_POSTGRESQL__USER: "avnadmin"
        AUTHENTIK_POSTGRESQL__PASSWORD: "{{ .AUTHENTIK_POSTGRES_PASSWORD }}"
        AUTHENTIK_POSTGRESQL__CONN_MAX_AGE: "0"
        AUTHENTIK_POSTGRESQL__DISABLE_SERVER_SIDE_CURSORS: "true"
  data:
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef:
        key: AUTHENTIK_SECRET_KEY
    - secretKey: AUTHENTIK_POSTGRES_PASSWORD
      remoteRef:
        key: AUTHENTIK_POSTGRES_PASSWORD
