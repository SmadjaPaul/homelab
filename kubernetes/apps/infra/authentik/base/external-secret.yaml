apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: infra
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    name: authentik-secrets
    creationPolicy: Owner
  dataFrom:
    - find:
        name:
          regexp: 'AUTHENTIK_|AIVEN_'
