# External Secret for Authentik - from Doppler service-authentik
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-service-authentik
  target:
    name: authentik-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # PostgreSQL
        POSTGRES_PASSWORD: "{{ .AUTHENTIK_POSTGRES_PASSWORD }}"
        POSTGRES_USER: "{{ .AUTHENTIK_POSTGRES_USER }}"
        POSTGRES_DB: "{{ .AUTHENTIK_POSTGRES_NAME }}"
        # Authentik
        AUTHENTIK_SECRET_KEY: "{{ .AUTHENTIK_SECRET_KEY }}"
        AUTHENTIK_BOOTSTRAP_PASSWORD: "{{ .AUTHENTIK_BOOTSTRAP_PASSWORD }}"
        AUTHENTIK_BOOTSTRAP_TOKEN: "{{ .AUTHENTIK_BOOTSTRAP_TOKEN }}"
        # SMTP (optional)
        AUTHENTIK_EMAIL__HOST: "{{ .SMTP_HOST }}"
        AUTHENTIK_EMAIL__PORT: "{{ .SMTP_PORT }}"
        AUTHENTIK_EMAIL__USERNAME: "{{ .SMTP_USERNAME }}"
        AUTHENTIK_EMAIL__PASSWORD: "{{ .SMTP_PASSWORD }}"
        AUTHENTIK_EMAIL__FROM: "{{ .SMTP_FROM }}"
  data:
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef:
        key: AUTHENTIK_SECRET_KEY
    - secretKey: AUTHENTIK_BOOTSTRAP_PASSWORD
      remoteRef:
        key: AUTHENTIK_BOOTSTRAP_PASSWORD
    - secretKey: AUTHENTIK_BOOTSTRAP_TOKEN
      remoteRef:
        key: AUTHENTIK_BOOTSTRAP_TOKEN
    - secretKey: AUTHENTIK_POSTGRES_PASSWORD
      remoteRef:
        key: AUTHENTIK_POSTGRES_PASSWORD
    - secretKey: AUTHENTIK_POSTGRES_USER
      remoteRef:
        key: AUTHENTIK_POSTGRES_USER
    - secretKey: AUTHENTIK_POSTGRES_NAME
      remoteRef:
        key: AUTHENTIK_POSTGRES_NAME
    - secretKey: SMTP_HOST
      remoteRef:
        key: SMTP_HOST
    - secretKey: SMTP_PORT
      remoteRef:
        key: SMTP_PORT
    - secretKey: SMTP_USERNAME
      remoteRef:
        key: SMTP_USERNAME
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: SMTP_PASSWORD
    - secretKey: SMTP_FROM
      remoteRef:
        key: SMTP_FROM
