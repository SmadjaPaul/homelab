apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authentik
  namespace: authentik
  annotations:
    # External DNS - création automatique du record
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/hostname: "auth.smadja.dev"
    external-dns.alpha.kubernetes.io/target: "${CLOUDFLARE_TUNNEL_ID}.cfargotunnel.com"

    # Cert-manager
    cert-manager.io/cluster-issuer: letsencrypt-production

    # Traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"

    # Authentik est le point d'entrée, pas besoin d'auth supplémentaire
    # (l'utilisateur se connecte directement à Authentik)
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - auth.smadja.dev
      secretName: authentik-tls
  rules:
    - host: auth.smadja.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
