# External DNS - Cloudflare
# ==========================
# Crée automatiquement les DNS records dans Cloudflare
# selon l'architecture qjoly/GitOps

apiVersion: v1
kind: Namespace
metadata:
  name: external-dns
  labels:
    environment: infrastructure
    managed-by: flux

---
# Secret pour l'API token Cloudflare
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-key
  namespace: external-dns
  annotations:
    # Appliquer avant External DNS
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-infrastructure
  target:
    name: cloudflare-api-key
    creationPolicy: Owner
  data:
    - secretKey: apiKey
      remoteRef:
        key: CF_DNS_API_TOKEN

---
# HelmRelease pour External DNS
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: "1.15.x"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  values:
    sources:
      - ingress

    policy: sync

    provider:
      name: cloudflare

    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-key
            key: apiKey

    # Configuration pour utiliser avec Cloudflare Tunnel
    # Les ingresses doivent avoir l'annotation:
    # external-dns.alpha.kubernetes.io/target: <tunnel-id>.cfargotunnel.com
    domainFilters:
      - smadja.dev

    resources:
      limits:
        cpu: "100m"
        memory: "128Mi"
      requests:
        cpu: "50m"
        memory: "64Mi"

    # RBAC
    rbac:
      create: true
