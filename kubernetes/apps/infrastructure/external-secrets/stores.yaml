# Cluster Secret Store - Infrastructure (accès root)
# Ce store a accès au projet 'infrastructure' qui contient les tokens des autres projets
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: doppler-infrastructure
spec:
  provider:
    doppler:
      auth:
        secretRef:
          dopplerToken:
            name: doppler-token-infrastructure
            key: dopplerToken
            namespace: flux-system

---
# Secret contenant le token du projet infrastructure
# À créer manuellement après avoir généré le token
apiVersion: v1
kind: Secret
metadata:
  name: doppler-token-infrastructure
  namespace: flux-system
type: Opaque
stringData:
  # Remplacer par: doppler configs tokens create prd eso-token -p infrastructure --plain
  dopplerToken: "REPLACE_WITH_INFRASTRUCTURE_TOKEN"

---
