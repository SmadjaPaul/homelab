# Sync des tokens Doppler depuis le projet 'infrastructure'
# Ces tokens permettent aux clusters d'accéder aux autres projets Doppler
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: doppler-tokens-sync
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-infrastructure
  target:
    name: doppler-tokens
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Service tokens
        service-authentik: "{{ .DOPPLER_TOKEN_SERVICE_AUTHENTIK }}"
        service-nextcloud: "{{ .DOPPLER_TOKEN_SERVICE_NEXTCLOUD }}"
        service-comet: "{{ .DOPPLER_TOKEN_SERVICE_COMET }}"
        service-jellyfin: "{{ .DOPPLER_TOKEN_SERVICE_JELLYFIN }}"
        service-odoo: "{{ .DOPPLER_TOKEN_SERVICE_ODOO }}"
        service-fleetdm: "{{ .DOPPLER_TOKEN_SERVICE_FLEETDM }}"
        service-matrix: "{{ .DOPPLER_TOKEN_SERVICE_MATRIX }}"
        service-immich: "{{ .DOPPLER_TOKEN_SERVICE_IMMICH }}"
        service-vaultwarden: "{{ .DOPPLER_TOKEN_SERVICE_VAULTWARDEN }}"
        service-gitea: "{{ .DOPPLER_TOKEN_SERVICE_GITEA }}"
        service-litellm: "{{ .DOPPLER_TOKEN_SERVICE_LITELLM }}"
        service-openwebui: "{{ .DOPPLER_TOKEN_SERVICE_OPENWEBUI }}"
        backup-kopia: "{{ .DOPPLER_TOKEN_BACKUP_KOPIA }}"
  data:
    - secretKey: DOPPLER_TOKEN_SERVICE_AUTHENTIK
      remoteRef:
        key: DOPPLER_TOKEN_SERVICE_AUTHENTIK
    - secretKey: DOPPLER_TOKEN_SERVICE_NEXTCLOUD
      remoteRef:
        key: DOPPLER_TOKEN_SERVICE_NEXTCLOUD
    - secretKey: DOPPLER_TOKEN_SERVICE_COMET
      remoteRef:
        key: DOPPLER_TOKEN_SERVICE_COMET
    - secretKey: DOPPLER_TOKEN_SERVICE_JELLYFIN
      remoteRef:
        key: DOPPLER_TOKEN_SERVICE_JELLYFIN
    - secretKey: DOPPLER_TOKEN_SERVICE_ODOO
      remoteRef:
        key: DOPPLER_TOKEN_SERVICE_ODOO
    - secretKey: DOPPLER_TOKEN_SERVICE_FLEETDM
      remoteRef:
        key: DOPPLER_TOKEN_SERVICE_FLEETDM
    - secretKey: DOPPLER_TOKEN_SERVICE_MATRIX
      remoteRef:
        key: DOPPLER_TOKEN_SERVICE_MATRIX
    - secretKey: DOPPLER_TOKEN_SERVICE_IMMICH
      remoteRef:
        key: DOPPLER_TOKEN_SERVICE_IMMICH
    - secretKey: DOPPLER_TOKEN_SERVICE_VAULTWARDEN
      remoteRef:
        key: DOPPLER_TOKEN_SERVICE_VAULTWARDEN
    - secretKey: DOPPLER_TOKEN_SERVICE_GITEA
      remoteRef:
        key: DOPPLER_TOKEN_SERVICE_GITEA
    - secretKey: DOPPLER_TOKEN_SERVICE_LITELLM
      remoteRef:
        key: DOPPLER_TOKEN_SERVICE_LITELLM
    - secretKey: DOPPLER_TOKEN_SERVICE_OPENWEBUI
      remoteRef:
        key: DOPPLER_TOKEN_SERVICE_OPENWEBUI
    - secretKey: DOPPLER_TOKEN_BACKUP_KOPIA
      remoteRef:
        key: DOPPLER_TOKEN_BACKUP_KOPIA

---
# Création des secrets individuels pour chaque service
# Ces secrets sont utilisés par les ClusterSecretStores
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: doppler-token-service-authentik
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-infrastructure
  target:
    name: doppler-token-service-authentik
    creationPolicy: Owner
  data:
    - secretKey: dopplerToken
      remoteRef:
        key: DOPPLER_TOKEN_SERVICE_AUTHENTIK

