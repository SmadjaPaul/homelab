apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: public
spec:
  interval: 1h
  releaseName: homepage
  chart:
    spec:
      chart: homepage
      version: "0.3.13"
      sourceRef:
        kind: HelmRepository
        name: homepage
        namespace: flux-system
  values:
    ingress:
      enabled: true
      className: traefik
      hosts:
        - home.smadja.dev
      tls:
        - secretName: homepage-tls
          hosts:
            - home.smadja.dev
    config:
      kubernetes:
        enabled: true
        clusterName: oci
