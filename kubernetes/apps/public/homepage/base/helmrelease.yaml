apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: public
spec:
  interval: 1h
  releaseName: homepage
  chart:
    spec:
      chart: homepage
      version: "4.3.0"
      sourceRef:
        kind: HelmRepository
        name: homepage
        namespace: flux-system
  values:
    # Use official chart keys for allowed hosts
    config:
      allowedHosts:
        - "home.smadja.dev"
      kubernetes:
        enabled: true
        clusterName: oci
    # General env vars
    extraEnv:
      - name: PUID
        value: "1000"
      - name: PGID
        value: "1000"
      - name: HOMEPAGE_ALLOWED_HOSTS
        value: "*"
