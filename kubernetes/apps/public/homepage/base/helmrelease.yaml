apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: public
spec:
  interval: 1h
  releaseName: homepage
  chart:
    spec:
      chart: homepage
      version: "4.3.0"
      sourceRef:
        kind: HelmRepository
        name: homepage
        namespace: flux-system
  values:
    config:
      kubernetes:
        enabled: true
        clusterName: oci
