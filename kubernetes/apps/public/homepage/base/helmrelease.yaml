apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: public
spec:
  interval: 1h
  releaseName: homepage
  chart:
    spec:
      chart: homepage
      version: "4.3.0"
      sourceRef:
        kind: HelmRepository
        name: homepage
        namespace: flux-system
  values:
    config:
      allowedHosts:
        - "home.smadja.dev"
      kubernetes:
        enabled: true
        clusterName: oci

    # Enable header authentication sent by Cloudflare Access
    settings:
      auth:
        providers:
          cloudflare:
            jwtToken: CF_Authorization
            teamDomain: smadja.cloudflareaccess.com
            aud: "${CF_AUDIENCE_TAG}"

    widgets:
      # Admin widgets (only visible to admin group via access mapping in services/bookmarks)
      - resources:
          cpu: true
          memory: true
          disk: /
          expanded: true
      - kubernetes:
          cluster:
            show: true
            cpu: true
            memory: true
            showLabel: true
            label: "cluster"
          nodes:
            show: true
            cpu: true
            memory: true
            showLabel: true

    extraEnv:
      - name: PUID
        value: "1000"
      - name: PGID
        value: "1000"
      - name: HOMEPAGE_ALLOWED_HOSTS
        value: "*"
