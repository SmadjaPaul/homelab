apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: navidrome
  namespace: public
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 3.2.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: deluan/navidrome
              tag: latest
            env:
              ND_LOGLEVEL: info
              ND_PORT: 4533
    service:
      main:
        ports:
          http:
            port: 4533
