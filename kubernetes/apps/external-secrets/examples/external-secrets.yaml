---
# Example ExternalSecret for databases
# This syncs secrets from Doppler 'databases' project to Kubernetes
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: database-credentials
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: database-credentials
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: POSTGRES_PASSWORD
    - secretKey: mysql-root-password
      remoteRef:
        key: MYSQL_ROOT_PASSWORD
    - secretKey: mysql-password
      remoteRef:
        key: MYSQL_PASSWORD
    - secretKey: redis-password
      remoteRef:
        key: REDIS_PASSWORD
---
# Example ExternalSecret for infrastructure
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: infrastructure-secrets
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: infrastructure-secrets
    creationPolicy: Owner
  data:
    - secretKey: cloudflare-api-token
      remoteRef:
        key: CLOUDFLARE_API_TOKEN
    - secretKey: cloudflare-email
      remoteRef:
        key: CLOUDFLARE_EMAIL
    - secretKey: twingate-access-token
      remoteRef:
        key: TWINGATE_ACCESS_TOKEN
    - secretKey: twingate-refresh-token
      remoteRef:
        key: TWINGATE_REFRESH_TOKEN
