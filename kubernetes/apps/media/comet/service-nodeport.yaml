# Comet Service - NodePort for Direct Streaming Access
# Port 30080 is exposed in OCI Security List for direct low-latency access

apiVersion: v1
kind: Service
metadata:
  name: comet-nodeport
  namespace: media
  annotations:
    description: "Comet streaming NodePort service - exposed for low-latency direct access"
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: comet
  ports:
    - name: streaming
      port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
  # Ensure session affinity for streaming connections
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours
