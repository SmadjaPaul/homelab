---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tailscale-auth
  namespace: system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: SecretStore
  target:
    name: tailscale-auth
    creationPolicy: Owner
  data:
    - secretKey: TS_AUTH_KEY
      remoteRef:
        key: infrastructure/prd
        property: TAILSCALE_AUTH_KEY
