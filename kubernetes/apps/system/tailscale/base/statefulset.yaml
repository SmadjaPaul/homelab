---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tailscale
  namespace: system
  labels:
    app.kubernetes.io/name: tailscale
    app.kubernetes.io/instance: tailscale
spec:
  serviceName: tailscale
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tailscale
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tailscale
        app.kubernetes.io/instance: tailscale
    spec:
      serviceAccountName: tailscale
      containers:
        - name: tailscale
          image: tailscale/tailscale:v1.78.1
          imagePullPolicy: Always
          env:
            - name: TS_KUBE_SECRET
              value: tailscale-auth
            - name: TS_USERSPACE
              value: "true"
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--advertise-exit-node --operator=root"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            privileged: true
          volumeMounts:
            - name: dev-net-tun
              mountPath: /dev/net/tun
      volumes:
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale
  namespace: system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale
  namespace: system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale
  namespace: system
subjects:
  - kind: ServiceAccount
    name: tailscale
    namespace: system
roleRef:
  kind: Role
  name: tailscale
  apiGroup: rbac.authorization.k8s.io
