---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-cloud-credentials
  namespace: o11y
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: SecretStore
  target:
    name: grafana-cloud-credentials
    creationPolicy: Owner
    data:
      - secretKey: GRAFANA_CLOUD_URL
        remoteRef:
          key: infrastructure/prd
          property: GRAFANA_CLOUD_URL
      - secretKey: GRAFANA_CLOUD_USERNAME
        remoteRef:
          key: infrastructure/prd
          property: GRAFANA_CLOUD_USERNAME
      - secretKey: GRAFANA_CLOUD_API_KEY
        remoteRef:
          key: infrastructure/prd
          property: GRAFANA_CLOUD_API_KEY
      - secretKey: LOKI_URL
        remoteRef:
          key: infrastructure/prd
          property: LOKI_URL
      - secretKey: LOKI_USERNAME
        remoteRef:
          key: infrastructure/prd
          property: LOKI_USERNAME
      - secretKey: LOKI_API_KEY
        remoteRef:
          key: infrastructure/prd
          property: LOKI_API_KEY
