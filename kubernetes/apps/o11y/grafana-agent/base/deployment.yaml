---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-agent
  namespace: o11y
  labels:
    app.kubernetes.io/name: grafana-agent
    app.kubernetes.io/instance: grafana-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-agent
        app.kubernetes.io/instance: grafana-agent
    spec:
      serviceAccountName: grafana-agent
      containers:
        - name: agent
          image: grafana/agent:v0.42.2
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/agent/agent.yaml
            - --metrics.wal-directory=/tmp/agent/wal
            - --server.http.listen-address=127.0.0.1
            - --server.http.listen-port=8080
            - --logs.level=info
          env:
            - name: GRAFANA_CLOUD_URL
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud-credentials
                  key: GRAFANA_CLOUD_URL
            - name: GRAFANA_CLOUD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud-credentials
                  key: GRAFANA_CLOUD_USERNAME
            - name: GRAFANA_CLOUD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud-credentials
                  key: GRAFANA_CLOUD_API_KEY
            - name: LOKI_URL
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud-credentials
                  key: LOKI_URL
            - name: LOKI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud-credentials
                  key: LOKI_USERNAME
            - name: LOKI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud-credentials
                  key: LOKI_API_KEY
          volumeMounts:
            - name: agent-config
              mountPath: /etc/agent
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
      volumes:
        - name: agent-config
          configMap:
            name: grafana-agent
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-agent
  namespace: o11y
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: grafana-agent
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: grafana-agent
subjects:
  - kind: ServiceAccount
    name: grafana-agent
    namespace: o11y
