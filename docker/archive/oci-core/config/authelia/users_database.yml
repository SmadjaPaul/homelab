# Authelia Users Database
# Run: docker run authelia/authelia:latest authelia crypto hash generate argon2 --password 'yourpassword'
# to generate password hashes

users:
  admin:
    displayname: "Admin User"
    password: "$argon2id$v=19$m=65536,t=3,p=4$CHANGE_ME_GENERATE_WITH_AUTHELIA"  # Change this!
    email: admin@smadja.dev
    groups:
      - admins
      - users

