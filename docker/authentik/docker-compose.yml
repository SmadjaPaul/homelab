# Authentik - Identity Provider
# Services: Authentik Server, Worker, PostgreSQL (local), Redis
# Simplified configuration with local PostgreSQL as fallback

name: authentik

services:
  # PostgreSQL - Local instance (fallback from Aiven)
  postgresql:
    image: docker.io/library/postgres:16-alpine
    container_name: authentik-postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - database:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${AUTHENTIK_POSTGRES_PASSWORD}
      - POSTGRES_USER=authentik
      - POSTGRES_DB=authentik
    networks:
      - authentik-private

  # Redis - Session cache
  redis:
    image: docker.io/library/redis:alpine
    container_name: authentik-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    networks:
      - authentik-private

  # Authentik Server
  server:
    image: ghcr.io/goauthentik/server:latest
    container_name: authentik-server
    restart: unless-stopped
    command: server
    environment:
      - AUTHENTIK_SECRET_KEY
      - AUTHENTIK_BOOTSTRAP_PASSWORD
      - AUTHENTIK_BOOTSTRAP_TOKEN
      # PostgreSQL local connection
      - AUTHENTIK_POSTGRESQL__HOST=postgresql
      - AUTHENTIK_POSTGRESQL__NAME=authentik
      - AUTHENTIK_POSTGRESQL__USER=authentik
      - AUTHENTIK_POSTGRESQL__PASSWORD=${AUTHENTIK_POSTGRES_PASSWORD}
      - AUTHENTIK_POSTGRESQL__PORT=5432
      # Redis
      - AUTHENTIK_REDIS__HOST=redis
      # Email (optional)
      - AUTHENTIK_EMAIL__HOST=${SMTP_HOST}
      - AUTHENTIK_EMAIL__PORT=${SMTP_PORT:-587}
      - AUTHENTIK_EMAIL__USERNAME=${SMTP_USERNAME}
      - AUTHENTIK_EMAIL__PASSWORD=${SMTP_PASSWORD}
      - AUTHENTIK_EMAIL__FROM=${SMTP_FROM}
    networks:
      - authentik-private
      - traefik-public
    volumes:
      - ./media:/media
      - ./custom-templates:/templates
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`auth.${DOMAIN}`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls.certresolver=letsencrypt"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Authentik Worker
  worker:
    image: ghcr.io/goauthentik/server:latest
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      - AUTHENTIK_SECRET_KEY
      # Same PostgreSQL config as server
      - AUTHENTIK_POSTGRESQL__HOST=postgresql
      - AUTHENTIK_POSTGRESQL__NAME=authentik
      - AUTHENTIK_POSTGRESQL__USER=authentik
      - AUTHENTIK_POSTGRESQL__PASSWORD=${AUTHENTIK_POSTGRES_PASSWORD}
      - AUTHENTIK_POSTGRESQL__PORT=5432
      - AUTHENTIK_REDIS__HOST=redis
    networks:
      - authentik-private
    volumes:
      - ./media:/media
      - ./custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  authentik-private:
    external: true
  traefik-public:
    external: true

volumes:
  database:
    driver: local
