# Enterprise Homelab - Phase 1 (No Authentik)
# Services: cloudflared, traefik, blocky, prometheus, litellm, openclaw
# Monitoring: Grafana Cloud (not self-hosted)
#
# Usage with Doppler:
#   export DOPPLER_TOKEN=dp.st.prd.xxxx
#   ./doppler-run.sh up -d
#
# Or manually with env file:
#   docker compose up -d

name: oci-core

services:
  # ============================================================================
  # INGRESS & NETWORKING
  # ============================================================================

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # Token injected via Doppler or .env file
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - proxy
    profiles:
      - core

  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@smadja.dev}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/traefik/letsencrypt:/letsencrypt
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.smadja.dev`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
    profiles:
      - core

  blocky:
    image: spx01/blocky:latest
    restart: unless-stopped
    ports:
      - "5053:53/tcp"
      - "5053:53/udp"
      - "4000:4000/tcp"
    volumes:
      - ./config/blocky.yml:/app/config.yml:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.blocky.rule=Host(`dns.smadja.dev`)"
      - "traefik.http.routers.blocky.entrypoints=websecure"
      - "traefik.http.routers.blocky.tls.certresolver=letsencrypt"
      - "traefik.http.services.blocky.loadbalancer.server.port=4000"
    profiles:
      - core

  # ============================================================================
  # MONITORING (Prometheus only, sends to Grafana Cloud)
  # ============================================================================

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    networks:
      - proxy
      - monitoring
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.smadja.dev`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
    profiles:
      - core

  grafana-agent:
    image: grafana/agent:latest
    restart: unless-stopped
    environment:
      - GRAFANA_CLOUD_METRICS_URL=${GRAFANA_CLOUD_METRICS_URL}
      - GRAFANA_CLOUD_LOGS_URL=${GRAFANA_CLOUD_LOGS_URL}
      - GRAFANA_CLOUD_API_KEY=${GRAFANA_CLOUD_API_KEY}
    volumes:
      - ./config/grafana-agent.yml:/etc/agent/agent.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    profiles:
      - core

  # ============================================================================
  # AI SERVICES
  # ============================================================================

  # litellm:
  #   image: ghcr.io/berriai/litellm:main-latest
  #   restart: unless-stopped
  # NOTE: Disabled due to ARM64 compatibility - needs amd64 VM or self-hosted deployment

  # openclaw:
  #   image: ghcr.io/openclaw/openclaw:latest
  #   restart: unless-stopped
  # NOTE: Disabled due to ARM64 compatibility

networks:
  proxy:
    driver: bridge
  monitoring:
    driver: bridge
