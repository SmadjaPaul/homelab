# Enterprise Homelab - Authentik + Cloudflare Access Architecture
# Services: cloudflared, traefik, authentik, blocky, prometheus
# Monitoring: Grafana Cloud (via Alloy)
# Database: Supabase PostgreSQL (external)
#
# Architecture:
#   User → Cloudflare Access → Authentik (IdP) → Cloudflare → Traefik → Service
#
# Usage with Doppler:
#   export DOPPLER_TOKEN=dp.st.prd.xxxx
#   ./doppler-run.sh up -d

name: oci-core

services:
  # ============================================================================
  # INGRESS & NETWORKING
  # ============================================================================

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - proxy
    profiles:
      - core

  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@smadja.dev}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/traefik/letsencrypt:/letsencrypt
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.smadja.dev`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      # Note: Auth is handled by Cloudflare Access before reaching Traefik
    profiles:
      - core

  # ============================================================================
  # IDENTITY PROVIDER (Authentik with Supabase PostgreSQL)
  # ============================================================================

  authentik-server:
    image: ghcr.io/goauthentik/server:latest
    restart: unless-stopped
    command: server
    environment:
      - AUTHENTIK_REDIS__HOST=authentik-redis
      # Supabase PostgreSQL (external cloud database)
      - AUTHENTIK_POSTGRESQL__HOST=${AUTHENTIK_POSTGRES_HOST:-db.supabase.co}
      - AUTHENTIK_POSTGRESQL__NAME=${AUTHENTIK_POSTGRES_NAME:-postgres}
      - AUTHENTIK_POSTGRESQL__USER=${AUTHENTIK_POSTGRES_USER:-postgres}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${AUTHENTIK_POSTGRES_PASSWORD}
      - AUTHENTIK_POSTGRESQL__PORT=${AUTHENTIK_POSTGRES_PORT:-5432}
      - AUTHENTIK_POSTGRESQL__SSLMODE=require
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
      - AUTHENTIK_BOOTSTRAP_PASSWORD=${AUTHENTIK_BOOTSTRAP_PASSWORD}
      - AUTHENTIK_BOOTSTRAP_TOKEN=${AUTHENTIK_BOOTSTRAP_TOKEN}
      - AUTHENTIK_ERROR_REPORTING__ENABLED=false
    volumes:
      - ./data/authentik/media:/media
      - ./data/authentik/certs:/certs
      - ./data/authentik/custom-templates:/templates
    networks:
      - proxy
      - authentik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`auth.smadja.dev`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls.certresolver=letsencrypt"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
    profiles:
      - core
    depends_on:
      - authentik-redis

  authentik-worker:
    image: ghcr.io/goauthentik/server:latest
    restart: unless-stopped
    command: worker
    environment:
      - AUTHENTIK_REDIS__HOST=authentik-redis
      # Supabase PostgreSQL (external cloud database)
      - AUTHENTIK_POSTGRESQL__HOST=${AUTHENTIK_POSTGRES_HOST:-db.supabase.co}
      - AUTHENTIK_POSTGRESQL__NAME=${AUTHENTIK_POSTGRES_NAME:-postgres}
      - AUTHENTIK_POSTGRESQL__USER=${AUTHENTIK_POSTGRES_USER:-postgres}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${AUTHENTIK_POSTGRES_PASSWORD}
      - AUTHENTIK_POSTGRESQL__PORT=${AUTHENTIK_POSTGRES_PORT:-5432}
      - AUTHENTIK_POSTGRESQL__SSLMODE=require
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
    volumes:
      - ./data/authentik/media:/media
      - ./data/authentik/certs:/certs
      - ./data/authentik/custom-templates:/templates
    networks:
      - authentik
    profiles:
      - core
    depends_on:
      - authentik-redis

  # Redis remains local (fast, stateless cache)
  authentik-redis:
    image: docker.io/library/redis:alpine
    restart: unless-stopped
    networks:
      - authentik
    profiles:
      - core

  # ============================================================================
  # DNS (Blocky)
  # ============================================================================

  blocky:
    image: spx01/blocky:latest
    restart: unless-stopped
    ports:
      - "5053:53/tcp"
      - "5053:53/udp"
      - "4000:4000/tcp"
    volumes:
      - ./config/blocky.yml:/app/config.yml:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.blocky.rule=Host(`dns.smadja.dev`)"
      - "traefik.http.routers.blocky.entrypoints=websecure"
      - "traefik.http.routers.blocky.tls.certresolver=letsencrypt"
      - "traefik.http.services.blocky.loadbalancer.server.port=4000"
      # Note: Auth handled by Cloudflare Access
    profiles:
      - core

  # ============================================================================
  # MONITORING (Prometheus + Grafana Alloy)
  # ============================================================================

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    networks:
      - proxy
      - monitoring
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.smadja.dev`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
      # Note: Auth handled by Cloudflare Access
    profiles:
      - core

  grafana-alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    environment:
      - GCLOUD_RW_API_KEY=${GRAFANA_CLOUD_API_KEY}
      - GCLOUD_HOSTED_METRICS_URL=${GRAFANA_CLOUD_METRICS_URL}
      - GCLOUD_HOSTED_LOGS_URL=${GRAFANA_CLOUD_LOGS_URL}
    volumes:
      - ./config/alloy.config:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    networks:
      - monitoring
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    profiles:
      - core

networks:
  proxy:
    driver: bridge
  monitoring:
    driver: bridge
  authentik:
    driver: bridge
