# Grafana Agent Configuration
# Ships metrics to Grafana Cloud free tier

server:
  log_level: info

metrics:
  wal_directory: /tmp/grafana-agent-wal
  global:
    scrape_interval: 1m
  configs:
    - name: default
      scrape_configs:
        # Docker containers via cadvisor
        - job_name: 'cadvisor'
          static_configs:
            - targets: ['cadvisor:8080']

        # Node exporter
        - job_name: 'node'
          static_configs:
            - targets: ['host.docker.internal:9100']

        # Docker daemon
        - job_name: 'docker'
          static_configs:
            - targets: ['host.docker.internal:9323']

      remote_write:
        - url: ${GRAFANA_CLOUD_URL}/api/prom/push
          basic_auth:
            username: ${GRAFANA_CLOUD_USER}
            password: ${GRAFANA_CLOUD_API_KEY}

logs:
  configs:
    - name: default
      positions:
        filename: /tmp/positions.yaml
      scrape_configs:
        - job_name: docker
          static_configs:
            - targets: [localhost]
              labels:
                job: docker
                __path__: /var/lib/docker/containers/*/*.log
          pipeline_stages:
            - json:
                expressions:
                  output: log
                  stream: stream
                  timestamp: time
            - labels:
                stream:
            - timestamp:
                source: timestamp
                format: RFC3339Nano
            - output:
                source: output
      clients:
        - url: ${GRAFANA_CLOUD_URL}/api/prom/push
          basic_auth:
            username: ${GRAFANA_CLOUD_USER}
            password: ${GRAFANA_CLOUD_API_KEY}

integrations:
  node_exporter:
    enabled: true
    rootfs_path: /host/root
    sysfs_path: /host/sys
    procfs_path: /host/proc
