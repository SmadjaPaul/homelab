# Prometheus Configuration
# Scrapes metrics from local services

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Traefik metrics
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
    metrics_path: /metrics

  # Docker containers
  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']
    metrics_path: /metrics

  # Node exporter (if installed on host)
  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']

  # Blocky DNS
  - job_name: 'blocky'
    static_configs:
      - targets: ['blocky:4000']
    metrics_path: /metrics

  # Authentik
  - job_name: 'authentik'
    static_configs:
      - targets: ['authentik-server:9300']
    metrics_path: /metrics

  # Gitea
  - job_name: 'gitea'
    static_configs:
      - targets: ['gitea:3000']
    metrics_path: /metrics

# Alerting (basic)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rules
rule_files:
  # - "alerts.yml"
