# LiteLLM Proxy — OCI Management Stack
# OpenAI-compatible gateway for Synthetic, Cline, aichat, etc.
# API keys / credentials: add via Terraform (ncecere/litellm) or UI (second step).
# Docs: https://docs.litellm.ai/docs/proxy/configs

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  block_robots: true  # /robots.txt → Disallow: / (ne pas indexer l’UI)
  # Optional: database for spend logs, keys (PostgreSQL or SQLite)
  # database_url: "os.environ/LITELLM_DATABASE_URL"

# Models: add via UI or Terraform later. Example for Synthetic (OpenAI-compatible):
# model_list:
#   - model_name: synthetic-deepseek
#     litellm_params:
#       model: deepseek-v3
#       api_base: "https://api.synthetic.new/v1"   # confirm in Synthetic docs
#       api_key: "os.environ/SYNTHETIC_API_KEY"
model_list: []

litellm_settings:
  drop_params: true
  num_retries: 2
  # Redaction des clés API / secrets dans le contenu envoyé au LLM (open-source)
  callbacks: ["hide_secrets"]
